name: ${NUTSNEWS_APP_PROJECT_NAME:?NUTSNEWS_APP_PROJECT_NAME is required}

services:
  nutsnews-app:
    image: ${NUTSNEWS_APP_IMAGE:?Set NUTSNEWS_APP_IMAGE to a reviewed ghcr.io/ramideltoro/nutsnews@sha256 digest reference}
    container_name: ${NUTSNEWS_APP_CONTAINER_NAME:?NUTSNEWS_APP_CONTAINER_NAME is required}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    env_file:
      - ${NUTSNEWS_APP_ENV_FILE:?NUTSNEWS_APP_ENV_FILE is required}
    networks:
      environment:
        aliases:
          - ${NUTSNEWS_APP_NETWORK_ALIAS:?NUTSNEWS_APP_NETWORK_ALIAS is required}
    expose:
      - ${NUTSNEWS_APP_CONTAINER_PORT:?NUTSNEWS_APP_CONTAINER_PORT is required}
    volumes:
      - type: volume
        source: app-cache
        target: /tmp/nutsnews-cache
    # Values are rendered per runtime by Ansible. Keeping them in the Compose
    # contract makes the staging ceiling enforceable by the Docker Engine.
    cpus: ${NUTSNEWS_APP_CPU_LIMIT:?NUTSNEWS_APP_CPU_LIMIT is required}
    cpu_shares: ${NUTSNEWS_APP_CPU_SHARES:?NUTSNEWS_APP_CPU_SHARES is required}
    mem_limit: ${NUTSNEWS_APP_MEMORY_LIMIT_MIB:?NUTSNEWS_APP_MEMORY_LIMIT_MIB is required}m
    mem_reservation: ${NUTSNEWS_APP_MEMORY_RESERVATION_MIB:?NUTSNEWS_APP_MEMORY_RESERVATION_MIB is required}m
    pids_limit: ${NUTSNEWS_APP_PIDS_LIMIT:?NUTSNEWS_APP_PIDS_LIMIT is required}
    logging:
      driver: json-file
      options:
        max-size: ${NUTSNEWS_APP_LOG_MAX_SIZE:?NUTSNEWS_APP_LOG_MAX_SIZE is required}
        max-file: ${NUTSNEWS_APP_LOG_MAX_FILE:?NUTSNEWS_APP_LOG_MAX_FILE is required}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:${NUTSNEWS_APP_CONTAINER_PORT}${NUTSNEWS_APP_HEALTH_PATH:-/healthz}')
          .then((response) => { if (!response.ok) process.exit(1); })
          .catch(() => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 15s

networks:
  environment:
    name: ${NUTSNEWS_APP_NETWORK_NAME:?NUTSNEWS_APP_NETWORK_NAME is required}
    external: true

volumes:
  app-cache:
    name: ${NUTSNEWS_APP_CACHE_VOLUME_NAME:?NUTSNEWS_APP_CACHE_VOLUME_NAME is required}
