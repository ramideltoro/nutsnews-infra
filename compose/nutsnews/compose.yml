name: nutsnews-app

services:
  nutsnews-app:
    image: ${NUTSNEWS_APP_IMAGE:-ghcr.io/ramideltoro/nutsnews:latest}
    container_name: ${NUTSNEWS_APP_CONTAINER_NAME:-nutsnews-app}
    restart: unless-stopped
    env_file:
      - ${NUTSNEWS_APP_ENV_FILE:-/dev/null}
    networks:
      - edge
    expose:
      - ${NUTSNEWS_APP_CONTAINER_PORT:-3000}
    mem_limit: 768m
    pids_limit: 256
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          if command -v wget >/dev/null 2>&1; then
          wget -qO- "http://127.0.0.1:${NUTSNEWS_APP_CONTAINER_PORT:-3000}${NUTSNEWS_APP_HEALTH_PATH:-/healthz}" >/dev/null;
          elif command -v curl >/dev/null 2>&1; then
          curl -fsS "http://127.0.0.1:${NUTSNEWS_APP_CONTAINER_PORT:-3000}${NUTSNEWS_APP_HEALTH_PATH:-/healthz}" >/dev/null;
          else exit 0; fi
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 15s

networks:
  edge:
    name: nutsnews-edge
