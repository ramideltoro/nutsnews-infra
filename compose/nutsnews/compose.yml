name: nutsnews-app

services:
  nutsnews-app:
    image: ${NUTSNEWS_APP_IMAGE:?Set NUTSNEWS_APP_IMAGE to a reviewed ghcr.io/ramideltoro/nutsnews@sha256 digest reference}
    container_name: ${NUTSNEWS_APP_CONTAINER_NAME:-nutsnews-app}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - ${NUTSNEWS_APP_ENV_FILE:-/dev/null}
    networks:
      - edge
    expose:
      - ${NUTSNEWS_APP_CONTAINER_PORT:-3000}
    mem_limit: 768m
    pids_limit: 256
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:${NUTSNEWS_APP_CONTAINER_PORT:-3000}${NUTSNEWS_APP_HEALTH_PATH:-/healthz}')
          .then((response) => { if (!response.ok) process.exit(1); })
          .catch(() => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 15s

networks:
  edge:
    name: nutsnews-edge
    external: true
