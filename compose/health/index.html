<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NutsNews VPS Service Foundation</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: grid;
        margin: 0;
        min-height: 100vh;
        padding: 2rem;
      }

      main {
        max-width: 42rem;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 4.5rem);
        letter-spacing: 0;
        line-height: 1;
        margin: 0 0 1rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NutsNews VPS</h1>
      <p>The service foundation is online locally. Public routing is intentionally not enabled here yet.</p>
    </main>
  </body>
</html>
