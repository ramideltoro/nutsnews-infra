version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/terraform/grafana-cloud"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "infra"

  - package-ecosystem: "terraform"
    directory: "/terraform/staging-access"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "infra"

  - package-ecosystem: "terraform"
    directory: "/terraform/grafana-state-bootstrap/cloudflare-r2"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:25"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "infra"

  - package-ecosystem: "docker"
    directory: "/compose/caddy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "runtime"
