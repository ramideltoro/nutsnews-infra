name: Infrastructure Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Detect YAML files
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files '*.yml' '*.yaml' | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install yamllint
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: python3 -m pip install --user yamllint

      - name: Run yamllint
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t yaml_files < <(git ls-files '*.yml' '*.yaml')
          "$HOME/.local/bin/yamllint" \
            -d "{extends: default, rules: {document-start: disable, line-length: disable, truthy: disable}}" \
            "${yaml_files[@]}"

      - name: Skip yamllint
        if: steps.detect.outputs.has_files != 'true'
        shell: bash
        run: echo "No YAML files found."

  opentofu:
    name: OpenTofu fmt and validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Detect Terraform files
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if find terraform -type f -name '*.tf' | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install OpenTofu
        if: steps.detect.outputs.has_files == 'true'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4  # v2
        with:
          tofu_wrapper: false

      - name: Run OpenTofu fmt and validate
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tofu fmt -check -recursive terraform
          find terraform -type f -name '*.tf' -exec dirname {} \; | sort -u | while read -r dir; do
            tofu -chdir="$dir" init -backend=false -input=false
            tofu -chdir="$dir" validate -no-color
          done

      - name: Skip OpenTofu
        if: steps.detect.outputs.has_files != 'true'
        shell: bash
        run: echo "No Terraform files found."

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Detect Terraform files
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if find terraform -type f -name '*.tf' | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install TFLint
        if: steps.detect.outputs.has_files == 'true'
        uses: terraform-linters/setup-tflint@c750028ac0f3831886a261f96da68ab58a92e7ec  # v6
        with:
          cache: true

      - name: Run TFLint
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          find terraform -type f -name '*.tf' -exec dirname {} \; | sort -u | while read -r dir; do
            (
              cd "$dir"
              tflint --init
              tflint -f compact
            )
          done

      - name: Skip TFLint
        if: steps.detect.outputs.has_files != 'true'
        shell: bash
        run: echo "No Terraform files found."

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f  # v12
        with:
          directory: .
          framework: terraform,github_actions,dockerfile,yaml,json,secrets
          quiet: true
          soft_fail: true

  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Detect Ansible content
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if find ansible -type f \( -name '*.yml' -o -name '*.yaml' \) | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ansible-lint
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: python3 -m pip install --user ansible-lint

      - name: Install Ansible collections
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        working-directory: ansible
        run: |
          set -euo pipefail
          if [[ -f requirements.yml ]]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Run Ansible syntax check
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        working-directory: ansible
        run: ansible-playbook playbooks/bootstrap.yml --syntax-check

      - name: Validate service foundation role wiring
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        working-directory: ansible
        run: |
          set -euo pipefail
          test -d roles/vps_service_foundation
          grep -q 'role: vps_service_foundation' playbooks/bootstrap.yml

      - name: Validate service foundation check-mode guard
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        working-directory: ansible
        run: |
          set -euo pipefail
          tasks_file="roles/vps_service_foundation/tasks/main.yml"

          grep -q 'Explain service foundation check mode limits' "$tasks_file"
          awk '
            /^- name: Manage Docker service and service foundation runtime$/ { found = 1 }
            found && /^  when: not ansible_check_mode$/ { guarded = 1 }
            END { exit !(found && guarded) }
          ' "$tasks_file"

      - name: Validate SSH portal forwarding guardrails
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v sshd >/dev/null 2>&1 && [[ ! -x /usr/sbin/sshd ]]; then
            sudo apt-get update
            sudo apt-get install -y openssh-server
          fi

          sudo mkdir -p /run/sshd
          python3 ansible/tests/validate_portal_ssh_forwarding.py

      - name: Validate service foundation Caddy diagnostics
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'bind 0.0.0.0' compose/caddy/Caddyfile
          grep -q 'XDG_CONFIG_HOME: /config' compose/caddy/compose.yml
          grep -q 'XDG_DATA_HOME: /data' compose/caddy/compose.yml
          grep -q '/run:size=16m,mode=0755' compose/caddy/compose.yml
          grep -q 'cap_add:' compose/caddy/compose.yml
          grep -q 'NET_BIND_SERVICE' compose/caddy/compose.yml
          if grep -q 'no-new-privileges:true' compose/caddy/compose.yml; then
            echo "Caddy cannot run with no-new-privileges while using the official image file capability." >&2
            exit 1
          fi
          grep -q 'Show Caddy Compose status after health failure' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -q 'Show Caddy logs after health failure' ansible/roles/vps_service_foundation/tasks/main.yml

      - name: Validate operations portal automation
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python3 -m py_compile ansible/roles/vps_service_foundation/files/ops_portal_collector.py
          python3 -m py_compile ansible/roles/vps_service_foundation/files/ops_portal_reporter.py
          python3 -m py_compile ansible/roles/vps_service_foundation/files/vps_restic_backup.py
          grep -Fq 'vps_service_foundation_collector_timer' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq 'nutsnews-ops-portal-collector.timer' ansible/roles/vps_service_foundation/defaults/main.yml
          grep -Fq 'nutsnews-ops-alert-check.timer' ansible/roles/vps_service_foundation/defaults/main.yml
          grep -Fq 'nutsnews-ops-health-report.timer' ansible/roles/vps_service_foundation/defaults/main.yml
          grep -Fq 'nutsnews-restic-backup.timer' ansible/roles/vps_service_foundation/defaults/main.yml
          grep -Fq 'nutsnews-restic-verify.service' ansible/roles/vps_service_foundation/defaults/main.yml
          grep -Fq 'ops-reporter.env.j2' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq 'vps-backup.env.j2' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq 'no_log: true' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq 'Refresh operations portal status snapshot' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq 'Refresh operations portal reporting status snapshot' ansible/roles/vps_service_foundation/tasks/main.yml
          grep -Fq '/opt/nutsnews/portal-assets:/srv/nutsnews-portal:ro' compose/caddy/compose.yml
          grep -Fq '127.0.0.1:8080:8080/tcp' compose/caddy/compose.yml
          grep -Fq 'handle /data/*' compose/caddy/Caddyfile
          grep -Fq 'ReadWritePaths=' ansible/roles/vps_service_foundation/templates/nutsnews-ops-portal-collector.service.j2
          grep -Fq 'NUTSNEWS_EMAIL_ENABLED' ansible/roles/vps_service_foundation/templates/ops-reporter.env.j2
          grep -Fq 'RESTIC_PASSWORD_FILE' ansible/roles/vps_service_foundation/templates/vps-backup.env.j2
          grep -Fq 'RCLONE_CONFIG' ansible/roles/vps_service_foundation/templates/vps-backup.env.j2
          grep -Fq 'EnvironmentFile=-{{ vps_service_foundation_reporter_env_file }}' ansible/roles/vps_service_foundation/templates/nutsnews-ops-alert-check.service.j2
          grep -Fq 'ExecStart={{ vps_service_foundation_reporter_bin }} --mode report' ansible/roles/vps_service_foundation/templates/nutsnews-ops-health-report.service.j2
          grep -Fq 'ExecStart={{ vps_service_foundation_backup_bin }} --mode backup' ansible/roles/vps_service_foundation/templates/nutsnews-restic-backup.service.j2
          grep -Fq 'ExecStart={{ vps_service_foundation_backup_bin }} --mode verify-latest' ansible/roles/vps_service_foundation/templates/nutsnews-restic-verify.service.j2
          python3 ansible/tests/validate_backup_workflows.py
          python3 ansible/tests/validate_no_backup_secrets.py

      - name: Run ansible-lint
        if: steps.detect.outputs.has_files == 'true'
        shell: bash
        working-directory: ansible
        run: |
          "$HOME/.local/bin/ansible-lint" .

      - name: Skip ansible-lint
        if: steps.detect.outputs.has_files != 'true'
        shell: bash
        run: echo "No Ansible YAML files found."
