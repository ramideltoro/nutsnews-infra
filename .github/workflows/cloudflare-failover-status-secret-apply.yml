name: Cloudflare Failover Status Secret Apply

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Plan or apply the nutsnews-controller status HMAC secret.
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      confirm_apply:
        description: For apply only, type nutsnews-controller.nutsnews.workers.dev.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-failover-status-secret
  cancel-in-progress: false

jobs:
  status-secret:
    name: Protected failover status secret apply
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: cloudflare-admin

    steps:
      - name: Validate fixed controller scope and confirmation
        shell: bash
        env:
          RUN_MODE: ${{ inputs.run_mode }}
          CONFIRM_APPLY: ${{ inputs.confirm_apply }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Failover status secret changes must run from main." >&2
            exit 1
          fi
          if [[ "$RUN_MODE" == "apply" && "$CONFIRM_APPLY" != "nutsnews-controller.nutsnews.workers.dev" ]]; then
            echo "Apply requires confirm_apply to be exactly nutsnews-controller.nutsnews.workers.dev." >&2
            exit 1
          fi

      - name: Checkout reviewed workflow guardrails
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "24"

      - name: Validate controller secret inputs
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.NUTSNEWS_CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.NUTSNEWS_DNS_FAILOVER_DEPLOY_API_TOKEN }}
          STATUS_HMAC_SECRET: ${{ secrets.NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET }}
        run: |
          set -euo pipefail
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN STATUS_HMAC_SECRET; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required cloudflare-admin Environment secret: $name" >&2
              missing=1
            fi
          done
          if [[ "$missing" != "0" ]]; then
            exit "$missing"
          fi
          if [[ ${#STATUS_HMAC_SECRET} -lt 32 || ${#STATUS_HMAC_SECRET} -gt 512 ]]; then
            echo "NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET must be between 32 and 512 characters." >&2
            exit 1
          fi
          case "$STATUS_HMAC_SECRET" in
            *$'\n'*|*$'\r'*)
              echo "NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET must not contain newlines." >&2
              exit 1
              ;;
          esac
          npx --yes wrangler@4.113.0 --version

      - name: Probe current status endpoint posture
        shell: bash
        run: |
          set -euo pipefail
          status_code="$(
            curl -sS -o /dev/null -w "%{http_code}" \
              "https://nutsnews-controller.nutsnews.workers.dev/status?mode=dashboard"
          )"
          case "$status_code" in
            200|401|403|503) ;;
            *)
              echo "Unexpected unauthenticated status endpoint response: HTTP ${status_code}" >&2
              exit 1
              ;;
          esac

      - name: Store controller status HMAC secret
        if: inputs.run_mode == 'apply'
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.NUTSNEWS_CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.NUTSNEWS_DNS_FAILOVER_DEPLOY_API_TOKEN }}
          STATUS_HMAC_SECRET: ${{ secrets.NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET }}
        run: |
          set -euo pipefail
          printf '%s' "$STATUS_HMAC_SECRET" | npx --yes wrangler@4.113.0 secret put \
            NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET \
            --name nutsnews-controller

      - name: Verify signed controller status
        if: inputs.run_mode == 'apply'
        shell: bash
        env:
          STATUS_HMAC_SECRET: ${{ secrets.NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createHmac } from "node:crypto";

          const secret = process.env.STATUS_HMAC_SECRET || "";
          const statusUrl = new URL("https://nutsnews-controller.nutsnews.workers.dev/status?mode=dashboard");
          const timestamp = String(Math.floor(Date.now() / 1000));
          const signedPath = `${statusUrl.pathname}${statusUrl.search}`;
          const payload = ["v1", "GET", signedPath, timestamp].join("\n");
          const signature = createHmac("sha256", secret).update(payload).digest("hex");
          const response = await fetch(statusUrl, {
            headers: {
              Accept: "application/json",
              "X-NutsNews-Failover-Timestamp": timestamp,
              "X-NutsNews-Failover-Signature": `v1=${signature}`,
            },
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(`Signed controller status returned HTTP ${response.status}.`);
          }
          if (body.schemaVersion !== "nutsnews.failover.status.v1") {
            throw new Error("Signed controller status did not return the failover status v1 schema.");
          }
          for (const key of ["controllerState", "activeDnsTarget", "actualApexDnsTarget", "actualWwwDnsTarget", "observedDeploymentTarget", "generatedAt"]) {
            if (!body[key]) {
              throw new Error(`Signed controller status is missing ${key}.`);
            }
          }
          console.log(
            `Controller status verified: controllerState=${body.controllerState}; activeDnsTarget=${body.activeDnsTarget}; generatedAt=${body.generatedAt}`,
          );
          NODE

      - name: Summarize status secret posture
        if: always()
        shell: bash
        env:
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          {
            echo "## Failover status secret"
            echo
            echo "- Worker: \`nutsnews-controller\`"
            echo "- Status endpoint: \`https://nutsnews-controller.nutsnews.workers.dev/status?mode=dashboard\`"
            echo "- Run mode: \`${RUN_MODE}\`"
            echo "- Manual action secret configured by this workflow: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"
