name: Promote NutsNews Production Release

on: # zizmor: ignore[dangerous-triggers] trusted promotion resolves only a successful infra qualification run and revalidates its attestation before writing release state.
  workflow_run:
    workflows:
      - Qualify Verified NutsNews Staging Candidate
    types:
      - completed
  workflow_dispatch:
    inputs:
      qualification_run_id:
        description: Successful staging qualification workflow run ID to promote.
        required: true
        type: string
      staging_deployment_id:
        description: Optional expected stg-* deployment ID from that qualification.
        required: false
        type: string
      qualification_confirmation:
        description: Type promote-qualified-staging-release.
        required: true
        type: string

permissions:
  actions: read
  attestations: read
  contents: read
  deployments: read
  pull-requests: read

concurrency:
  group: nutsnews-vps-release-promotion
  cancel-in-progress: false

jobs:
  promote:
    name: Promote staging-qualified release to production VPS
    if: >-
      ${{
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.qualification_confirmation == 'promote-qualified-staging-release')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      EVENT_QUALIFICATION_RUN_ID: ${{ github.event.workflow_run.id }}
      INPUT_QUALIFICATION_RUN_ID: ${{ inputs.qualification_run_id }}
      REQUESTED_STAGING_DEPLOYMENT_ID: ${{ inputs.staging_deployment_id }}

    steps:
      - name: Checkout reviewed infrastructure automation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve successful staging qualification evidence
        id: qualified
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # shellcheck disable=SC2027,SC2086,SC2129
          set -euo pipefail
          umask 077

          qualification_run_id="${EVENT_QUALIFICATION_RUN_ID:-$INPUT_QUALIFICATION_RUN_ID}"
          if [[ ! "$qualification_run_id" =~ ^[1-9][0-9]{0,19}$ ]]; then
            echo "A numeric staging qualification workflow run ID is required." >&2
            exit 1
          fi

          run_json="$RUNNER_TEMP/qualification-run.json"
          gh run view "$qualification_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,workflowName,event,status,conclusion,headBranch,headSha,url \
            > "$run_json"

          python3 - "$run_json" "$qualification_run_id" <<'PY'
          import json
          import re
          import sys

          run = json.load(open(sys.argv[1], encoding="utf-8"))
          expected_run_id = sys.argv[2]
          checks = {
              "databaseId": int(expected_run_id),
              "workflowName": "Qualify Verified NutsNews Staging Candidate",
              "status": "completed",
              "conclusion": "success",
              "headBranch": "main",
          }
          for key, expected in checks.items():
              if run.get(key) != expected:
                  raise SystemExit(f"Qualification run does not satisfy {key}={expected!r}.")
          if not re.fullmatch(r"[0-9a-f]{40}", str(run.get("headSha", ""))):
              raise SystemExit("Qualification run must be bound to a full infra main commit.")
          PY

          artifact_dir="$RUNNER_TEMP/qualification-artifacts"
          mkdir -p "$artifact_dir"
          gh run download "$qualification_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$artifact_dir" \
            --pattern "staging-qualification-*"

          mapfile -t records < <(find "$artifact_dir" -type f -path "*/qualification/staging-qualification.json" | sort)
          if [[ "${#records[@]}" -ne 1 ]]; then
            echo "Expected exactly one staging-qualification.json artifact for run ${qualification_run_id}, found ${#records[@]}." >&2
            exit 1
          fi
          record_path="${records[0]}"

          python3 ansible/scripts/staging_qualification.py validate-record \
            --record "$record_path"

          python3 - "$record_path" "$qualification_run_id" "$REQUESTED_STAGING_DEPLOYMENT_ID" "$GITHUB_OUTPUT" <<'PY'
          import json
          import re
          import sys

          record = json.load(open(sys.argv[1], encoding="utf-8"))
          qualification_run_id = sys.argv[2]
          expected_staging_deployment_id = sys.argv[3]
          output_path = sys.argv[4]

          source = record.get("source", {})
          image = record.get("image", {})
          staging = record.get("staging", {})
          infra = record.get("infra", {})
          qualifier = record.get("qualifier", {})

          values = {
              "source_commit": source.get("commit", ""),
              "source_workflow_run_id": source.get("workflow_run_id", ""),
              "image_repository": image.get("repository", ""),
              "image_digest": image.get("digest", ""),
              "build_id": source.get("build_id", ""),
              "staging_deployment_id": staging.get("deployment_id", ""),
              "config_generation": infra.get("config_generation", ""),
              "qualification_run_id": qualifier.get("run_id", ""),
          }
          patterns = {
              "source_commit": r"^[0-9a-f]{40}$",
              "source_workflow_run_id": r"^[1-9][0-9]{0,19}$",
              "image_repository": r"^ghcr\.io/ramideltoro/nutsnews$",
              "image_digest": r"^sha256:[0-9a-f]{64}$",
              "build_id": r"^[1-9][0-9]{0,19}-[1-9][0-9]{0,5}$",
              "staging_deployment_id": r"^stg-[0-9a-f]{24}$",
              "config_generation": r"^staging-stg-[0-9a-f]{24}-[0-9a-f]{12}$",
              "qualification_run_id": r"^[1-9][0-9]{0,19}$",
          }
          for key, pattern in patterns.items():
              if not re.fullmatch(pattern, str(values[key])):
                  raise SystemExit(f"Qualification record has invalid {key}.")
          if values["qualification_run_id"] != qualification_run_id:
              raise SystemExit("Qualification artifact run ID does not match the selected workflow run.")
          if expected_staging_deployment_id and values["staging_deployment_id"] != expected_staging_deployment_id:
              raise SystemExit("Qualification staging deployment ID does not match manual input.")
          if values["build_id"].split("-", 1)[0] != values["source_workflow_run_id"]:
              raise SystemExit("Qualified build ID does not belong to the source workflow run.")

          with open(output_path, "a", encoding="utf-8") as output:
              for key, value in values.items():
                  output.write(f"{key}={value}\n")
              output.write(f"record_path={sys.argv[1]}\n")
          PY

      - name: Verify qualified source commit remains reachable from NutsNews main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
        run: |
          # shellcheck disable=SC2027,SC2034,SC2086
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from urllib.request import Request, urlopen

          source_commit = os.environ["SOURCE_COMMIT"]
          token = os.environ["GH_TOKEN"]
          request = Request(
              f"https://api.github.com/repos/ramideltoro/nutsnews/compare/{source_commit}...main",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2026-03-10",
              },
          )
          with urlopen(request, timeout=20) as response:  # noqa: S310 - fixed GitHub API origin
              comparison = json.load(response)
          if comparison.get("status") not in {"ahead", "identical"}:
              raise SystemExit("Qualified source commit is no longer reachable from NutsNews main.")
          PY

      - name: Checkout exact app source for release contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ramideltoro/nutsnews
          ref: ${{ steps.qualified.outputs.source_commit }}
          path: nutsnews-source
          persist-credentials: false

      - name: Resolve migration head and schema version from exact source
        id: release_contract
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";
          import { resolve } from "node:path";
          import { getMigrationContract, readApplicationMigrationContract } from "./nutsnews-source/scripts/migration_contract.mjs";

          const sourceCommit = process.env.SOURCE_COMMIT ?? "";
          const sourceRoot = resolve("nutsnews-source");
          if (!/^[0-9a-f]{40}$/.test(sourceCommit)) {
            throw new Error("Release contract resolution requires a trusted source commit.");
          }
          const [migrationContract, applicationContract] = await Promise.all([
            getMigrationContract(sourceRoot),
            readApplicationMigrationContract(sourceRoot),
          ]);
          if (migrationContract.head !== applicationContract.migrationHead) {
            throw new Error("Release source has mismatched repository and application migration heads.");
          }
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            [
              `migration_head=${migrationContract.head}`,
              `schema_version=${applicationContract.legacyVersion}`,
              "",
            ].join("\n"),
            "utf8",
          );
          console.log(`Resolved release schema contract for ${sourceCommit}.`);
          NODE

      - name: Verify production Supabase schema contract
        id: production_schema
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";

          const sourceCommit = process.env.SOURCE_COMMIT ?? "";
          const productionOrigin = "https://www.nutsnews.com";
          const migrationHead = process.env.MIGRATION_HEAD ?? "";
          const schemaVersion = process.env.SCHEMA_VERSION ?? "";
          const migrationWorkflow =
            "https://github.com/ramideltoro/nutsnews/actions/workflows/production-supabase-migration.yml";

          function migrationRequired(message) {
            throw new Error(
              `${message} Run ${migrationWorkflow} for source ${sourceCommit} and migration head ${migrationHead}, then rerun this promotion.`,
            );
          }

          if (
            !/^[0-9a-f]{40}$/.test(sourceCommit) ||
            !/^[0-9]{14}$/.test(migrationHead) ||
            !/^[0-9]{14}$/.test(schemaVersion)
          ) {
            throw new Error("Production schema verification received invalid release identity.");
          }

          const configUrl = new URL("/api/runtime-config", productionOrigin);
          const configResponse = await fetch(configUrl, { headers: { "Cache-Control": "no-cache" } });
          if (!configResponse.ok) {
            throw new Error(`Production runtime config returned HTTP ${configResponse.status}.`);
          }
          const config = await configResponse.json();
          if (
            config?.runtimeEnv !== "production" ||
            config?.sideEffectsMode !== "live" ||
            typeof config?.supabaseUrl !== "string" ||
            typeof config?.supabaseAnonKey !== "string"
          ) {
            throw new Error("Production runtime config did not expose the expected Supabase identity.");
          }

          const supabaseUrl = new URL(config.supabaseUrl);
          const refMatch = supabaseUrl.hostname.match(/^([a-z0-9]{20})\.supabase\.co$/);
          if (!refMatch) {
            throw new Error("Production Supabase URL does not identify an approved Supabase project ref.");
          }
          const supabaseProjectRef = refMatch[1];

          const rpcUrl = new URL("/rest/v1/rpc/nutsnews_migration_schema_contract", supabaseUrl);
          const rpcResponse = await fetch(rpcUrl, {
            method: "POST",
            headers: {
              Accept: "application/json",
              apikey: config.supabaseAnonKey,
              Authorization: `Bearer ${config.supabaseAnonKey}`,
              "Content-Type": "application/json",
            },
            body: "{}",
          });
          if (!rpcResponse.ok) {
            migrationRequired(`Production Supabase schema contract RPC returned HTTP ${rpcResponse.status}.`);
          }
          const payload = await rpcResponse.json();
          const row = Array.isArray(payload) ? payload[0] : payload;
          if (!row || typeof row !== "object") {
            migrationRequired("Production Supabase schema contract RPC returned no contract row.");
          }
          if (
            row.migration_head !== migrationHead ||
            row.legacy_schema_version !== schemaVersion ||
            !/^[a-f0-9]{32}$/.test(row.expected_schema_fingerprint ?? "") ||
            row.expected_schema_fingerprint !== row.actual_schema_fingerprint
          ) {
            migrationRequired(
              `Production Supabase is not compatible with this release: expected migration_head=${migrationHead} and schema_version=${schemaVersion}.`,
            );
          }

          appendFileSync(process.env.GITHUB_OUTPUT, `supabase_project_ref=${supabaseProjectRef}\n`, "utf8");
          console.log(`Verified production Supabase schema contract for ${sourceCommit}.`);
          NODE

      - name: Verify staging qualification attestation is current
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_REPOSITORY: ${{ steps.qualified.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          SOURCE_WORKFLOW_RUN_ID: ${{ steps.qualified.outputs.source_workflow_run_id }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
          SUPABASE_PROJECT_REF: ${{ steps.production_schema.outputs.supabase_project_ref }}
        run: |
          set -euo pipefail
          umask 077

          candidate_manifest="$RUNNER_TEMP/candidate-vps-release.yml"
          git fetch origin main --prune
          git show "origin/main:ansible/inventories/production/host_vars/vps.nutsnews.com.yml" \
            > "$candidate_manifest"
          python3 ansible/scripts/promote_nutsnews_release.py \
            --write \
            --manifest "$candidate_manifest" \
            --image-repository "$IMAGE_REPOSITORY" \
            --image-digest "$IMAGE_DIGEST" \
            --source-commit "$SOURCE_COMMIT" \
            --build-id "$BUILD_ID" \
            --migration-head "$MIGRATION_HEAD" \
            --schema-version "$SCHEMA_VERSION" \
            --supabase-project-ref "$SUPABASE_PROJECT_REF" > /dev/null

          gh attestation verify "oci://${IMAGE_REPOSITORY}@${IMAGE_DIGEST}" \
            --repo "$GITHUB_REPOSITORY" \
            --predicate-type https://nutsnews.com/attestations/staging-qualification/v1 \
            --format json > "$RUNNER_TEMP/verified-staging-attestation.json"
          python3 ansible/scripts/verify_production_eligibility.py verify \
            --manifest "$candidate_manifest" \
            --verified-attestation "$RUNNER_TEMP/verified-staging-attestation.json" \
            --source-commit "$SOURCE_COMMIT" \
            --image-digest "$IMAGE_DIGEST" \
            --build-id "$BUILD_ID" \
            --source-workflow-run-id "$SOURCE_WORKFLOW_RUN_ID" \
            --migration-head "$MIGRATION_HEAD" \
            --schema-version "$SCHEMA_VERSION" \
            --supabase-project-ref "$SUPABASE_PROJECT_REF" \
            --output "$RUNNER_TEMP/staging-qualification.json"

      - name: Create or reuse the checked release promotion pull request
        id: promotion
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NUTSNEWS_INFRA_RELEASE_TOKEN }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_REPOSITORY: ${{ steps.qualified.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          SOURCE_WORKFLOW_RUN_ID: ${{ steps.qualified.outputs.source_workflow_run_id }}
          STAGING_DEPLOYMENT_ID: ${{ steps.qualified.outputs.staging_deployment_id }}
          QUALIFICATION_RUN_ID: ${{ steps.qualified.outputs.qualification_run_id }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
          SUPABASE_PROJECT_REF: ${{ steps.production_schema.outputs.supabase_project_ref }}
        run: |
          set -euo pipefail
          if [[ -z "$GH_TOKEN" ]]; then
            echo "NUTSNEWS_INFRA_RELEASE_TOKEN is required for release GitOps automation." >&2
            exit 1
          fi

          release_branch="release/vps-${SOURCE_COMMIT}"
          current_manifest="$RUNNER_TEMP/current-vps-release.yml"
          git fetch origin main --prune
          git show "origin/main:ansible/inventories/production/host_vars/vps.nutsnews.com.yml" \
            > "$current_manifest"

          if python3 ansible/scripts/promote_nutsnews_release.py \
            --verify \
            --manifest "$current_manifest" \
            --image-repository "$IMAGE_REPOSITORY" \
            --image-digest "$IMAGE_DIGEST" \
            --source-commit "$SOURCE_COMMIT" \
            --build-id "$BUILD_ID" \
            --migration-head "$MIGRATION_HEAD" \
            --schema-version "$SCHEMA_VERSION" \
            --supabase-project-ref "$SUPABASE_PROJECT_REF" >/dev/null 2>&1; then
            echo "The current infrastructure manifest already matches this release."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          existing_pr="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$release_branch" \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [[ -n "$existing_pr" ]]; then
            echo "pr_url=$existing_pr" >> "$GITHUB_OUTPUT"
            echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git switch -c "$release_branch" origin/main
          python3 ansible/scripts/promote_nutsnews_release.py \
            --write \
            --manifest ansible/inventories/production/host_vars/vps.nutsnews.com.yml \
            --image-repository "$IMAGE_REPOSITORY" \
            --image-digest "$IMAGE_DIGEST" \
            --source-commit "$SOURCE_COMMIT" \
            --build-id "$BUILD_ID" \
            --migration-head "$MIGRATION_HEAD" \
            --schema-version "$SCHEMA_VERSION" \
            --supabase-project-ref "$SUPABASE_PROJECT_REF"
          git diff --check

          if git diff --quiet -- ansible/inventories/production/host_vars/vps.nutsnews.com.yml; then
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "nutsnews-release[bot]"
          git config user.email "nutsnews-release[bot]@users.noreply.github.com"
          git add ansible/inventories/production/host_vars/vps.nutsnews.com.yml
          git commit -m "deploy: promote NutsNews ${SOURCE_COMMIT} to VPS"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --set-upstream origin "$release_branch"

          printf '%s\n' \
            '## Automated NutsNews VPS release promotion' \
            '' \
            "This checked PR promotes the immutable staging-qualified image built from \`${SOURCE_COMMIT}\`." \
            '' \
            "- Image: \`${IMAGE_REPOSITORY}@${IMAGE_DIGEST}\`" \
            "- Build ID: \`${BUILD_ID}\`" \
            "- Source workflow run: https://github.com/ramideltoro/nutsnews/actions/runs/${SOURCE_WORKFLOW_RUN_ID}" \
            "- Staging deployment: \`${STAGING_DEPLOYMENT_ID}\`" \
            "- Staging qualification run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${QUALIFICATION_RUN_ID}" \
            "- Migration head: \`${MIGRATION_HEAD}\`" \
            "- Rollback-compatible schema: \`${SCHEMA_VERSION}\`" \
            "- Supabase project reference: \`${SUPABASE_PROJECT_REF}\`" \
            "- Qualified staging deployment: \`${STAGING_DEPLOYMENT_ID}\`" \
            "- Qualification run: ${QUALIFICATION_RUN_ID}" \
            '' \
            'The workflow waits for all required checks before merging, starts the protected Ansible apply, and then dispatches the exact same source commit to Vercel production.' \
            > "$RUNNER_TEMP/nutsnews-release-pr.md"

          pr_url="$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$release_branch" \
            --title "deploy: promote NutsNews ${SOURCE_COMMIT:0:12} to VPS" \
            --body-file "$RUNNER_TEMP/nutsnews-release-pr.md")"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"

      - name: Wait for promotion checks to pass and merge
        if: steps.promotion.outputs.pr_url != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NUTSNEWS_INFRA_RELEASE_TOKEN }}
          PR_URL: ${{ steps.promotion.outputs.pr_url }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 3600))
          checks_file="$RUNNER_TEMP/promotion-checks.json"
          checks_error_file="$RUNNER_TEMP/promotion-checks.stderr"

          while true; do
            set +e
            gh pr checks "$PR_URL" --json name,bucket > "$checks_file" 2> "$checks_error_file"
            checks_exit=$?
            set -e

            if [[ ! -s "$checks_file" ]]; then
              if grep -Fq 'no checks reported' "$checks_error_file"; then
                check_state="waiting"
              else
                cat "$checks_error_file" >&2
                exit "$checks_exit"
              fi
            else
              check_state="$(python3 - "$checks_file" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as checks_file:
              checks = json.load(checks_file)

          if not checks:
              print("waiting")
          elif any(check.get("bucket") in {"fail", "cancel"} for check in checks):
              print("failed")
          elif all(check.get("bucket") in {"pass", "skipping"} for check in checks):
              print("passed")
          else:
              print("waiting")
          PY
              )"
            fi

            case "$check_state" in
              passed)
                break
                ;;
              failed)
                echo "A VPS release promotion check failed or was cancelled." >&2
                exit 1
                ;;
              waiting)
                if (( SECONDS >= deadline )); then
                  echo "Promotion checks did not pass before the timeout." >&2
                  exit 1
                fi
                echo "Waiting for promotion checks to register and pass."
                sleep 10
                ;;
              *)
                echo "Unexpected promotion-check state: $check_state" >&2
                exit 1
                ;;
            esac
          done

          gh pr merge "$PR_URL" --merge --delete-branch

      - name: Verify merged manifest matches the release request
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_REPOSITORY: ${{ steps.qualified.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
          SUPABASE_PROJECT_REF: ${{ steps.production_schema.outputs.supabase_project_ref }}
        run: |
          set -euo pipefail
          git fetch origin main --prune
          git show "origin/main:ansible/inventories/production/host_vars/vps.nutsnews.com.yml" \
            > "$RUNNER_TEMP/vps.nutsnews.com.yml"
          python3 ansible/scripts/promote_nutsnews_release.py \
            --verify \
            --manifest "$RUNNER_TEMP/vps.nutsnews.com.yml" \
            --image-repository "$IMAGE_REPOSITORY" \
            --image-digest "$IMAGE_DIGEST" \
            --source-commit "$SOURCE_COMMIT" \
            --build-id "$BUILD_ID" \
            --migration-head "$MIGRATION_HEAD" \
            --schema-version "$SCHEMA_VERSION" \
            --supabase-project-ref "$SUPABASE_PROJECT_REF"

      - name: Start and wait for protected VPS apply
        id: apply
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NUTSNEWS_INFRA_RELEASE_TOKEN }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          SOURCE_WORKFLOW_RUN_ID: ${{ steps.qualified.outputs.source_workflow_run_id }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
          SUPABASE_PROJECT_REF: ${{ steps.production_schema.outputs.supabase_project_ref }}
        run: |
          set -euo pipefail
          if [[ -z "$GH_TOKEN" ]]; then
            echo "NUTSNEWS_INFRA_RELEASE_TOKEN is required to dispatch Protected Ansible Apply." >&2
            exit 1
          fi

          dispatch_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh workflow run protected-ansible-apply.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field run_mode=apply \
            --field confirm_apply=vps.nutsnews.com \
            --field sync_vercel_production=true \
            --field enable_cloudflare_ddns=false \
            --field enable_grafana_alloy=false \
            --field enable_staging_access=false \
            --field release_source_commit="$SOURCE_COMMIT" \
            --field release_image_digest="$IMAGE_DIGEST" \
            --field release_build_id="$BUILD_ID" \
            --field release_source_workflow_run_id="$SOURCE_WORKFLOW_RUN_ID" \
            --field release_migration_head="$MIGRATION_HEAD" \
            --field release_schema_version="$SCHEMA_VERSION" \
            --field release_supabase_project_ref="$SUPABASE_PROJECT_REF"

          release_title="Automated VPS release ${SOURCE_COMMIT}"
          runs_file="$RUNNER_TEMP/protected-ansible-runs.json"
          run_id=""
          for _ in $(seq 1 30); do
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow protected-ansible-apply.yml \
              --event workflow_dispatch \
              --branch main \
              --limit 30 \
              --json databaseId,displayTitle,status,createdAt \
              > "$runs_file"
            run_id="$(python3 -c 'import json, sys; print(next((str(run["databaseId"]) for run in json.load(open(sys.argv[1], encoding="utf-8")) if run.get("displayTitle") == sys.argv[2] and run.get("createdAt", "") >= sys.argv[3]), ""))' "$runs_file" "$release_title" "$dispatch_started_at")"
            if [[ -n "$run_id" ]]; then
              break
            fi
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo "Timed out locating the protected apply workflow run." >&2
            exit 1
          fi

          gh run watch "$run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Request and wait for Vercel production deploy
        id: vercel
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NUTSNEWS_APP_RELEASE_TOKEN }}
          NUTSNEWS_APP_RELEASE_TOKEN: ${{ secrets.NUTSNEWS_APP_RELEASE_TOKEN }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          VPS_APPLY_RUN_ID: ${{ steps.apply.outputs.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "$NUTSNEWS_APP_RELEASE_TOKEN" ]]; then
            echo "NUTSNEWS_APP_RELEASE_TOKEN is required to dispatch Vercel production." >&2
            exit 1
          fi

          dispatch_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node --input-type=module <<'NODE'
          const token = process.env.NUTSNEWS_APP_RELEASE_TOKEN ?? "";
          const payload = {
            source_repository: "ramideltoro/nutsnews",
            source_commit: process.env.SOURCE_COMMIT ?? "",
            image_digest: process.env.IMAGE_DIGEST ?? "",
            build_id: process.env.BUILD_ID ?? "",
            vps_apply_run_id: process.env.VPS_APPLY_RUN_ID ?? "",
          };
          const response = await fetch("https://api.github.com/repos/ramideltoro/nutsnews/dispatches", {
            method: "POST",
            headers: {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2026-03-10",
            },
            body: JSON.stringify({
              event_type: "nutsnews-vercel-production-release",
              client_payload: payload,
            }),
          });
          if (response.status !== 204) {
            throw new Error(`Vercel production dispatch returned ${response.status}.`);
          }
          NODE

          run_id=""
          run_url=""
          run_conclusion="unknown"
          vercel_status="failed"
          for _ in $(seq 1 60); do
            # shellcheck disable=SC2027,SC2086
            run_id="$(gh run list \
              --repo ramideltoro/nutsnews \
              --workflow vercel-production-release.yml \
              --event repository_dispatch \
              --branch main \
              --limit 50 \
              --json databaseId,displayTitle,createdAt \
              --jq ".[] | select(.displayTitle == \"Deploy Vercel production ${SOURCE_COMMIT}\" and .createdAt >= \"${dispatch_started_at}\") | .databaseId" \
              | head -n 1
            )"
            if [[ -n "$run_id" ]]; then
              break
            fi
            sleep 2
          done

          if [[ -z "$run_id" ]]; then
            echo "Timed out locating the Vercel production workflow run." >&2
          else
            run_url="$(gh run view "$run_id" --repo ramideltoro/nutsnews --json url --jq '.url')"
            if gh run watch "$run_id" --repo ramideltoro/nutsnews --exit-status; then
              vercel_status="success"
            else
              vercel_status="failed"
            fi
            run_conclusion="$(gh run view "$run_id" --repo ramideltoro/nutsnews --json conclusion --jq '.conclusion // \"unknown\"')"
          fi

          {
            echo "run_id=$run_id"
            echo "run_url=$run_url"
            echo "run_conclusion=$run_conclusion"
            echo "deploy_failed=$([[ "$vercel_status" == "failed" ]] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"
          if [[ "$vercel_status" == "failed" ]]; then
            if [[ -n "$run_id" ]]; then
              echo "Vercel production run ${run_id} ended as ${run_conclusion}" >&2
            else
              echo "Vercel production run failed to start or complete." >&2
            fi
          fi

          if [[ "$vercel_status" == "failed" && -z "$run_id" ]]; then
            exit 1
          fi

      - name: Roll back VPS release on Vercel production failure
        id: rollback
        if: steps.vercel.outputs.deploy_failed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.NUTSNEWS_INFRA_RELEASE_TOKEN }}
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          VERCEL_RUN_ID: ${{ steps.vercel.outputs.run_id }}
          VERCEL_RUN_CONCLUSION: ${{ steps.vercel.outputs.run_conclusion }}
        run: |
          # shellcheck disable=SC2027,SC2086
          set -euo pipefail

          if [[ -z "$GH_TOKEN" ]]; then
            echo "NUTSNEWS_INFRA_RELEASE_TOKEN is required for protected rollback dispatch." >&2
            exit 1
          fi

          dispatch_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          rollback_reason="vps release rollback triggered by Vercel failure for ${SOURCE_COMMIT} (Vercel ${VERCEL_RUN_ID}, ${VERCEL_RUN_CONCLUSION})"
          gh workflow run protected-nutsnews-rollback.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --field failed_image_digest="$IMAGE_DIGEST" \
            --field rollback_reason="$rollback_reason" \
            --field rollback_confirmation=rollback-recorded-last-known-good


          rollback_run_id=""
          for _ in $(seq 1 30); do
            # shellcheck disable=SC2027,SC2086
            rollback_run_id="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow protected-nutsnews-rollback.yml \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,createdAt \
              --jq ".[] | select(.createdAt >= \"${dispatch_started_at}\") | .databaseId" \
              | head -n 1
            )"
            if [[ -n "$rollback_run_id" ]]; then
              break
            fi
            sleep 2
          done

          if [[ -z "$rollback_run_id" ]]; then
            echo "Timed out locating the protected rollback workflow run." >&2
            exit 1
          fi

          gh run watch "$rollback_run_id" --repo "$GITHUB_REPOSITORY" --exit-status
          echo "run_id=$rollback_run_id" >> "$GITHUB_OUTPUT"

      - name: Summarize completed GitOps release
        if: ${{ always() }}
        shell: bash
        env:
          SOURCE_COMMIT: ${{ steps.qualified.outputs.source_commit }}
          IMAGE_REPOSITORY: ${{ steps.qualified.outputs.image_repository }}
          IMAGE_DIGEST: ${{ steps.qualified.outputs.image_digest }}
          BUILD_ID: ${{ steps.qualified.outputs.build_id }}
          STAGING_DEPLOYMENT_ID: ${{ steps.qualified.outputs.staging_deployment_id }}
          QUALIFICATION_RUN_ID: ${{ steps.qualified.outputs.qualification_run_id }}
          MIGRATION_HEAD: ${{ steps.release_contract.outputs.migration_head }}
          SCHEMA_VERSION: ${{ steps.release_contract.outputs.schema_version }}
          SUPABASE_PROJECT_REF: ${{ steps.production_schema.outputs.supabase_project_ref }}
          PR_URL: ${{ steps.promotion.outputs.pr_url }}
          APPLY_RUN_ID: ${{ steps.apply.outputs.run_id }}
          VERCEL_RUN_ID: ${{ steps.vercel.outputs.run_id }}
          VERCEL_RUN_URL: ${{ steps.vercel.outputs.run_url }}
          VERCEL_RUN_CONCLUSION: ${{ steps.vercel.outputs.run_conclusion }}
          VERCEL_DEPLOY_FAILED: ${{ steps.vercel.outputs.deploy_failed }}
          ROLLBACK_RUN_ID: ${{ steps.rollback.outputs.run_id }}
        run: |
          {
            echo "## NutsNews coupled production release"
            echo
            echo "- Source commit: \`${SOURCE_COMMIT}\`"
            echo "- Image: \`${IMAGE_REPOSITORY}@${IMAGE_DIGEST}\`"
            echo "- Build ID: \`${BUILD_ID}\`"
            echo "- Staging deployment: \`${STAGING_DEPLOYMENT_ID}\`"
            echo "- Staging qualification run: ${QUALIFICATION_RUN_ID}"
            echo "- Migration head: \`${MIGRATION_HEAD}\`"
            echo "- Rollback-compatible schema: \`${SCHEMA_VERSION}\`"
            echo "- Supabase project reference: \`${SUPABASE_PROJECT_REF}\`"
            if [[ -n "$PR_URL" ]]; then
              echo "- GitOps promotion PR: ${PR_URL}"
            else
              echo "- GitOps promotion PR: manifest already matched this release"
            fi
            echo "- Protected Ansible Apply run: ${APPLY_RUN_ID}"
            echo "- Vercel production deploy run: ${VERCEL_RUN_ID}"
            if [[ "$VERCEL_DEPLOY_FAILED" == "true" ]]; then
              echo "- Vercel deployment result: FAILED (${VERCEL_RUN_URL}, ${VERCEL_RUN_CONCLUSION})"
              echo "- Protected rollback run: ${ROLLBACK_RUN_ID:-(not started)}"
            else
              echo "- Vercel deployment result: SUCCESS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
