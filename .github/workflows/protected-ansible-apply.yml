              "vps_service_foundation_ops_portal_google_client_secret": os.environ["NUTSNEWS_GOOGLE_CLIENT_SECRET"],
              "vps_service_foundation_ops_portal_session_secret": os.environ["NUTSNEWS_OPS_PORTAL_SESSION_SECRET"],
