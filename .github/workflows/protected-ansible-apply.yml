name: Protected Ansible Apply

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Run the VPS baseline in check mode or apply mode.
        required: true
        default: check
        type: choice
        options:
          - check
          - apply
      confirm_apply:
        description: For apply mode only, type vps.nutsnews.com. Leave blank for check mode.
        required: false
        default: ""
        type: string
      enable_cloudflare_ddns:
        description: Enable the Cloudflare DDNS timer for vps.nutsnews.com.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      enable_grafana_alloy:
        description: Enable Grafana Alloy telemetry writes to Grafana Cloud.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read  # Required to check out the GitOps-managed Ansible playbooks.

concurrency:
  group: production-vps-ansible-baseline
  cancel-in-progress: false

jobs:
  baseline:
    name: VPS baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-vps

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate dispatch inputs
        shell: bash
        env:
          RUN_MODE: ${{ inputs.run_mode }}
          CONFIRM_APPLY: ${{ inputs.confirm_apply }}
        run: |
          set -euo pipefail

          if [[ "$RUN_MODE" != "check" && "$RUN_MODE" != "apply" ]]; then
            echo "Unsupported run_mode: $RUN_MODE" >&2
            exit 1
          fi

          if [[ "$RUN_MODE" == "apply" && "$CONFIRM_APPLY" != "vps.nutsnews.com" ]]; then
            echo "Apply mode requires confirm_apply to be exactly vps.nutsnews.com." >&2
            exit 1
          fi

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        shell: bash
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Validate required environment secrets
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
          NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          ENABLE_CLOUDFLARE_DDNS: ${{ inputs.enable_cloudflare_ddns }}
          ENABLE_GRAFANA_ALLOY: ${{ inputs.enable_grafana_alloy }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in \
            NUTSNEWS_VPS_SSH_PRIVATE_KEY \
            NUTSNEWS_VPS_KNOWN_HOSTS \
            NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON
          do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production-vps environment secret: $secret_name" >&2
              missing=1
            fi
          done

          if [[ "$ENABLE_CLOUDFLARE_DDNS" == "true" && -z "$NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN" ]]; then
            echo "Missing required production-vps environment secret: NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN" >&2
            missing=1
          fi

          if [[ "$ENABLE_GRAFANA_ALLOY" == "true" ]]; then
            for secret_name in \
              NUTSNEWS_GRAFANA_CLOUD_METRICS_URL \
              NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME \
              NUTSNEWS_GRAFANA_CLOUD_LOGS_URL \
              NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME \
              NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN
            do
              if [[ -z "${!secret_name}" ]]; then
                echo "Missing required production-vps environment secret: $secret_name" >&2
                missing=1
              fi
            done
          fi

          exit "$missing"

      - name: Prepare SSH material
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$NUTSNEWS_VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/nutsnews_vps"
          chmod 0600 "$HOME/.ssh/nutsnews_vps"

          printf '%s\n' "$NUTSNEWS_VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y -f "$HOME/.ssh/nutsnews_vps" > /dev/null
          ssh-keygen -F 65.75.202.112 -f "$HOME/.ssh/known_hosts" > /dev/null

      - name: Build runtime extra vars
        shell: bash
        working-directory: ansible
        env:
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
          NUTSNEWS_EMAIL_ENABLED: ${{ secrets.NUTSNEWS_EMAIL_ENABLED }}
          NUTSNEWS_SMTP_HOST: ${{ secrets.NUTSNEWS_SMTP_HOST }}
          NUTSNEWS_SMTP_PORT: ${{ secrets.NUTSNEWS_SMTP_PORT }}
          NUTSNEWS_SMTP_USERNAME: ${{ secrets.NUTSNEWS_SMTP_USERNAME }}
          NUTSNEWS_SMTP_PASSWORD: ${{ secrets.NUTSNEWS_SMTP_PASSWORD }}
          NUTSNEWS_SMTP_STARTTLS: ${{ secrets.NUTSNEWS_SMTP_STARTTLS }}
          NUTSNEWS_EMAIL_FROM: ${{ secrets.NUTSNEWS_EMAIL_FROM }}
          NUTSNEWS_EMAIL_TO: ${{ secrets.NUTSNEWS_EMAIL_TO }}
          NUTSNEWS_ALERT_COOLDOWN_SECONDS: ${{ secrets.NUTSNEWS_ALERT_COOLDOWN_SECONDS }}
          NUTSNEWS_REPORT_SUBJECT_PREFIX: ${{ secrets.NUTSNEWS_REPORT_SUBJECT_PREFIX }}
          NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN }}
          ENABLE_CLOUDFLARE_DDNS: ${{ inputs.enable_cloudflare_ddns }}
          NUTSNEWS_BACKUP_ENABLED: ${{ secrets.NUTSNEWS_BACKUP_ENABLED }}
          NUTSNEWS_BACKUP_REPOSITORY: ${{ secrets.NUTSNEWS_BACKUP_REPOSITORY }}
          NUTSNEWS_BACKUP_RESTIC_PASSWORD: ${{ secrets.NUTSNEWS_BACKUP_RESTIC_PASSWORD }}
          NUTSNEWS_BACKUP_RCLONE_CONFIG: ${{ secrets.NUTSNEWS_BACKUP_RCLONE_CONFIG }}
          NUTSNEWS_BACKUP_STALE_AFTER_HOURS: ${{ secrets.NUTSNEWS_BACKUP_STALE_AFTER_HOURS }}
          NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET: ${{ secrets.NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET }}
          NUTSNEWS_BACKUP_KEEP_DAILY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_DAILY }}
          NUTSNEWS_BACKUP_KEEP_WEEKLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_WEEKLY }}
          NUTSNEWS_BACKUP_KEEP_MONTHLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_MONTHLY }}
          NUTSNEWS_BACKUP_KEEP_YEARLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_YEARLY }}
          NUTSNEWS_APP_ENABLED: ${{ secrets.NUTSNEWS_APP_ENABLED }}
          NUTSNEWS_APP_ROUTE_ENABLED: ${{ secrets.NUTSNEWS_APP_ROUTE_ENABLED }}
          NUTSNEWS_APP_ROUTE_PATH: ${{ secrets.NUTSNEWS_APP_ROUTE_PATH }}
          NUTSNEWS_APP_CONTAINER_NAME: ${{ secrets.NUTSNEWS_APP_CONTAINER_NAME }}
          NUTSNEWS_APP_CONTAINER_PORT: ${{ secrets.NUTSNEWS_APP_CONTAINER_PORT }}
          NUTSNEWS_APP_HEALTH_PATH: ${{ secrets.NUTSNEWS_APP_HEALTH_PATH }}
          NUTSNEWS_APP_IMAGE_REPO: ${{ secrets.NUTSNEWS_APP_IMAGE_REPO }}
          NUTSNEWS_APP_IMAGE_TAG: ${{ secrets.NUTSNEWS_APP_IMAGE_TAG }}
          NUTSNEWS_APP_SECRET_ENV_KEYS: ${{ secrets.NUTSNEWS_APP_SECRET_ENV_KEYS }}
          NUTSNEWS_APP_REQUIRED_SECRETS: ${{ secrets.NUTSNEWS_APP_REQUIRED_SECRETS }}
          NUTSNEWS_APP_ENVS_JSON: ${{ secrets.NUTSNEWS_APP_ENVS_JSON }}
          NUTSNEWS_OPS_PORTAL_DOMAIN: ${{ secrets.NUTSNEWS_OPS_PORTAL_DOMAIN }}
          NUTSNEWS_OPS_PORTAL_CALLBACK_URL: ${{ secrets.NUTSNEWS_OPS_PORTAL_CALLBACK_URL }}
          NUTSNEWS_OPS_PORTAL_SESSION_SECRET: ${{ secrets.NUTSNEWS_OPS_PORTAL_SESSION_SECRET }}
          NUTSNEWS_GOOGLE_CLIENT_ID: ${{ secrets.NUTSNEWS_GOOGLE_CLIENT_ID }}
          NUTSNEWS_GOOGLE_CLIENT_SECRET: ${{ secrets.NUTSNEWS_GOOGLE_CLIENT_SECRET }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          NUTSNEWS_FREE_TIER_USAGE_JSON: ${{ secrets.NUTSNEWS_FREE_TIER_USAGE_JSON }}
          NUTSNEWS_VERCEL_API_TOKEN: ${{ secrets.NUTSNEWS_VERCEL_API_TOKEN }}
          NUTSNEWS_VERCEL_USAGE_API_URL: ${{ secrets.NUTSNEWS_VERCEL_USAGE_API_URL }}
          NUTSNEWS_SENTRY_AUTH_TOKEN: ${{ secrets.NUTSNEWS_SENTRY_AUTH_TOKEN }}
          NUTSNEWS_SENTRY_ORG: ${{ secrets.NUTSNEWS_SENTRY_ORG }}
          NUTSNEWS_SENTRY_BASE_URL: ${{ secrets.NUTSNEWS_SENTRY_BASE_URL }}
          NUTSNEWS_CLOUDFLARE_USAGE_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_USAGE_API_TOKEN }}
          NUTSNEWS_CLOUDFLARE_USAGE_API_URL: ${{ secrets.NUTSNEWS_CLOUDFLARE_USAGE_API_URL }}
          NUTSNEWS_BETTER_STACK_API_TOKEN: ${{ secrets.NUTSNEWS_BETTER_STACK_API_TOKEN }}
          NUTSNEWS_BETTER_STACK_USAGE_API_URL: ${{ secrets.NUTSNEWS_BETTER_STACK_USAGE_API_URL }}
          NUTSNEWS_SUPABASE_ACCESS_TOKEN: ${{ secrets.NUTSNEWS_SUPABASE_ACCESS_TOKEN }}
          NUTSNEWS_SUPABASE_USAGE_API_URL: ${{ secrets.NUTSNEWS_SUPABASE_USAGE_API_URL }}
          NUTSNEWS_GRAFANA_CLOUD_USAGE_API_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_USAGE_API_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_USAGE_API_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_USAGE_API_URL }}
          ENABLE_GRAFANA_ALLOY: ${{ inputs.enable_grafana_alloy }}
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          keys = json.loads(os.environ["NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON"])
          if not isinstance(keys, list) or not keys:
              raise SystemExit("NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON must be a non-empty JSON array.")

          if not all(isinstance(key, str) and key.strip() for key in keys):
              raise SystemExit("Every authorized key entry must be a non-empty string.")

          def truthy(name):
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}

          def env_int(name, default):
              value = os.environ.get(name, "").strip()
              if not value:
                  return default
              try:
                  return int(value)
              except ValueError as exc:
                  raise SystemExit(f"{name} must be an integer when set.") from exc

          def parse_csv(name):
              raw = os.environ.get(name, "").strip()
              if not raw:
                  return []
              values = []
              for value in raw.split(","):
                  value = value.strip()
                  if value:
                      values.append(value)
              return values

          def parse_app_envs(name):
              raw = os.environ.get(name, "").strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be valid JSON.") from exc
              if not isinstance(data, dict):
                  raise SystemExit(f"{name} must be a JSON object.")
              return {str(key): str(value).strip() for key, value in data.items()}

          def parse_json_object(name):
              raw = os.environ.get(name, "").strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be valid JSON.") from exc
              if not isinstance(data, dict):
                  raise SystemExit(f"{name} must be a JSON object.")
              return data

          def optional_https_url(name):
              value = os.environ.get(name, "").strip()
              if value and not value.startswith("https://"):
                  raise SystemExit(f"{name} must start with https:// when set.")
              return value

          backup_enabled = truthy("NUTSNEWS_BACKUP_ENABLED")
          backup_repository = (
              os.environ.get("NUTSNEWS_BACKUP_REPOSITORY", "").strip()
              or "rclone:nutsnews-onedrive:nutsnews-backups/vps"
          )
          if backup_enabled:
              missing = [
                  name
                  for name in ("NUTSNEWS_BACKUP_RESTIC_PASSWORD", "NUTSNEWS_BACKUP_RCLONE_CONFIG")
                  if not os.environ.get(name, "").strip()
              ]
              if missing:
                  raise SystemExit(
                      "Backups are enabled, but missing required production-vps Environment secrets: "
                      + ", ".join(missing)
                  )
              if not backup_repository.startswith("rclone:nutsnews-onedrive:"):
                  raise SystemExit(
                      "NUTSNEWS_BACKUP_REPOSITORY must use the dedicated nutsnews-onedrive rclone remote."
                  )

          app_enabled = truthy("NUTSNEWS_APP_ENABLED")
          app_route_enabled = truthy("NUTSNEWS_APP_ROUTE_ENABLED")
          if app_route_enabled and not app_enabled:
              raise SystemExit("NUTSNEWS_APP_ROUTE_ENABLED requires NUTSNEWS_APP_ENABLED to also be true.")

          app_image_repo = os.environ.get("NUTSNEWS_APP_IMAGE_REPO", "ghcr.io/ramideltoro/nutsnews").strip() or "ghcr.io/ramideltoro/nutsnews"
          app_image_tag = os.environ.get("NUTSNEWS_APP_IMAGE_TAG", "latest").strip() or "latest"
          app_container_name = os.environ.get("NUTSNEWS_APP_CONTAINER_NAME", "nutsnews-app").strip() or "nutsnews-app"
          app_container_port = env_int("NUTSNEWS_APP_CONTAINER_PORT", 3000)
          if app_container_port <= 0:
              raise SystemExit("NUTSNEWS_APP_CONTAINER_PORT must be a positive integer.")

          app_health_path = os.environ.get("NUTSNEWS_APP_HEALTH_PATH", "/healthz").strip() or "/healthz"
          if not app_health_path.startswith("/"):
              raise SystemExit("NUTSNEWS_APP_HEALTH_PATH must start with '/'.")

          app_route_path = os.environ.get("NUTSNEWS_APP_ROUTE_PATH", "/app-stage").strip() or "/app-stage"
          if not app_route_path.startswith("/"):
              raise SystemExit("NUTSNEWS_APP_ROUTE_PATH must start with '/'.")

          app_secret_env_keys = parse_csv("NUTSNEWS_APP_SECRET_ENV_KEYS")
          app_required_secrets = parse_csv("NUTSNEWS_APP_REQUIRED_SECRETS")
          app_envs = parse_app_envs("NUTSNEWS_APP_ENVS_JSON")
          free_tier_usage_json = parse_json_object("NUTSNEWS_FREE_TIER_USAGE_JSON")
          ops_portal_domain = os.environ.get("NUTSNEWS_OPS_PORTAL_DOMAIN", "ops.nutsnews.com").strip() or "ops.nutsnews.com"
          ops_portal_callback_path = "/api/auth/callback/google"
          ops_portal_callback_url = (
              os.environ.get("NUTSNEWS_OPS_PORTAL_CALLBACK_URL", "").strip()
              or f"https://{ops_portal_domain}{ops_portal_callback_path}"
          )
          allowed_callback_urls = {
              "production": "https://ops.nutsnews.com/api/auth/callback/google",
              "staging": "https://staging.ops.nutsnews.com/api/auth/callback/google",
              "dev": "https://dev.ops.nutsnews.com/api/auth/callback/google",
          }
          if ops_portal_callback_url not in allowed_callback_urls.values():
              raise SystemExit(
                  "NUTSNEWS_OPS_PORTAL_CALLBACK_URL must be one of the documented Google redirect URIs: "
                  + ", ".join(allowed_callback_urls.values())
              )
          parsed_callback = ops_portal_callback_url.removeprefix("https://")
          if "/" not in parsed_callback or parsed_callback.endswith("//api/auth/callback/google"):
              raise SystemExit("NUTSNEWS_OPS_PORTAL_CALLBACK_URL must include a concrete host.")
          if not ops_portal_callback_url.startswith("https://") or not ops_portal_callback_url.endswith(ops_portal_callback_path):
              raise SystemExit("NUTSNEWS_OPS_PORTAL_CALLBACK_URL must be https://<host>/api/auth/callback/google.")
          missing_auth = [
              name
              for name in (
                  "NUTSNEWS_GOOGLE_CLIENT_ID",
                  "NUTSNEWS_GOOGLE_CLIENT_SECRET",
                  "NUTSNEWS_OPS_PORTAL_SESSION_SECRET",
              )
              if not os.environ.get(name, "").strip()
          ]
          if missing_auth:
              raise SystemExit(
                  "Ops Portal Google OAuth is enabled by default but missing production-vps Environment secrets: "
                  + ", ".join(missing_auth)
              )
          if len(os.environ["NUTSNEWS_OPS_PORTAL_SESSION_SECRET"]) < 32:
              raise SystemExit("NUTSNEWS_OPS_PORTAL_SESSION_SECRET must be at least 32 characters.")

          grafana_alloy_enabled = truthy("ENABLE_GRAFANA_ALLOY")
          if grafana_alloy_enabled:
              missing_grafana = [
                  name
                  for name in (
                      "NUTSNEWS_GRAFANA_CLOUD_METRICS_URL",
                      "NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME",
                      "NUTSNEWS_GRAFANA_CLOUD_LOGS_URL",
                      "NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME",
                      "NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN",
                  )
                  if not os.environ.get(name, "").strip()
              ]
              if missing_grafana:
                  raise SystemExit(
                      "Grafana Alloy is enabled, but missing production-vps Environment secrets: "
                      + ", ".join(missing_grafana)
                  )
              for name in ("NUTSNEWS_GRAFANA_CLOUD_METRICS_URL", "NUTSNEWS_GRAFANA_CLOUD_LOGS_URL"):
                  if not os.environ[name].strip().startswith("https://"):
                      raise SystemExit(f"{name} must start with https://.")

          if app_required_secrets:
              for required_key in app_required_secrets:
                  if not isinstance(required_key, str) or not required_key.strip():
                      raise SystemExit("NUTSNEWS_APP_REQUIRED_SECRETS must be a comma-separated list of non-empty keys.")

          if app_required_secrets:
              missing_declared = [key for key in app_required_secrets if key not in app_secret_env_keys]
              if missing_declared and app_enabled:
                  raise SystemExit(
                      "NUTSNEWS_APP_REQUIRED_SECRETS contains keys not listed in NUTSNEWS_APP_SECRET_ENV_KEYS: "
                      + ", ".join(missing_declared)
                  )

          if app_enabled and app_required_secrets:
              for key in app_required_secrets:
                  if key not in app_envs or not str(app_envs[key]).strip():
                      raise SystemExit(
                          f"Required app secret '{key}' is missing or empty in NUTSNEWS_APP_ENVS_JSON."
                      )

          repository = os.environ["GITHUB_REPOSITORY"]
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{repository}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )

          extra_vars = {
              "vps_baseline_admin_authorized_keys": keys,
              "vps_service_foundation_apply_metadata_enabled": os.environ["RUN_MODE"] == "apply",
              "vps_service_foundation_deployed_infra_commit": os.environ["GITHUB_SHA"],
              "vps_service_foundation_email_enabled": truthy("NUTSNEWS_EMAIL_ENABLED"),
              "vps_service_foundation_email_smtp_host": os.environ.get("NUTSNEWS_SMTP_HOST", ""),
              "vps_service_foundation_email_smtp_port": env_int("NUTSNEWS_SMTP_PORT", 587),
              "vps_service_foundation_email_smtp_username": os.environ.get("NUTSNEWS_SMTP_USERNAME", ""),
              "vps_service_foundation_email_smtp_password": os.environ.get("NUTSNEWS_SMTP_PASSWORD", ""),
              "vps_service_foundation_email_smtp_starttls": truthy("NUTSNEWS_SMTP_STARTTLS") if os.environ.get("NUTSNEWS_SMTP_STARTTLS", "").strip() else True,
              "vps_service_foundation_email_from": os.environ.get("NUTSNEWS_EMAIL_FROM", ""),
              "vps_service_foundation_email_to": os.environ.get("NUTSNEWS_EMAIL_TO", ""),
              "vps_service_foundation_email_alert_cooldown_seconds": env_int("NUTSNEWS_ALERT_COOLDOWN_SECONDS", 21600),
              "vps_service_foundation_email_report_subject_prefix": os.environ.get(
                  "NUTSNEWS_REPORT_SUBJECT_PREFIX",
                  "NutsNews VPS",
              ),
              "vps_service_foundation_cloudflare_ddns_enabled": truthy("ENABLE_CLOUDFLARE_DDNS"),
              "vps_service_foundation_cloudflare_ddns_api_token": os.environ.get(
                  "NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN",
                  "",
              ),
              "vps_service_foundation_backup_enabled": backup_enabled,
              "vps_service_foundation_backup_repository": backup_repository,
              "vps_service_foundation_backup_restic_password": os.environ.get(
                  "NUTSNEWS_BACKUP_RESTIC_PASSWORD",
                  "",
              ),
              "vps_service_foundation_backup_rclone_config": os.environ.get(
                  "NUTSNEWS_BACKUP_RCLONE_CONFIG",
                  "",
              ),
              "vps_service_foundation_backup_stale_after_hours": env_int(
                  "NUTSNEWS_BACKUP_STALE_AFTER_HOURS",
                  30,
              ),
              "vps_service_foundation_backup_check_read_data_subset": os.environ.get(
                  "NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET",
                  "5%",
              )
              or "5%",
              "vps_service_foundation_backup_keep_daily": env_int("NUTSNEWS_BACKUP_KEEP_DAILY", 14),
              "vps_service_foundation_backup_keep_weekly": env_int("NUTSNEWS_BACKUP_KEEP_WEEKLY", 8),
              "vps_service_foundation_backup_keep_monthly": env_int("NUTSNEWS_BACKUP_KEEP_MONTHLY", 12),
              "vps_service_foundation_backup_keep_yearly": env_int("NUTSNEWS_BACKUP_KEEP_YEARLY", 2),
              "vps_service_foundation_nutsnews_app_enabled": app_enabled,
              "vps_service_foundation_nutsnews_app_route_enabled": app_route_enabled,
              "vps_service_foundation_nutsnews_app_route_path": app_route_path,
              "vps_service_foundation_nutsnews_app_container_name": app_container_name,
              "vps_service_foundation_nutsnews_app_container_port": app_container_port,
              "vps_service_foundation_nutsnews_app_health_path": app_health_path,
              "vps_service_foundation_nutsnews_app_image_repo": app_image_repo,
              "vps_service_foundation_nutsnews_app_image_tag": app_image_tag,
              "vps_service_foundation_nutsnews_app_secret_env_keys": app_secret_env_keys,
