          def require_match(pattern, value, label):
              if not re.fullmatch(pattern, value):
                  raise SystemExit(f"{label} is invalid.")
              return value

          def manifest_value(name):
              manifest = Path("inventories/production/host_vars/vps.nutsnews.com.yml")
              match = re.search(rf"(?m)^{re.escape(name)}:\s*(.*?)\s*$", manifest.read_text(encoding="utf-8"))
              return match.group(1).strip().strip('"\'') if match else ""

          release_manifest_mode = os.environ.get("RELEASE_MANIFEST_MODE", "reviewed_manifest").strip() or "reviewed_manifest"
          if release_manifest_mode == "premerge_candidate":
              release_source_commit = require_match(r"[0-9a-f]{40}", os.environ.get("RELEASE_SOURCE_COMMIT", ""), "Release source commit")
              release_image_digest = require_match(r"sha256:[0-9a-f]{64}", os.environ.get("RELEASE_IMAGE_DIGEST", ""), "Release image digest")
              release_build_id = require_match(r"[1-9][0-9]*-[1-9][0-9]*", os.environ.get("RELEASE_BUILD_ID", ""), "Release build ID")
              release_source_workflow_run_id = require_match(
                  r"[1-9][0-9]{0,19}",
                  os.environ.get("RELEASE_SOURCE_WORKFLOW_RUN_ID", ""),
                  "Release source workflow run ID",
              )
              release_deployment_id = require_match(
                  r"prod-[0-9a-f]{24}",
                  os.environ.get("RELEASE_DEPLOYMENT_ID", ""),
                  "Release deployment ID",
              )
              release_migration_head = require_match(r"[0-9]{14}", os.environ.get("RELEASE_MIGRATION_HEAD", ""), "Release migration head")
              release_schema_version = require_match(r"[0-9]{14}", os.environ.get("RELEASE_SCHEMA_VERSION", ""), "Release schema version")
              release_supabase_project_ref = require_match(
                  r"[a-z0-9]{20}",
                  os.environ.get("RELEASE_SUPABASE_PROJECT_REF", ""),
                  "Release Supabase project reference",
              )
              current_digest = require_match(
                  r"sha256:[0-9a-f]{64}",
                  manifest_value("vps_service_foundation_nutsnews_app_image_digest"),
                  "Current production manifest image digest",
              )
              extra_vars.update(
                  {
                      "vps_service_foundation_nutsnews_app_image_repo": "ghcr.io/ramideltoro/nutsnews",
                      "vps_service_foundation_nutsnews_app_image_digest": release_image_digest,
                      "vps_service_foundation_nutsnews_app_image_review_status": "reviewed",
                      "vps_service_foundation_nutsnews_app_source_commit": release_source_commit,
                      "vps_service_foundation_nutsnews_app_build_id": release_build_id,
                      "vps_service_foundation_nutsnews_app_source_workflow_run_id": release_source_workflow_run_id,
                      "vps_service_foundation_nutsnews_app_deployment_target": "production-vps",
                      "vps_service_foundation_nutsnews_app_last_known_good_digest": current_digest,
                      "vps_service_foundation_nutsnews_app_config_generation": f"production-{release_build_id}-{release_migration_head}",
                      "vps_service_foundation_nutsnews_app_deployment_id": release_deployment_id,
                      "vps_service_foundation_nutsnews_app_migration_head": release_migration_head,
                      "vps_service_foundation_nutsnews_app_schema_version": release_schema_version,
                      "vps_service_foundation_nutsnews_app_supabase_project_ref": release_supabase_project_ref,
                  }
              )
          elif release_manifest_mode != "reviewed_manifest":
              raise SystemExit("release_manifest_mode must be reviewed_manifest or premerge_candidate.")

          Path(".runtime-extra-vars.json").write_text(json.dumps(extra_vars) + "\n", encoding="utf-8")
          PY

          chmod 0600 .runtime-extra-vars.json

      - name: Inspect Cloudflare DDNS record
        if: inputs.enable_cloudflare_ddns == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN }}
          CLOUDFLARE_ZONE_NAME: nutsnews.com
          CLOUDFLARE_RECORD_NAME: vps.nutsnews.com
          CLOUDFLARE_RECORD_NAMES: vps.nutsnews.com,ops.nutsnews.com
          CLOUDFLARE_DDNS_INSPECT_ONLY: "1"
        run: |
          set -euo pipefail
          python3 ansible/roles/vps_service_foundation/files/cloudflare_ddns.py

      - name: Run Ansible baseline
        shell: bash
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          set -euo pipefail

          args=(
            playbooks/bootstrap.yml
            --inventory inventories/production/hosts.yml
            --limit vps.nutsnews.com
            --user nutsnews_ops
            --private-key "$HOME/.ssh/nutsnews_vps"
            --extra-vars @.runtime-extra-vars.json
            --ssh-common-args "-o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          )

          if [[ "$RUN_MODE" == "check" ]]; then
            args+=(--check --diff)
          else
            args+=(--diff)
          fi

          echo "Running Ansible baseline in $RUN_MODE mode as nutsnews_ops."
          set +e
          ansible-playbook "${args[@]}" 2>&1 | tee "$RUNNER_TEMP/ansible-output.log"
          ansible_status="${PIPESTATUS[0]}"
          set -e

          echo
          echo "Ansible recap"
          sed -n '/PLAY RECAP/,$p' "$RUNNER_TEMP/ansible-output.log"

          if [[ "$ansible_status" -ne 0 ]]; then
            echo "Ansible failed with exit code $ansible_status." >&2
          fi

          exit "$ansible_status"

      - name: Verify released Docker image over SSH
        if: inputs.release_source_commit != ''
        shell: bash
        env:
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
        run: |
          set -euo pipefail

          expected_image="ghcr.io/ramideltoro/nutsnews@${RELEASE_IMAGE_DIGEST}"
          actual="$(ssh \
            -i "$HOME/.ssh/nutsnews_vps" \
            -o "UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            -o StrictHostKeyChecking=yes \
            -o IdentitiesOnly=yes \
            nutsnews_ops@65.75.202.112 \
            "sudo docker inspect --format '{{.Config.Image}}|{{.State.Running}}|{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' nutsnews-app")"

          if [[ "$actual" != "$expected_image|true|healthy" ]]; then
            echo "The running VPS container does not match the reviewed immutable image or is unhealthy." >&2
            exit 1
          fi

      - name: Verify released public health identity
        if: inputs.release_source_commit != ''
        shell: bash
        env:
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_HEALTH_DEPLOYMENT_TARGET: ${{ env.RELEASE_HEALTH_DEPLOYMENT_TARGET }}
        run: |
          set -euo pipefail

          node --input-type=module <<'NODE'
          const sourceCommit = process.env.RELEASE_SOURCE_COMMIT ?? "";
          const buildId = process.env.RELEASE_BUILD_ID ?? "";
          const healthDeploymentTarget = process.env.RELEASE_HEALTH_DEPLOYMENT_TARGET ?? "";
          const delay = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds));

          if (
            !/^[0-9a-f]{40}$/.test(sourceCommit) ||
            !/^\d+-\d+$/.test(buildId) ||
            healthDeploymentTarget !== "vps"
          ) {
            throw new Error("Automated release health verification received invalid expected identity values.");
          }

          const url = new URL("https://vps.nutsnews.com/healthz");
          url.searchParams.set("release", sourceCommit);
          let lastFailure = "no response";
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              const response = await fetch(url, {
                headers: { "Cache-Control": "no-cache" },
              });
              const payload = await response.json();
              const valid =
                response.ok &&
                payload?.ok === true &&
                payload?.service === "nutsnews-web" &&
                payload?.sourceCommit === sourceCommit &&
                payload?.buildId === buildId &&
                payload?.deploymentTarget === healthDeploymentTarget &&
                response.headers.get("x-nutsnews-source-commit") === sourceCommit &&
                response.headers.get("x-nutsnews-build-id") === buildId &&
                response.headers.get("x-nutsnews-deployment-target") === healthDeploymentTarget;
              if (valid) {
                console.log(`Verified public VPS health identity for ${sourceCommit}.`);
                process.exit(0);
              }
              lastFailure = `unexpected health identity (HTTP ${response.status})`;
            } catch (error) {
              lastFailure = error instanceof Error ? error.message : String(error);
            }
            await delay(10_000);
          }
          throw new Error(`Timed out waiting for the released VPS identity: ${lastFailure}`);
          NODE

      - name: Checkout exact app post-production smoke suite
        if: inputs.release_source_commit != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ramideltoro/nutsnews
          ref: ${{ inputs.release_source_commit }}
          path: nutsnews-source
          persist-credentials: false

      - name: Checkout current app smoke helper
        if: inputs.release_source_commit != '' && inputs.release_smoke_helper_ref != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ramideltoro/nutsnews
          ref: ${{ inputs.release_smoke_helper_ref }}
          path: nutsnews-current-smoke
          sparse-checkout: scripts/dual_target_web_smoke.mjs
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Install current app smoke helper
        if: inputs.release_source_commit != '' && inputs.release_smoke_helper_ref != ''
        shell: bash
        run: |
          set -euo pipefail
          install -m 0644 \
            nutsnews-current-smoke/scripts/dual_target_web_smoke.mjs \
            nutsnews-source/scripts/dual_target_web_smoke.mjs
          node --check nutsnews-source/scripts/dual_target_web_smoke.mjs

      - name: Run safe production app smoke surfaces
        if: inputs.release_source_commit != ''
        shell: bash
        working-directory: nutsnews-source
        env:
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          PRODUCTION_WRITES_PAUSED: ${{ inputs.production_writes_paused }}
        run: |
          set -euo pipefail
          node scripts/dual_target_web_smoke.mjs \
            --base-url https://vps.nutsnews.com/ \
            --expected-source-commit "$RELEASE_SOURCE_COMMIT" \
            --expected-build-id "$RELEASE_BUILD_ID" \
            --expected-deployment-target production-vps \
            --expected-health-deployment-target vps \
            --expected-runtime-env production \
            --expected-image-digest "$RELEASE_IMAGE_DIGEST" \
            --expected-config-generation "production-${RELEASE_BUILD_ID}-${RELEASE_MIGRATION_HEAD}" \
            --expected-production-writes-paused "$PRODUCTION_WRITES_PAUSED" \
            --production-safe-surfaces

      - name: Remove temporary credentials and sync material
        if: always()
        shell: bash
        run: |
          set +e
          for path in \
            "$HOME/.ssh/nutsnews_vps" \
            "$HOME/.ssh/known_hosts" \
            "$RUNNER_TEMP/vercel-selected.json" \
            "$RUNNER_TEMP/vercel-classification.json" \
            "$RUNNER_TEMP/vps-env-fingerprints.json" \
            "$GITHUB_WORKSPACE/ansible/.runtime-extra-vars.json"
          do
            if [[ -e "$path" ]]; then
              shred -u "$path" 2>/dev/null || rm -f "$path"
            fi
          done
