              "vps_service_foundation_free_tier_vercel_usage_api_url": optional_https_url("NUTSNEWS_VERCEL_USAGE_API_URL"),
              "vps_service_foundation_free_tier_sentry_auth_token": os.environ.get("NUTSNEWS_SENTRY_AUTH_TOKEN", ""),
              "vps_service_foundation_free_tier_sentry_org": os.environ.get("NUTSNEWS_SENTRY_ORG", ""),
              "vps_service_foundation_free_tier_sentry_base_url": optional_https_url("NUTSNEWS_SENTRY_BASE_URL") or "https://sentry.io",
              "vps_service_foundation_free_tier_cloudflare_api_token": os.environ.get("NUTSNEWS_CLOUDFLARE_USAGE_API_TOKEN", ""),
              "vps_service_foundation_free_tier_cloudflare_usage_api_url": optional_https_url("NUTSNEWS_CLOUDFLARE_USAGE_API_URL"),
              "vps_service_foundation_free_tier_better_stack_api_token": os.environ.get("NUTSNEWS_BETTER_STACK_API_TOKEN", ""),
