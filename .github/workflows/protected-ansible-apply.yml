name: Protected Ansible Apply

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Run the VPS baseline in check mode or apply mode.
        required: true
        default: check
        type: choice
        options:
          - check
          - apply
      confirm_apply:
        description: For apply mode only, type vps.nutsnews.com. Leave blank for check mode.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: production-vps-ansible-baseline
  cancel-in-progress: false

jobs:
  baseline:
    name: VPS baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-vps

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Validate dispatch inputs
        shell: bash
        env:
          RUN_MODE: ${{ inputs.run_mode }}
          CONFIRM_APPLY: ${{ inputs.confirm_apply }}
        run: |
          set -euo pipefail

          if [[ "$RUN_MODE" != "check" && "$RUN_MODE" != "apply" ]]; then
            echo "Unsupported run_mode: $RUN_MODE" >&2
            exit 1
          fi

          if [[ "$RUN_MODE" == "apply" && "$CONFIRM_APPLY" != "vps.nutsnews.com" ]]; then
            echo "Apply mode requires confirm_apply to be exactly vps.nutsnews.com." >&2
            exit 1
          fi

      - name: Install Ansible
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Ansible collections
        shell: bash
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Validate required environment secrets
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in \
            NUTSNEWS_VPS_SSH_PRIVATE_KEY \
            NUTSNEWS_VPS_KNOWN_HOSTS \
            NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON
          do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production-vps environment secret: $secret_name" >&2
              missing=1
            fi
          done

          exit "$missing"

      - name: Prepare SSH material
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$NUTSNEWS_VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/nutsnews_vps"
          chmod 0600 "$HOME/.ssh/nutsnews_vps"

          printf '%s\n' "$NUTSNEWS_VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y -f "$HOME/.ssh/nutsnews_vps" > /dev/null
          ssh-keygen -F 65.75.202.112 -f "$HOME/.ssh/known_hosts" > /dev/null

      - name: Build runtime extra vars
        shell: bash
        working-directory: ansible
        env:
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
          NUTSNEWS_EMAIL_ENABLED: ${{ secrets.NUTSNEWS_EMAIL_ENABLED }}
          NUTSNEWS_SMTP_HOST: ${{ secrets.NUTSNEWS_SMTP_HOST }}
          NUTSNEWS_SMTP_PORT: ${{ secrets.NUTSNEWS_SMTP_PORT }}
          NUTSNEWS_SMTP_USERNAME: ${{ secrets.NUTSNEWS_SMTP_USERNAME }}
          NUTSNEWS_SMTP_PASSWORD: ${{ secrets.NUTSNEWS_SMTP_PASSWORD }}
          NUTSNEWS_SMTP_STARTTLS: ${{ secrets.NUTSNEWS_SMTP_STARTTLS }}
          NUTSNEWS_EMAIL_FROM: ${{ secrets.NUTSNEWS_EMAIL_FROM }}
          NUTSNEWS_EMAIL_TO: ${{ secrets.NUTSNEWS_EMAIL_TO }}
          NUTSNEWS_ALERT_COOLDOWN_SECONDS: ${{ secrets.NUTSNEWS_ALERT_COOLDOWN_SECONDS }}
          NUTSNEWS_REPORT_SUBJECT_PREFIX: ${{ secrets.NUTSNEWS_REPORT_SUBJECT_PREFIX }}
          NUTSNEWS_BACKUP_ENABLED: ${{ secrets.NUTSNEWS_BACKUP_ENABLED }}
          NUTSNEWS_BACKUP_REPOSITORY: ${{ secrets.NUTSNEWS_BACKUP_REPOSITORY }}
          NUTSNEWS_BACKUP_RESTIC_PASSWORD: ${{ secrets.NUTSNEWS_BACKUP_RESTIC_PASSWORD }}
          NUTSNEWS_BACKUP_RCLONE_CONFIG: ${{ secrets.NUTSNEWS_BACKUP_RCLONE_CONFIG }}
          NUTSNEWS_BACKUP_STALE_AFTER_HOURS: ${{ secrets.NUTSNEWS_BACKUP_STALE_AFTER_HOURS }}
          NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET: ${{ secrets.NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET }}
          NUTSNEWS_BACKUP_KEEP_DAILY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_DAILY }}
          NUTSNEWS_BACKUP_KEEP_WEEKLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_WEEKLY }}
          NUTSNEWS_BACKUP_KEEP_MONTHLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_MONTHLY }}
          NUTSNEWS_BACKUP_KEEP_YEARLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_YEARLY }}
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          keys = json.loads(os.environ["NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON"])
          if not isinstance(keys, list) or not keys:
              raise SystemExit("NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON must be a non-empty JSON array.")

          if not all(isinstance(key, str) and key.strip() for key in keys):
              raise SystemExit("Every authorized key entry must be a non-empty string.")

          def truthy(name):
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}

          def env_int(name, default):
              value = os.environ.get(name, "").strip()
              if not value:
                  return default
              try:
                  return int(value)
              except ValueError as exc:
                  raise SystemExit(f"{name} must be an integer when set.") from exc

          backup_enabled = truthy("NUTSNEWS_BACKUP_ENABLED")
          backup_repository = (
              os.environ.get("NUTSNEWS_BACKUP_REPOSITORY", "").strip()
              or "rclone:nutsnews-onedrive:nutsnews-backups/vps"
          )
          if backup_enabled:
              missing = [
                  name
                  for name in ("NUTSNEWS_BACKUP_RESTIC_PASSWORD", "NUTSNEWS_BACKUP_RCLONE_CONFIG")
                  if not os.environ.get(name, "").strip()
              ]
              if missing:
                  raise SystemExit(
                      "Backups are enabled, but missing required production-vps Environment secrets: "
                      + ", ".join(missing)
                  )
              if not backup_repository.startswith("rclone:nutsnews-onedrive:"):
                  raise SystemExit(
                      "NUTSNEWS_BACKUP_REPOSITORY must use the dedicated nutsnews-onedrive rclone remote."
                  )

          repository = os.environ["GITHUB_REPOSITORY"]
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{repository}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )

          extra_vars = {
              "vps_baseline_admin_authorized_keys": keys,
              "vps_service_foundation_apply_metadata_enabled": os.environ["RUN_MODE"] == "apply",
              "vps_service_foundation_deployed_infra_commit": os.environ["GITHUB_SHA"],
              "vps_service_foundation_email_enabled": truthy("NUTSNEWS_EMAIL_ENABLED"),
              "vps_service_foundation_email_smtp_host": os.environ.get("NUTSNEWS_SMTP_HOST", ""),
              "vps_service_foundation_email_smtp_port": env_int("NUTSNEWS_SMTP_PORT", 587),
              "vps_service_foundation_email_smtp_username": os.environ.get("NUTSNEWS_SMTP_USERNAME", ""),
              "vps_service_foundation_email_smtp_password": os.environ.get("NUTSNEWS_SMTP_PASSWORD", ""),
              "vps_service_foundation_email_smtp_starttls": truthy("NUTSNEWS_SMTP_STARTTLS") if os.environ.get("NUTSNEWS_SMTP_STARTTLS", "").strip() else True,
              "vps_service_foundation_email_from": os.environ.get("NUTSNEWS_EMAIL_FROM", ""),
              "vps_service_foundation_email_to": os.environ.get("NUTSNEWS_EMAIL_TO", ""),
              "vps_service_foundation_email_alert_cooldown_seconds": env_int("NUTSNEWS_ALERT_COOLDOWN_SECONDS", 21600),
              "vps_service_foundation_email_report_subject_prefix": os.environ.get(
                  "NUTSNEWS_REPORT_SUBJECT_PREFIX",
                  "NutsNews VPS",
              ),
              "vps_service_foundation_backup_enabled": backup_enabled,
              "vps_service_foundation_backup_repository": backup_repository,
              "vps_service_foundation_backup_restic_password": os.environ.get(
                  "NUTSNEWS_BACKUP_RESTIC_PASSWORD",
                  "",
              ),
              "vps_service_foundation_backup_rclone_config": os.environ.get(
                  "NUTSNEWS_BACKUP_RCLONE_CONFIG",
                  "",
              ),
              "vps_service_foundation_backup_stale_after_hours": env_int(
                  "NUTSNEWS_BACKUP_STALE_AFTER_HOURS",
                  30,
              ),
              "vps_service_foundation_backup_check_read_data_subset": os.environ.get(
                  "NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET",
                  "5%",
              )
              or "5%",
              "vps_service_foundation_backup_keep_daily": env_int("NUTSNEWS_BACKUP_KEEP_DAILY", 14),
              "vps_service_foundation_backup_keep_weekly": env_int("NUTSNEWS_BACKUP_KEEP_WEEKLY", 8),
              "vps_service_foundation_backup_keep_monthly": env_int("NUTSNEWS_BACKUP_KEEP_MONTHLY", 12),
              "vps_service_foundation_backup_keep_yearly": env_int("NUTSNEWS_BACKUP_KEEP_YEARLY", 2),
              "vps_service_foundation_apply_context": {
                  "status": "apply_started",
                  "repository": repository,
                  "branch": os.environ["GITHUB_REF_NAME"],
                  "commit": os.environ["GITHUB_SHA"],
                  "workflow": os.environ["GITHUB_WORKFLOW"],
                  "run_id": os.environ["GITHUB_RUN_ID"],
                  "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                  "run_url": run_url,
                  "actor": os.environ["GITHUB_ACTOR"],
              },
          }
          Path(".runtime-extra-vars.json").write_text(json.dumps(extra_vars) + "\n", encoding="utf-8")
          PY

          chmod 0600 .runtime-extra-vars.json

      - name: Run Ansible baseline
        shell: bash
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          set -euo pipefail

          args=(
            playbooks/bootstrap.yml
            --inventory inventories/production/hosts.yml
            --limit vps.nutsnews.com
            --user nutsnews_ops
            --private-key "$HOME/.ssh/nutsnews_vps"
            --extra-vars @.runtime-extra-vars.json
            --ssh-common-args "-o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          )

          if [[ "$RUN_MODE" == "check" ]]; then
            args+=(--check --diff)
          else
            args+=(--diff)
          fi

          echo "Running Ansible baseline in $RUN_MODE mode as nutsnews_ops."
          set +e
          ansible-playbook "${args[@]}" 2>&1 | tee "$RUNNER_TEMP/ansible-output.log"
          ansible_status="${PIPESTATUS[0]}"
          set -e

          echo
          echo "Ansible recap"
          sed -n '/PLAY RECAP/,$p' "$RUNNER_TEMP/ansible-output.log"

          if [[ "$ansible_status" -ne 0 ]]; then
            echo "Ansible failed with exit code $ansible_status." >&2
          fi

          exit "$ansible_status"
