name: Protected Ansible Apply

run-name: >-
  ${{ inputs.release_source_commit != '' &&
      format('Automated VPS release {0}', inputs.release_source_commit) ||
      format('Protected Ansible Apply ({0})', inputs.run_mode) }}

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: Run the VPS baseline in check mode or apply mode.
        required: true
        default: check
        type: choice
        options:
          - check
          - apply
      confirm_apply:
        description: For apply mode only, type vps.nutsnews.com. Leave blank for check mode.
        required: false
        default: ""
        type: string
      sync_vercel_production:
        description: Sync only the explicitly mapped Vercel Production variables to VPS production.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      production_writes_paused:
        description: Render the production app runtime with writer-pause enforcement enabled.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      enable_cloudflare_ddns:
        description: Enable the Cloudflare DDNS timer for vps.nutsnews.com.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      enable_grafana_alloy:
        description: Enable Grafana Alloy telemetry writes to Grafana Cloud.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      enable_staging_access:
        description: Materialize the reviewed staging hostname and origin Access boundary.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_source_commit:
        description: Optional verified app source commit for an automated release.
        required: false
        default: ""
        type: string
      release_image_digest:
        description: Optional verified immutable image digest for an automated release.
        required: false
        default: ""
        type: string
      release_build_id:
        description: Optional verified app build ID for an automated release.
        required: false
        default: ""
        type: string
      release_source_workflow_run_id:
        description: Optional trusted app source workflow run ID for an automated release.
        required: false
        default: ""
        type: string
      release_deployment_id:
        description: Optional deterministic pre-merge production deployment ID.
        required: false
        default: ""
        type: string
      release_smoke_helper_ref:
        description: Optional reviewed NutsNews app ref to overlay the current production smoke helper.
        required: false
        default: ""
        type: string
      release_migration_head:
        description: Optional verified migration head for an automated release.
        required: false
        default: ""
        type: string
      release_schema_version:
        description: Optional verified rollback-compatible schema marker for an automated release.
        required: false
        default: ""
        type: string
      release_supabase_project_ref:
        description: Optional verified Supabase project reference for an automated release.
        required: false
        default: ""
        type: string
      release_manifest_mode:
        description: Require the reviewed manifest or apply a protected pre-merge candidate override.
        required: true
        default: reviewed_manifest
        type: choice
        options:
          - reviewed_manifest
          - premerge_candidate
      rollback_failed_image_digest:
        description: Optional failed production digest when applying a fixed recorded rollback.
        required: false
        default: ""
        type: string
      rollback_reason:
        description: Optional sanitized reason for a fixed recorded rollback.
        required: false
        default: ""
        type: string
      rollback_confirmation:
        description: For fixed rollback only, type rollback-recorded-last-known-good.
        required: false
        default: ""
        type: string

permissions:
  contents: read  # Required to check out the GitOps-managed Ansible playbooks.

concurrency:
  group: production-vps-ansible-baseline
  cancel-in-progress: false

jobs:
  verify-production-eligibility:
    name: Verify production eligibility before secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      attestations: read
      contents: read
      deployments: read
    outputs:
      app_release: ${{ steps.eligibility.outputs.app_release }}
      staging_deployment_id: ${{ steps.eligibility.outputs.staging_deployment_id }}
      qualification_run_id: ${{ steps.eligibility.outputs.qualification_run_id }}
      expires_at: ${{ steps.eligibility.outputs.expires_at }}

    steps:
      - name: Checkout reviewed production verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Validate release input bundle
        id: release_inputs
        shell: bash
        env:
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_SOURCE_WORKFLOW_RUN_ID: ${{ inputs.release_source_workflow_run_id }}
          RELEASE_DEPLOYMENT_ID: ${{ inputs.release_deployment_id }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          RELEASE_SUPABASE_PROJECT_REF: ${{ inputs.release_supabase_project_ref }}
          RELEASE_MANIFEST_MODE: ${{ inputs.release_manifest_mode }}
          ROLLBACK_FAILED_IMAGE_DIGEST: ${{ inputs.rollback_failed_image_digest }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
          ROLLBACK_CONFIRMATION: ${{ inputs.rollback_confirmation }}
        run: |
          set -euo pipefail
          supplied=0
          for value in \
            "$RELEASE_SOURCE_COMMIT" \
            "$RELEASE_IMAGE_DIGEST" \
            "$RELEASE_BUILD_ID" \
            "$RELEASE_SOURCE_WORKFLOW_RUN_ID" \
            "$RELEASE_MIGRATION_HEAD" \
            "$RELEASE_SCHEMA_VERSION" \
            "$RELEASE_SUPABASE_PROJECT_REF"
          do
            if [[ -n "$value" ]]; then
              supplied=$((supplied + 1))
            fi
          done
          rollback_supplied=0
          for value in "$ROLLBACK_FAILED_IMAGE_DIGEST" "$ROLLBACK_REASON" "$ROLLBACK_CONFIRMATION"; do
            if [[ -n "$value" ]]; then
              rollback_supplied=$((rollback_supplied + 1))
            fi
          done
          if [[ "$RELEASE_MANIFEST_MODE" != "reviewed_manifest" && "$RELEASE_MANIFEST_MODE" != "premerge_candidate" ]]; then
            echo "release_manifest_mode must be reviewed_manifest or premerge_candidate." >&2
            exit 1
          fi
          if [[ -n "$RELEASE_DEPLOYMENT_ID" && ! "$RELEASE_DEPLOYMENT_ID" =~ ^prod-[0-9a-f]{24}$ ]]; then
            echo "release_deployment_id must be prod- followed by 24 lowercase hex characters when set." >&2
            exit 1
          fi
          if [[ "$supplied" -eq 0 ]]; then
            if [[ -n "$RELEASE_DEPLOYMENT_ID" || "$RELEASE_MANIFEST_MODE" != "reviewed_manifest" ]]; then
              echo "Pre-merge release mode and deployment ID require the complete release identity bundle." >&2
              exit 1
            fi
            if [[ "$rollback_supplied" -ne 0 ]]; then
              echo "Rollback inputs require the complete restored release identity bundle." >&2
              exit 1
            fi
            echo "app_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$supplied" -ne 7 ]]; then
            echo "Production app release verification requires source commit, image digest, build ID, source workflow run ID, migration head, schema version, and Supabase project reference together." >&2
            exit 1
          fi
          if [[ "$rollback_supplied" -ne 0 && "$rollback_supplied" -ne 3 ]]; then
            echo "Rollback verification requires failed digest, reason, and confirmation together." >&2
            exit 1
          fi
          if [[ "$RELEASE_MANIFEST_MODE" == "premerge_candidate" && -z "$RELEASE_DEPLOYMENT_ID" ]]; then
            echo "premerge_candidate releases require release_deployment_id." >&2
            exit 1
          fi
          echo "app_release=true" >> "$GITHUB_OUTPUT"

      - name: Verify baseline apply does not hide a production app release
        if: steps.release_inputs.outputs.app_release == 'false'
        shell: bash
        run: |
          set -euo pipefail
          previous_manifest="$RUNNER_TEMP/previous-vps-release.yml"
          current_manifest="ansible/inventories/production/host_vars/vps.nutsnews.com.yml"
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show "HEAD^:${current_manifest}" > "$previous_manifest" 2>/dev/null || rm -f "$previous_manifest"
          fi
          python3 ansible/scripts/verify_production_eligibility.py check-no-release \
            --current-manifest "$current_manifest" \
            --previous-manifest "$previous_manifest" \
            --github-output "$RUNNER_TEMP/production-eligibility-output"

      - name: Verify exact staged qualification
        if: steps.release_inputs.outputs.app_release == 'true' && inputs.rollback_confirmation != 'rollback-recorded-last-known-good'
        id: eligibility_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_SOURCE_WORKFLOW_RUN_ID: ${{ inputs.release_source_workflow_run_id }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          RELEASE_SUPABASE_PROJECT_REF: ${{ inputs.release_supabase_project_ref }}
          RELEASE_MANIFEST_MODE: ${{ inputs.release_manifest_mode }}
        run: |
          set -euo pipefail
          umask 077
          manifest_args=()
          if [[ "$RELEASE_MANIFEST_MODE" == "premerge_candidate" ]]; then
            manifest_args+=(--skip-manifest-verify)
          fi
          mkdir -p "$RUNNER_TEMP/production-eligibility"
          gh attestation verify "oci://ghcr.io/ramideltoro/nutsnews@${RELEASE_IMAGE_DIGEST}" \
            --repo "$GITHUB_REPOSITORY" \
            --predicate-type https://nutsnews.com/attestations/staging-qualification/v1 \
            --format json > "$RUNNER_TEMP/production-eligibility/verified-attestation.json"
          python3 ansible/scripts/verify_production_eligibility.py verify \
            --manifest ansible/inventories/production/host_vars/vps.nutsnews.com.yml \
            --verified-attestation "$RUNNER_TEMP/production-eligibility/verified-attestation.json" \
            --source-commit "$RELEASE_SOURCE_COMMIT" \
            --image-digest "$RELEASE_IMAGE_DIGEST" \
            --build-id "$RELEASE_BUILD_ID" \
            --source-workflow-run-id "$RELEASE_SOURCE_WORKFLOW_RUN_ID" \
            --migration-head "$RELEASE_MIGRATION_HEAD" \
            --schema-version "$RELEASE_SCHEMA_VERSION" \
            --supabase-project-ref "$RELEASE_SUPABASE_PROJECT_REF" \
            --output "$RUNNER_TEMP/production-eligibility/staging-qualification.json" \
            --github-output "$RUNNER_TEMP/production-eligibility-output" \
            "${manifest_args[@]}"

      - name: Verify fixed recorded rollback
        if: steps.release_inputs.outputs.app_release == 'true' && inputs.rollback_confirmation == 'rollback-recorded-last-known-good'
        shell: bash
        env:
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_SOURCE_WORKFLOW_RUN_ID: ${{ inputs.release_source_workflow_run_id }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          RELEASE_SUPABASE_PROJECT_REF: ${{ inputs.release_supabase_project_ref }}
          ROLLBACK_FAILED_IMAGE_DIGEST: ${{ inputs.rollback_failed_image_digest }}
          ROLLBACK_REASON: ${{ inputs.rollback_reason }}
          ROLLBACK_CONFIRMATION: ${{ inputs.rollback_confirmation }}
        run: |
          set -euo pipefail
          umask 077
          previous_manifest="$RUNNER_TEMP/previous-vps-release.yml"
          current_manifest="ansible/inventories/production/host_vars/vps.nutsnews.com.yml"
          git show "HEAD^:${current_manifest}" > "$previous_manifest"
          python3 ansible/scripts/verify_production_eligibility.py verify-rollback \
            --repo "$GITHUB_WORKSPACE" \
            --manifest "$current_manifest" \
            --previous-manifest "$previous_manifest" \
            --source-commit "$RELEASE_SOURCE_COMMIT" \
            --image-digest "$RELEASE_IMAGE_DIGEST" \
            --build-id "$RELEASE_BUILD_ID" \
            --source-workflow-run-id "$RELEASE_SOURCE_WORKFLOW_RUN_ID" \
            --migration-head "$RELEASE_MIGRATION_HEAD" \
            --schema-version "$RELEASE_SCHEMA_VERSION" \
            --supabase-project-ref "$RELEASE_SUPABASE_PROJECT_REF" \
            --failed-image-digest "$ROLLBACK_FAILED_IMAGE_DIGEST" \
            --reason "$ROLLBACK_REASON" \
            --confirmation "$ROLLBACK_CONFIRMATION" \
            --output "$RUNNER_TEMP/production-eligibility/rollback.json" \
            --github-output "$RUNNER_TEMP/production-eligibility-output"

      - name: Publish eligibility outputs
        id: eligibility
        shell: bash
        run: |
          set -euo pipefail
          test -s "$RUNNER_TEMP/production-eligibility-output"
          cat "$RUNNER_TEMP/production-eligibility-output" >> "$GITHUB_OUTPUT"

  baseline:
    name: VPS baseline
    needs: verify-production-eligibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-vps

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate reviewed app release state
        shell: bash
        run: python3 ansible/tests/validate_app_deployment.py

      - name: Validate requested automated release identity
        shell: bash
        env:
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_SOURCE_WORKFLOW_RUN_ID: ${{ inputs.release_source_workflow_run_id }}
          RELEASE_DEPLOYMENT_ID: ${{ inputs.release_deployment_id }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          RELEASE_SUPABASE_PROJECT_REF: ${{ inputs.release_supabase_project_ref }}
          RELEASE_MANIFEST_MODE: ${{ inputs.release_manifest_mode }}
        run: |
          set -euo pipefail

          supplied=0
          for value in "$RELEASE_SOURCE_COMMIT" "$RELEASE_IMAGE_DIGEST" "$RELEASE_BUILD_ID" "$RELEASE_SOURCE_WORKFLOW_RUN_ID" "$RELEASE_MIGRATION_HEAD" "$RELEASE_SCHEMA_VERSION" "$RELEASE_SUPABASE_PROJECT_REF"; do
            if [[ -n "$value" ]]; then
              supplied=$((supplied + 1))
            fi
          done
          if [[ "$supplied" -eq 0 ]]; then
            exit 0
          fi
          if [[ "$supplied" -ne 7 ]]; then
            echo "Automated release verification requires source commit, image digest, build ID, source workflow run ID, migration head, schema version, and Supabase project reference together." >&2
            exit 1
          fi

          manifest_args=(--verify --manifest ansible/inventories/production/host_vars/vps.nutsnews.com.yml)
          if [[ "$RELEASE_MANIFEST_MODE" == "premerge_candidate" ]]; then
            if [[ ! "$RELEASE_DEPLOYMENT_ID" =~ ^prod-[0-9a-f]{24}$ ]]; then
              echo "premerge_candidate releases require a deterministic prod-* deployment ID." >&2
              exit 1
            fi
            manifest_args=(--validate-only)
          fi
          release_state="$(python3 ansible/scripts/promote_nutsnews_release.py \
            "${manifest_args[@]}" \
            --image-repository ghcr.io/ramideltoro/nutsnews \
            --image-digest "$RELEASE_IMAGE_DIGEST" \
            --source-commit "$RELEASE_SOURCE_COMMIT" \
            --build-id "$RELEASE_BUILD_ID" \
            --migration-head "$RELEASE_MIGRATION_HEAD" \
            --schema-version "$RELEASE_SCHEMA_VERSION" \
            --supabase-project-ref "$RELEASE_SUPABASE_PROJECT_REF")"
          release_deployment_target="$(python3 -c 'import json, sys; print(json.load(sys.stdin).get("deployment_target", "production-vps"))' <<<"$release_state")"
          if [[ "$release_deployment_target" != "production-vps" ]]; then
            echo "Reviewed infrastructure deployment target must be production-vps." >&2
            exit 1
          fi
          printf 'RELEASE_IMAGE_DEPLOYMENT_TARGET=production-vps\n' >> "$GITHUB_ENV"
          # /healthz is baked into the shared VPS image at build time; /readyz
          # and runtime public config still report the production VPS runtime.
          printf 'RELEASE_HEALTH_DEPLOYMENT_TARGET=vps\n' >> "$GITHUB_ENV"
          echo "Verified reviewed infrastructure target and public app health target contract."

      - name: Validate dispatch inputs
        shell: bash
        env:
          RUN_MODE: ${{ inputs.run_mode }}
          CONFIRM_APPLY: ${{ inputs.confirm_apply }}
          SYNC_VERCEL_PRODUCTION: ${{ inputs.sync_vercel_production }}
          APP_RELEASE: ${{ needs.verify-production-eligibility.outputs.app_release }}
          ROLLBACK_CONFIRMATION: ${{ inputs.rollback_confirmation }}
          SMOKE_HELPER_REF: ${{ inputs.release_smoke_helper_ref }}
        run: |
          set -euo pipefail

          if [[ "$RUN_MODE" != "check" && "$RUN_MODE" != "apply" ]]; then
            echo "Unsupported run_mode: $RUN_MODE" >&2
            exit 1
          fi

          if [[ "$RUN_MODE" == "apply" && "$CONFIRM_APPLY" != "vps.nutsnews.com" ]]; then
            echo "Apply mode requires confirm_apply to be exactly vps.nutsnews.com." >&2
            exit 1
          fi

          if [[ "$SYNC_VERCEL_PRODUCTION" != "true" && "$SYNC_VERCEL_PRODUCTION" != "false" ]]; then
            echo "sync_vercel_production must be true or false." >&2
            exit 1
          fi
          if [[ -n "$SMOKE_HELPER_REF" && ! "$SMOKE_HELPER_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release_smoke_helper_ref must be a full lowercase SHA when set." >&2
            exit 1
          fi

          if [[ "$APP_RELEASE" == "true" && "$SYNC_VERCEL_PRODUCTION" == "false" && "$ROLLBACK_CONFIRMATION" != "rollback-recorded-last-known-good" ]]; then
            echo "Production app releases must set sync_vercel_production=true unless this is a fixed rollback replay." >&2
            exit 1
          fi

      - name: Set up Python with pip cache
        id: setup_python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: .github/requirements/production-ansible.txt

      - name: Cache production Ansible virtual environment
        id: production_ansible_venv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .venv/production-ansible
          key: production-ansible-venv-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-${{ hashFiles('.github/requirements/production-ansible.txt') }}

      - name: Install production Ansible
        if: steps.production_ansible_venv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv .venv/production-ansible
          .venv/production-ansible/bin/python -m pip install --upgrade pip
          .venv/production-ansible/bin/python -m pip install -r .github/requirements/production-ansible.txt

      - name: Add production Ansible virtual environment to PATH
        shell: bash
        run: |
          set -euo pipefail
          test -x .venv/production-ansible/bin/ansible-galaxy
          test -x .venv/production-ansible/bin/ansible-playbook
          echo "$GITHUB_WORKSPACE/.venv/production-ansible/bin" >> "$GITHUB_PATH"
          echo "ANSIBLE_COLLECTIONS_PATH=$GITHUB_WORKSPACE/.ansible/collections" >> "$GITHUB_ENV"

      - name: Cache production Ansible Galaxy collections
        id: production_ansible_collections
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .ansible/collections
          key: production-ansible-collections-${{ runner.os }}-${{ hashFiles('ansible/requirements.yml') }}

      - name: Install production Ansible Galaxy collections
        if: steps.production_ansible_collections.outputs.cache-hit != 'true'
        shell: bash
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections
        run: |
          set -euo pipefail
          cd ansible
          ansible-galaxy collection install -r requirements.yml --collections-path "$GITHUB_WORKSPACE/.ansible/collections"

      - name: Validate required environment secrets
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
          NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          NUTSNEWS_VERCEL_TOKEN: ${{ secrets.NUTSNEWS_VERCEL_TOKEN }}
          NUTSNEWS_VERCEL_PROJECT_ID: ${{ secrets.NUTSNEWS_VERCEL_PROJECT_ID }}
          NUTSNEWS_VERCEL_TEAM_ID: ${{ secrets.NUTSNEWS_VERCEL_TEAM_ID }}
          NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET: ${{ secrets.NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET }}
          ENABLE_CLOUDFLARE_DDNS: ${{ inputs.enable_cloudflare_ddns }}
          ENABLE_GRAFANA_ALLOY: ${{ inputs.enable_grafana_alloy }}
          ENABLE_STAGING_ACCESS: ${{ inputs.enable_staging_access }}
          PRODUCTION_WRITES_PAUSED: ${{ inputs.production_writes_paused }}
          NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN: ${{ secrets.NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN }}
          NUTSNEWS_STAGING_ACCESS_AUDIENCE: ${{ secrets.NUTSNEWS_STAGING_ACCESS_AUDIENCE }}
          NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY: ${{ secrets.NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY }}
          SYNC_VERCEL_PRODUCTION: ${{ inputs.sync_vercel_production }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in \
            NUTSNEWS_VPS_SSH_PRIVATE_KEY \
            NUTSNEWS_VPS_KNOWN_HOSTS \
            NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON
          do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production-vps environment secret: $secret_name" >&2
              missing=1
            fi
          done

          if [[ "$ENABLE_CLOUDFLARE_DDNS" == "true" && -z "$NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN" ]]; then
            echo "Missing required production-vps environment secret: NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN" >&2
            missing=1
          fi

          if [[ "$ENABLE_GRAFANA_ALLOY" == "true" ]]; then
            for secret_name in \
              NUTSNEWS_GRAFANA_CLOUD_METRICS_URL \
              NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME \
              NUTSNEWS_GRAFANA_CLOUD_LOGS_URL \
              NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME \
              NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN
            do
              if [[ -z "${!secret_name}" ]]; then
                echo "Missing required production-vps environment secret: $secret_name" >&2
                missing=1
              fi
            done
          fi

          if [[ "$ENABLE_STAGING_ACCESS" == "true" ]]; then
            for secret_name in \
              NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN \
              NUTSNEWS_STAGING_ACCESS_AUDIENCE \
              NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY
            do
              if [[ -z "${!secret_name}" ]]; then
                echo "Missing required production-vps environment secret: $secret_name" >&2
                missing=1
              fi
            done
          fi

          if [[ "$SYNC_VERCEL_PRODUCTION" == "true" ]]; then
            for secret_name in \
              NUTSNEWS_VERCEL_TOKEN \
              NUTSNEWS_VERCEL_PROJECT_ID \
              NUTSNEWS_VERCEL_TEAM_ID
            do
              if [[ -z "${!secret_name}" ]]; then
                echo "Missing required production-vps environment secret: $secret_name" >&2
                missing=1
              fi
            done
          fi

          if [[ -n "$NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET" ]]; then
            if [[ ${#NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET} -lt 32 || ${#NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET} -gt 512 ]]; then
              echo "NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET must be between 32 and 512 characters when configured." >&2
              missing=1
            fi
          fi

          exit "$missing"

      - name: Prepare SSH material
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          umask 077

          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$NUTSNEWS_VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/nutsnews_vps"
          chmod 0600 "$HOME/.ssh/nutsnews_vps"

          printf '%s\n' "$NUTSNEWS_VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y -f "$HOME/.ssh/nutsnews_vps" > /dev/null
          ssh-keygen -F 65.75.202.112 -f "$HOME/.ssh/known_hosts" > /dev/null

      - name: Fetch and diff reviewed Vercel Production variables
        if: inputs.sync_vercel_production == 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.NUTSNEWS_VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.NUTSNEWS_VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.NUTSNEWS_VERCEL_TEAM_ID }}
        run: |
          set -euo pipefail
          umask 077

          selected_file="$RUNNER_TEMP/vercel-selected.json"
          report_file="$RUNNER_TEMP/vercel-classification.json"
          target_file="$RUNNER_TEMP/vps-env-fingerprints.json"
          python3 scripts/vercel_vps_env_sync.py fetch \
            --mapping config/vercel-vps-env-sync.json \
            --output "$selected_file" \
            --report-output "$report_file"

          ssh_args=(
            -i "$HOME/.ssh/nutsnews_vps"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o IdentitiesOnly=yes
          )
          ssh "${ssh_args[@]}" nutsnews_ops@65.75.202.112 \
            "sudo -n python3 - fingerprint --path /etc/nutsnews/nutsnews-app.env" \
            < scripts/vercel_vps_env_sync.py > "$target_file"

          python3 scripts/vercel_vps_env_sync.py diff \
            --mapping config/vercel-vps-env-sync.json \
            --selected "$selected_file" \
            --target "$target_file" \
            --report "$report_file"

      - name: Build runtime extra vars
        shell: bash
        working-directory: ansible
        env:
          NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON: ${{ secrets.NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON }}
          NUTSNEWS_EMAIL_ENABLED: ${{ secrets.NUTSNEWS_EMAIL_ENABLED }}
          NUTSNEWS_SMTP_HOST: ${{ secrets.NUTSNEWS_SMTP_HOST }}
          NUTSNEWS_SMTP_PORT: ${{ secrets.NUTSNEWS_SMTP_PORT }}
          NUTSNEWS_SMTP_USERNAME: ${{ secrets.NUTSNEWS_SMTP_USERNAME }}
          NUTSNEWS_SMTP_PASSWORD: ${{ secrets.NUTSNEWS_SMTP_PASSWORD }}
          NUTSNEWS_SMTP_STARTTLS: ${{ secrets.NUTSNEWS_SMTP_STARTTLS }}
          NUTSNEWS_EMAIL_FROM: ${{ secrets.NUTSNEWS_EMAIL_FROM }}
          NUTSNEWS_EMAIL_TO: ${{ secrets.NUTSNEWS_EMAIL_TO }}
          NUTSNEWS_ALERT_COOLDOWN_SECONDS: ${{ secrets.NUTSNEWS_ALERT_COOLDOWN_SECONDS }}
          NUTSNEWS_REPORT_SUBJECT_PREFIX: ${{ secrets.NUTSNEWS_REPORT_SUBJECT_PREFIX }}
          NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_DDNS_API_TOKEN }}
          ENABLE_CLOUDFLARE_DDNS: ${{ inputs.enable_cloudflare_ddns }}
          NUTSNEWS_BACKUP_ENABLED: ${{ secrets.NUTSNEWS_BACKUP_ENABLED }}
          NUTSNEWS_BACKUP_REPOSITORY: ${{ secrets.NUTSNEWS_BACKUP_REPOSITORY }}
          NUTSNEWS_BACKUP_RESTIC_PASSWORD: ${{ secrets.NUTSNEWS_BACKUP_RESTIC_PASSWORD }}
          NUTSNEWS_BACKUP_RCLONE_CONFIG: ${{ secrets.NUTSNEWS_BACKUP_RCLONE_CONFIG }}
          NUTSNEWS_BACKUP_STALE_AFTER_HOURS: ${{ secrets.NUTSNEWS_BACKUP_STALE_AFTER_HOURS }}
          NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET: ${{ secrets.NUTSNEWS_BACKUP_CHECK_READ_DATA_SUBSET }}
          NUTSNEWS_BACKUP_KEEP_DAILY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_DAILY }}
          NUTSNEWS_BACKUP_KEEP_WEEKLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_WEEKLY }}
          NUTSNEWS_BACKUP_KEEP_MONTHLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_MONTHLY }}
          NUTSNEWS_BACKUP_KEEP_YEARLY: ${{ secrets.NUTSNEWS_BACKUP_KEEP_YEARLY }}
          NUTSNEWS_APP_ENVS_JSON: ${{ secrets.NUTSNEWS_APP_ENVS_JSON }}
          NUTSNEWS_OPS_PORTAL_DOMAIN: ${{ secrets.NUTSNEWS_OPS_PORTAL_DOMAIN }}
          NUTSNEWS_OPS_PORTAL_CALLBACK_URL: ${{ secrets.NUTSNEWS_OPS_PORTAL_CALLBACK_URL }}
          NUTSNEWS_OPS_PORTAL_SESSION_SECRET: ${{ secrets.NUTSNEWS_OPS_PORTAL_SESSION_SECRET }}
          NUTSNEWS_GOOGLE_CLIENT_ID: ${{ secrets.NUTSNEWS_GOOGLE_CLIENT_ID }}
          NUTSNEWS_GOOGLE_CLIENT_SECRET: ${{ secrets.NUTSNEWS_GOOGLE_CLIENT_SECRET }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_URL }}
          NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME }}
          NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_URL }}
          NUTSNEWS_GRAFANA_CLOUD_SERVICE_ACCOUNT_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_SERVICE_ACCOUNT_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_USAGE_DATASOURCE_UID: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_USAGE_DATASOURCE_UID }}
          NUTSNEWS_FREE_TIER_USAGE_JSON: ${{ secrets.NUTSNEWS_FREE_TIER_USAGE_JSON }}
          NUTSNEWS_VERCEL_API_TOKEN: ${{ secrets.NUTSNEWS_VERCEL_API_TOKEN }}
          NUTSNEWS_VERCEL_USAGE_API_URL: ${{ secrets.NUTSNEWS_VERCEL_USAGE_API_URL }}
          NUTSNEWS_SENTRY_AUTH_TOKEN: ${{ secrets.NUTSNEWS_SENTRY_AUTH_TOKEN }}
          NUTSNEWS_SENTRY_ORG: ${{ secrets.NUTSNEWS_SENTRY_ORG }}
          NUTSNEWS_SENTRY_BASE_URL: ${{ secrets.NUTSNEWS_SENTRY_BASE_URL }}
          NUTSNEWS_CLOUDFLARE_USAGE_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_USAGE_API_TOKEN }}
          NUTSNEWS_CLOUDFLARE_USAGE_API_URL: ${{ secrets.NUTSNEWS_CLOUDFLARE_USAGE_API_URL }}
          NUTSNEWS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.NUTSNEWS_CLOUDFLARE_ACCOUNT_ID }}
          NUTSNEWS_BETTER_STACK_API_TOKEN: ${{ secrets.NUTSNEWS_BETTER_STACK_API_TOKEN }}
          NUTSNEWS_BETTER_STACK_USAGE_API_URL: ${{ secrets.NUTSNEWS_BETTER_STACK_USAGE_API_URL }}
          NUTSNEWS_SUPABASE_ACCESS_TOKEN: ${{ secrets.NUTSNEWS_SUPABASE_ACCESS_TOKEN }}
          NUTSNEWS_SUPABASE_USAGE_API_URL: ${{ secrets.NUTSNEWS_SUPABASE_USAGE_API_URL }}
          NUTSNEWS_GRAFANA_CLOUD_USAGE_API_TOKEN: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_USAGE_API_TOKEN }}
          NUTSNEWS_GRAFANA_CLOUD_USAGE_API_URL: ${{ secrets.NUTSNEWS_GRAFANA_CLOUD_USAGE_API_URL }}
          NUTSNEWS_GITHUB_USAGE_API_TOKEN: ${{ secrets.NUTSNEWS_GITHUB_USAGE_API_TOKEN }}
          NUTSNEWS_GITHUB_ACTIONS_USAGE_API_URL: ${{ secrets.NUTSNEWS_GITHUB_ACTIONS_USAGE_API_URL }}
          NUTSNEWS_FAILOVER_CONTROLLER_STATUS_URL: https://nutsnews-controller.nutsnews.workers.dev/status?mode=dashboard
          NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET: ${{ secrets.NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET }}
          NUTSNEWS_FAILOVER_RUNBOOK_URL: https://github.com/ramideltoro/nutsnews/blob/main/.github/deployment/failover-visibility-runbook.md
          NUTSNEWS_FAILOVER_CLOUDFLARE_DASHBOARD_URL: ${{ secrets.NUTSNEWS_FAILOVER_CLOUDFLARE_DASHBOARD_URL }}
          ENABLE_GRAFANA_ALLOY: ${{ inputs.enable_grafana_alloy }}
          ENABLE_STAGING_ACCESS: ${{ inputs.enable_staging_access }}
          NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN: ${{ secrets.NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN }}
          NUTSNEWS_STAGING_ACCESS_AUDIENCE: ${{ secrets.NUTSNEWS_STAGING_ACCESS_AUDIENCE }}
          NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY: ${{ secrets.NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY }}
          PRODUCTION_WRITES_PAUSED: ${{ inputs.production_writes_paused }}
          SYNC_VERCEL_PRODUCTION: ${{ inputs.sync_vercel_production }}
          NUTSNEWS_VERCEL_SYNC_ENVS_FILE: ${{ runner.temp }}/vercel-selected.json
          RELEASE_SOURCE_COMMIT: ${{ inputs.release_source_commit }}
          RELEASE_IMAGE_DIGEST: ${{ inputs.release_image_digest }}
          RELEASE_BUILD_ID: ${{ inputs.release_build_id }}
          RELEASE_SOURCE_WORKFLOW_RUN_ID: ${{ inputs.release_source_workflow_run_id }}
          RELEASE_DEPLOYMENT_ID: ${{ inputs.release_deployment_id }}
          RELEASE_MIGRATION_HEAD: ${{ inputs.release_migration_head }}
          RELEASE_SCHEMA_VERSION: ${{ inputs.release_schema_version }}
          RELEASE_SUPABASE_PROJECT_REF: ${{ inputs.release_supabase_project_ref }}
          RELEASE_MANIFEST_MODE: ${{ inputs.release_manifest_mode }}
          ELIGIBILITY_STAGING_DEPLOYMENT_ID: ${{ needs.verify-production-eligibility.outputs.staging_deployment_id }}
          ELIGIBILITY_QUALIFICATION_RUN_ID: ${{ needs.verify-production-eligibility.outputs.qualification_run_id }}
          ELIGIBILITY_EXPIRES_AT: ${{ needs.verify-production-eligibility.outputs.expires_at }}
          ROLLBACK_FAILED_IMAGE_DIGEST: ${{ inputs.rollback_failed_image_digest }}
          ROLLBACK_CONFIRMATION: ${{ inputs.rollback_confirmation }}
          RUN_MODE: ${{ inputs.run_mode }}
        run: |
          set -euo pipefail
          umask 077

          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from urllib.parse import parse_qs, urlparse

          FAILOVER_CONTROLLER_STATUS_URL = "https://nutsnews-controller.nutsnews.workers.dev/status?mode=dashboard"
          FAILOVER_CONTROLLER_STATUS_HOST = "nutsnews-controller.nutsnews.workers.dev"
          MAX_RUNTIME_SECRET_LENGTH = 512

          keys = json.loads(os.environ["NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON"])
          if not isinstance(keys, list) or not keys:
              raise SystemExit("NUTSNEWS_VPS_ADMIN_AUTHORIZED_KEYS_JSON must be a non-empty JSON array.")

          if not all(isinstance(key, str) and key.strip() for key in keys):
              raise SystemExit("Every authorized key entry must be a non-empty string.")

          def truthy(name):
              return os.environ.get(name, "").strip().lower() in {"1", "true", "yes", "on"}

          def env_int(name, default):
              value = os.environ.get(name, "").strip()
              if not value:
                  return default
              try:
                  return int(value)
              except ValueError as exc:
                  raise SystemExit(f"{name} must be an integer when set.") from exc

          def parse_app_envs(name):
              raw = os.environ.get(name, "").strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be valid JSON.") from exc
              if not isinstance(data, dict):
                  raise SystemExit(f"{name} must be a JSON object.")
              return {str(key): str(value).strip() for key, value in data.items()}

          def parse_json_object(name):
              raw = os.environ.get(name, "").strip()
              if not raw:
                  return {}
              try:
                  data = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} must be valid JSON.") from exc
              if not isinstance(data, dict):
                  raise SystemExit(f"{name} must be a JSON object.")
              return data

          vercel_envs = {}
          if truthy("SYNC_VERCEL_PRODUCTION"):
              sync_file = Path(os.environ["NUTSNEWS_VERCEL_SYNC_ENVS_FILE"])
              try:
                  vercel_envs = json.loads(sync_file.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError) as exc:
                  raise SystemExit("The classified Vercel environment file is missing or invalid.") from exc
              if not isinstance(vercel_envs, dict) or not all(
                  isinstance(key, str) and isinstance(value, str) for key, value in vercel_envs.items()
              ):
                  raise SystemExit("The classified Vercel environment file must be a JSON object of strings.")

          def optional_https_url(name):
              value = os.environ.get(name, "").strip()
              if value and not value.startswith("https://"):
                  raise SystemExit(f"{name} must start with https:// when set.")
              return value

          def failover_controller_status_url(name, default):
              value = os.environ.get(name, "").strip() or default
              parsed = urlparse(value)
              query = parse_qs(parsed.query, keep_blank_values=True)
              if (
                  parsed.scheme != "https"
                  or parsed.netloc != FAILOVER_CONTROLLER_STATUS_HOST
                  or parsed.username
                  or parsed.password
                  or parsed.path.rstrip("/") != "/status"
                  or parsed.params
                  or parsed.fragment
                  or (query and query != {"mode": ["dashboard"]})
              ):
                  raise SystemExit(
                      f"{name} must be the protected https://{FAILOVER_CONTROLLER_STATUS_HOST}/status endpoint."
                  )
              return value

          def bare_https_origin(name, value):
              parsed = urlparse(value)
              if (
                  parsed.scheme != "https"
                  or not parsed.netloc
                  or parsed.username
                  or parsed.password
                  or parsed.params
                  or parsed.query
                  or parsed.fragment
                  or parsed.path not in ("", "/")
              ):
                  raise SystemExit(f"{name} must be a bare https:// origin.")
              return f"https://{parsed.netloc}"

          backup_enabled = truthy("NUTSNEWS_BACKUP_ENABLED")
          backup_repository = (
              os.environ.get("NUTSNEWS_BACKUP_REPOSITORY", "").strip()
              or "rclone:nutsnews-onedrive:nutsnews-backups/vps"
          )
          if backup_enabled:
              missing = [
                  name
                  for name in ("NUTSNEWS_BACKUP_RESTIC_PASSWORD", "NUTSNEWS_BACKUP_RCLONE_CONFIG")
                  if not os.environ.get(name, "").strip()
              ]
              if missing:
                  raise SystemExit(
                      "Backups are enabled, but missing required production-vps Environment secrets: "
                      + ", ".join(missing)
                  )
              if not backup_repository.startswith("rclone:nutsnews-onedrive:"):
                  raise SystemExit(
                      "NUTSNEWS_BACKUP_REPOSITORY must use the dedicated nutsnews-onedrive rclone remote."
                  )

          app_envs = parse_app_envs("NUTSNEWS_APP_ENVS_JSON")
          # Extra vars have higher precedence than role set_fact values. Merge
          # here so the reviewed Vercel values are actually passed to the app
          # environment map that the role templates.
          if vercel_envs:
              app_envs.update(vercel_envs)
          failover_status_hmac_secret = os.environ.get("NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET", "").strip()
          if failover_status_hmac_secret:
              if len(failover_status_hmac_secret) < 32 or len(failover_status_hmac_secret) > MAX_RUNTIME_SECRET_LENGTH:
                  raise SystemExit("NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET must be between 32 and 512 characters.")
              app_envs.update(
                  {
                      "NUTSNEWS_FAILOVER_CONTROLLER_STATUS_URL": failover_controller_status_url(
                          "NUTSNEWS_FAILOVER_CONTROLLER_STATUS_URL",
                          FAILOVER_CONTROLLER_STATUS_URL,
                      ),
                      "NUTSNEWS_FAILOVER_STATUS_HMAC_SECRET": failover_status_hmac_secret,
                  }
              )
              failover_runbook_url = optional_https_url("NUTSNEWS_FAILOVER_RUNBOOK_URL")
              if failover_runbook_url:
                  app_envs["NUTSNEWS_FAILOVER_RUNBOOK_URL"] = failover_runbook_url
              failover_cloudflare_dashboard_url = optional_https_url("NUTSNEWS_FAILOVER_CLOUDFLARE_DASHBOARD_URL")
              if failover_cloudflare_dashboard_url:
                  app_envs["NUTSNEWS_FAILOVER_CLOUDFLARE_DASHBOARD_URL"] = failover_cloudflare_dashboard_url
          admin_canonical_origin = bare_https_origin(
              "NUTSNEWS_ADMIN_CANONICAL_ORIGIN",
              "https://www.nutsnews.com",
          )
          admin_direct_origin = bare_https_origin(
              "NUTSNEWS_ADMIN_DIRECT_ORIGIN",
              "https://vps.nutsnews.com",
          )
          if admin_canonical_origin == admin_direct_origin:
              raise SystemExit("NUTSNEWS_ADMIN_CANONICAL_ORIGIN and NUTSNEWS_ADMIN_DIRECT_ORIGIN must differ.")
          app_envs.update(
              {
                  "AUTH_URL": admin_canonical_origin,
                  "NEXTAUTH_URL": admin_canonical_origin,
                  "AUTH_TRUST_HOST": "true",
                  "NUTSNEWS_ADMIN_CANONICAL_ORIGIN": admin_canonical_origin,
                  "NUTSNEWS_ADMIN_DIRECT_ORIGIN": admin_direct_origin,
              }
          )
          production_writes_paused = os.environ.get("PRODUCTION_WRITES_PAUSED", "false").strip().lower() or "false"
          if production_writes_paused not in {"true", "false"}:
              raise SystemExit("production_writes_paused must be true or false.")
          app_envs["NUTSNEWS_PRODUCTION_WRITES_PAUSED"] = production_writes_paused
          free_tier_usage_json = parse_json_object("NUTSNEWS_FREE_TIER_USAGE_JSON")
          ops_portal_domain = os.environ.get("NUTSNEWS_OPS_PORTAL_DOMAIN", "ops.nutsnews.com").strip() or "ops.nutsnews.com"
          ops_portal_callback_path = "/api/auth/callback/google"
          ops_portal_callback_url = (
              os.environ.get("NUTSNEWS_OPS_PORTAL_CALLBACK_URL", "").strip()
              or f"https://{ops_portal_domain}{ops_portal_callback_path}"
          )
          allowed_callback_urls = {
              "production": "https://ops.nutsnews.com/api/auth/callback/google",
              "staging": "https://staging.ops.nutsnews.com/api/auth/callback/google",
              "dev": "https://dev.ops.nutsnews.com/api/auth/callback/google",
          }
          if ops_portal_callback_url not in allowed_callback_urls.values():
              raise SystemExit(
                  "NUTSNEWS_OPS_PORTAL_CALLBACK_URL must be one of the documented Google redirect URIs: "
                  + ", ".join(allowed_callback_urls.values())
              )
          parsed_callback = ops_portal_callback_url.removeprefix("https://")
          if "/" not in parsed_callback or parsed_callback.endswith("//api/auth/callback/google"):
              raise SystemExit("NUTSNEWS_OPS_PORTAL_CALLBACK_URL must include a concrete host.")
          if not ops_portal_callback_url.startswith("https://") or not ops_portal_callback_url.endswith(ops_portal_callback_path):
              raise SystemExit("NUTSNEWS_OPS_PORTAL_CALLBACK_URL must be https://<host>/api/auth/callback/google.")
          missing_auth = [
              name
              for name in (
                  "NUTSNEWS_GOOGLE_CLIENT_ID",
                  "NUTSNEWS_GOOGLE_CLIENT_SECRET",
                  "NUTSNEWS_OPS_PORTAL_SESSION_SECRET",
              )
              if not os.environ.get(name, "").strip()
          ]
          if missing_auth:
              raise SystemExit(
                  "Ops Portal Google OAuth is enabled by default but missing production-vps Environment secrets: "
                  + ", ".join(missing_auth)
              )
          if len(os.environ["NUTSNEWS_OPS_PORTAL_SESSION_SECRET"]) < 32:
              raise SystemExit("NUTSNEWS_OPS_PORTAL_SESSION_SECRET must be at least 32 characters.")

          grafana_alloy_enabled = truthy("ENABLE_GRAFANA_ALLOY")
          if grafana_alloy_enabled:
              missing_grafana = [
                  name
                  for name in (
                      "NUTSNEWS_GRAFANA_CLOUD_METRICS_URL",
                      "NUTSNEWS_GRAFANA_CLOUD_METRICS_USERNAME",
                      "NUTSNEWS_GRAFANA_CLOUD_LOGS_URL",
                      "NUTSNEWS_GRAFANA_CLOUD_LOGS_USERNAME",
                      "NUTSNEWS_GRAFANA_CLOUD_ACCESS_POLICY_TOKEN",
                  )
                  if not os.environ.get(name, "").strip()
              ]
              if missing_grafana:
                  raise SystemExit(
                      "Grafana Alloy is enabled, but missing production-vps Environment secrets: "
                      + ", ".join(missing_grafana)
                  )
              for name in ("NUTSNEWS_GRAFANA_CLOUD_METRICS_URL", "NUTSNEWS_GRAFANA_CLOUD_LOGS_URL"):
                  if not os.environ[name].strip().startswith("https://"):
                      raise SystemExit(f"{name} must start with https://.")

          staging_access_enabled = truthy("ENABLE_STAGING_ACCESS")
          staging_access_team_domain = os.environ.get("NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN", "").strip()
          staging_access_audience = os.environ.get("NUTSNEWS_STAGING_ACCESS_AUDIENCE", "").strip()
          staging_deploy_public_key = os.environ.get("NUTSNEWS_STAGING_DEPLOY_PUBLIC_KEY", "").strip()
          if staging_access_enabled and (
              not staging_access_team_domain or not staging_access_audience or not staging_deploy_public_key
          ):
              raise SystemExit(
                  "Staging access requires NUTSNEWS_STAGING_ACCESS_TEAM_DOMAIN and "
                  "NUTSNEWS_STAGING_ACCESS_AUDIENCE."
              )

          repository = os.environ["GITHUB_REPOSITORY"]
          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/{repository}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )

          extra_vars = {
              "vps_baseline_admin_authorized_keys": keys,
              # A staging-boundary refresh must not validate, render, or restart
              # the production app when its reviewed Vercel sync is disabled.
              "vps_service_foundation_nutsnews_deployment_environments": (
                  ["production"] if truthy("SYNC_VERCEL_PRODUCTION") else []
              ),
              "vps_service_foundation_apply_metadata_enabled": os.environ["RUN_MODE"] == "apply",
              "vps_service_foundation_deployed_infra_commit": os.environ["GITHUB_SHA"],
              "vps_service_foundation_email_enabled": truthy("NUTSNEWS_EMAIL_ENABLED"),
              "vps_service_foundation_email_smtp_host": os.environ.get("NUTSNEWS_SMTP_HOST", ""),
              "vps_service_foundation_email_smtp_port": env_int("NUTSNEWS_SMTP_PORT", 587),
              "vps_service_foundation_email_smtp_username": os.environ.get("NUTSNEWS_SMTP_USERNAME", ""),
