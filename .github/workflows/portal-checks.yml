name: Portal Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  portal:
    name: Portal scaffold or app checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate static portal shell
        shell: bash
        run: |
          set -euo pipefail

          required_portal_files=(
            portal/index.html
            portal/assets/app.js
            portal/assets/styles.css
            portal/data/status.example.json
          )

          for file in "${required_portal_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing portal file: $file" >&2
              exit 1
            fi
          done

          python3 -m json.tool portal/data/status.example.json > /dev/null
          node --check portal/assets/app.js
          python3 -m py_compile portal/auth_gateway.py
          python3 -m py_compile ansible/roles/vps_service_foundation/files/ops_free_tier_usage.py
          python3 ansible/tests/validate_portal_fixture.py
          python3 ansible/tests/validate_ops_portal_auth.py
          python3 ansible/tests/test_free_tier_usage.py
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("portal/data/status.example.json").read_text(encoding="utf-8"))
          for key in ("processes", "disk_usage", "process_network", "email_reporting", "free_tier_usage"):
              if key not in data:
                  raise SystemExit(f"Missing portal status section: {key}")
          PY
          python3 - <<'PY'
          from pathlib import Path

          css = Path("portal/assets/styles.css").read_text(encoding="utf-8")
          depth = 0
          for index, char in enumerate(css):
              if char == "{":
                  depth += 1
              elif char == "}":
                  depth -= 1
              if depth < 0:
                  raise SystemExit(f"CSS closes too many blocks near byte {index}.")
          if depth != 0:
              raise SystemExit("CSS has unbalanced blocks.")
          PY

          if grep -RniE '<button|<form|docker[.]sock|/var/run/docker[.]sock|child_process|execFile|spawn|systemctl|docker compose up|docker rm' portal; then
            echo "Portal v1 must stay read-only and must not expose local command or Docker socket controls." >&2
            exit 1
          fi

      - name: Detect portal package
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f portal/package.json ]]; then
            echo "package_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_json=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.detect.outputs.package_json == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Install portal dependencies
        if: steps.detect.outputs.package_json == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd portal
          if [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f yarn.lock ]]; then
            corepack enable
            yarn install --immutable
          elif [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Detect portal scripts
        if: steps.detect.outputs.package_json == 'true'
        id: scripts
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("portal/package.json", "utf8"));
            const scripts = pkg.scripts || {};
            for (const name of ["lint", "test", "build"]) {
              console.log(`${name}=${Object.prototype.hasOwnProperty.call(scripts, name)}`);
            }
          ' >> "$GITHUB_OUTPUT"

      - name: Run portal lint
        if: steps.scripts.outputs.lint == 'true'
        working-directory: portal
        shell: bash
        run: npm run lint

      - name: Run portal tests
        if: steps.scripts.outputs.test == 'true'
        working-directory: portal
        shell: bash
        run: npm run test

      - name: Build portal
        if: steps.scripts.outputs.build == 'true'
        working-directory: portal
        shell: bash
        run: npm run build

      - name: Skip portal app checks
        if: steps.detect.outputs.package_json != 'true'
        shell: bash
        run: echo "No portal package.json found."
