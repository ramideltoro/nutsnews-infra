name: Verify Ops Portal Status

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-vps-ops-portal-status
  cancel-in-progress: false

jobs:
  verify-status:
    name: Verify sanitized Ops Portal status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-vps

    steps:
      - name: Validate required environment secrets
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in \
            NUTSNEWS_VPS_SSH_PRIVATE_KEY \
            NUTSNEWS_VPS_KNOWN_HOSTS
          do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production-vps environment secret: $secret_name" >&2
              missing=1
            fi
          done

          exit "$missing"

      - name: Prepare SSH material
        shell: bash
        env:
          NUTSNEWS_VPS_SSH_PRIVATE_KEY: ${{ secrets.NUTSNEWS_VPS_SSH_PRIVATE_KEY }}
          NUTSNEWS_VPS_KNOWN_HOSTS: ${{ secrets.NUTSNEWS_VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$NUTSNEWS_VPS_SSH_PRIVATE_KEY" > "$HOME/.ssh/nutsnews_vps"
          chmod 0600 "$HOME/.ssh/nutsnews_vps"

          printf '%s\n' "$NUTSNEWS_VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/known_hosts"

          ssh-keygen -y -f "$HOME/.ssh/nutsnews_vps" > /dev/null
          ssh-keygen -F 65.75.202.112 -f "$HOME/.ssh/known_hosts" > /dev/null

      - name: Inspect VPS collector runtime state
        shell: bash
        env:
          VPS_HOST: 65.75.202.112
          VPS_USER: nutsnews_ops
        run: |
          set -euo pipefail

          ssh_args=(
            -i "$HOME/.ssh/nutsnews_vps"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o LogLevel=ERROR
          )
          target="${VPS_USER}@${VPS_HOST}"

          ssh "${ssh_args[@]}" "$target" "sudo -n /usr/bin/python3 -s" <<'PY'
          import json
          import os
          import re
          import shlex
          import subprocess
          import urllib.parse
          from pathlib import Path

          def run(args):
              completed = subprocess.run(args, check=False, text=True, capture_output=True)
              return {
                  "returncode": completed.returncode,
                  "stdout": completed.stdout.strip(),
                  "stderr": completed.stderr.strip(),
              }

          def mask_value(name, value):
              if not value:
                  return "empty"
              if name.endswith("_URL"):
                  parsed = urllib.parse.urlparse(value)
                  query_keys = sorted(urllib.parse.parse_qs(parsed.query).keys())
                  query = "&".join(f"{key}=***" for key in query_keys)
                  suffix = f"?{query}" if query else ""
                  return f"{parsed.scheme}://{parsed.netloc}{parsed.path}{suffix}"
              if name.endswith("_JSON"):
                  try:
                      parsed = json.loads(value)
                  except json.JSONDecodeError:
                      return "present(invalid-json)"
                  if isinstance(parsed, dict):
                      return f"present(json-object keys={sorted(str(key) for key in parsed.keys())})"
                  return f"present(json-{type(parsed).__name__})"
              return f"present(len={len(value)})"

          def parse_env(path):
              keys = {}
              errors = []
              try:
                  lines = path.read_text(encoding="utf-8").splitlines()
              except FileNotFoundError:
                  return keys, ["missing"]
              for line_number, raw in enumerate(lines, start=1):
                  line = raw.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  try:
                      parts = shlex.split(line, comments=False, posix=True)
                  except ValueError:
                      errors.append(f"line {line_number} parse error")
                      continue
                  if not parts or "=" not in parts[0]:
                      continue
                  key, value = parts[0].split("=", 1)
                  if key.startswith("NUTSNEWS_"):
                      keys[key] = mask_value(key, value)
              return keys, errors

          def scrub(line):
              line = re.sub(r"Bearer\s+[A-Za-z0-9._~+/-]+", "Bearer <redacted>", line)
              line = re.sub(r"https://[^\s]+", "https://<redacted-url>", line)
              return line[:240]

          env_path = Path("/etc/nutsnews/free-tier-usage.env")
          keys, errors = parse_env(env_path)
          stat = env_path.stat() if env_path.exists() else None
          interesting_keys = [
              "NUTSNEWS_FREE_TIER_QUOTAS_JSON",
              "NUTSNEWS_FREE_TIER_USAGE_JSON",
              "NUTSNEWS_VERCEL_API_TOKEN",
              "NUTSNEWS_VERCEL_USAGE_API_URL",
          ]
          journal = run([
              "journalctl",
              "-u",
              "nutsnews-ops-portal-collector.service",
              "-n",
              "20",
              "--no-pager",
              "--output",
              "short-iso",
          ])
          payload = {
              "free_tier_env_file": {
                  "present": env_path.exists(),
                  "mode": oct(stat.st_mode & 0o777) if stat else "missing",
                  "keys": {key: keys.get(key, "missing") for key in interesting_keys},
                  "parse_errors": errors,
              },
              "systemd": {
                  "collector_service_active": run(["systemctl", "is-active", "nutsnews-ops-portal-collector.service"])["stdout"],
                  "collector_service_enabled": run(["systemctl", "is-enabled", "nutsnews-ops-portal-collector.service"])["stdout"],
                  "collector_timer_active": run(["systemctl", "is-active", "nutsnews-ops-portal-collector.timer"])["stdout"],
                  "collector_timer_enabled": run(["systemctl", "is-enabled", "nutsnews-ops-portal-collector.timer"])["stdout"],
              },
              "collector_journal": {
                  "returncode": journal["returncode"],
                  "recent_lines": [scrub(line) for line in journal["stdout"].splitlines()[-8:]],
              },
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Inspect Vercel usage API response shape
        shell: bash
        env:
          NUTSNEWS_VERCEL_API_TOKEN: ${{ secrets.NUTSNEWS_VERCEL_API_TOKEN }}
          NUTSNEWS_VERCEL_USAGE_API_URL: ${{ secrets.NUTSNEWS_VERCEL_USAGE_API_URL }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import math
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          def safe_float(value):
              if value is None or value == "":
                  return None
              if isinstance(value, bool):
                  return 1.0 if value else 0.0
              try:
                  parsed = float(value)
              except (TypeError, ValueError):
                  return None
              return parsed if math.isfinite(parsed) else None

          def sanitize(value, limit=80):
              return str(value or "unknown").replace("\n", " ").strip()[:limit]

          def message(data):
              if not isinstance(data, dict):
                  return ""
              for key in ("message", "detail", "error", "errors"):
                  value = data.get(key)
                  if not value:
                      continue
                  if isinstance(value, dict):
                      return sanitize(value.get("message") or value.get("detail") or value.get("code") or "object")
                  if isinstance(value, list):
                      if not value:
                          continue
                      first = value[0]
                      if isinstance(first, dict):
                          return sanitize(first.get("message") or first.get("detail") or "object")
                      return sanitize(first)
                  return sanitize(value)
              return ""

          def parse_records(body):
              stripped = body.strip()
              if not stripped:
                  return [], "empty"
              if stripped[0] in "[{":
                  try:
                      parsed = json.loads(stripped)
                  except json.JSONDecodeError:
                      parsed = None
                  if isinstance(parsed, list):
                      return [item for item in parsed if isinstance(item, dict)], ""
                  if isinstance(parsed, dict):
                      if any(key in parsed for key in ("ConsumedQuantity", "ConsumedUnit", "ServiceName", "ChargePeriodStart")):
                          return [parsed], ""
                      response_message = message(parsed)
                      if response_message:
                          return [], response_message
                      data = parsed.get("data") or parsed.get("charges") or parsed.get("items") or parsed.get("rows")
                      if isinstance(data, list):
                          return [item for item in data if isinstance(item, dict)], ""
                      return [], "json_without_focus_records"
              records = []
              malformed = 0
              for line in stripped.splitlines():
                  raw = line.strip()
                  if not raw:
                      continue
                  try:
                      item = json.loads(raw)
                  except json.JSONDecodeError:
                      malformed += 1
                      continue
                  if isinstance(item, dict):
                      records.append(item)
              return records, f"malformed_lines={malformed}" if malformed else ""

          def norm(value):
              return " ".join(str(value).lower().replace("_", " ").replace("-", " ").split())

          def field_text(value):
              if isinstance(value, (dict, list)):
                  return json.dumps(value, sort_keys=True)
              return str(value)

          def quantity(record):
              for field in ("ConsumedQuantity", "BilledQuantity", "UsageQuantity", "Quantity"):
                  parsed = safe_float(record.get(field))
                  if parsed is not None:
                      return parsed
              return None

          mappings = {
              "active_cpu_hours": (("active", "cpu"), ("hour",)),
              "provisioned_memory_gb_hours": (("provisioned", "memory"), ("gb", "hour")),
              "function_invocations": (("function", "invocation"), ("invocation",)),
              "fast_data_transfer_gb": (("fast", "data", "transfer"), ("gb",)),
              "fast_origin_transfer_gb": (("fast", "origin", "transfer"), ("gb",)),
          }

          url = os.environ.get("NUTSNEWS_VERCEL_USAGE_API_URL", "").strip()
          token = os.environ.get("NUTSNEWS_VERCEL_API_TOKEN", "").strip()
          if not url or not token:
              missing = []
              if not url:
                  missing.append("NUTSNEWS_VERCEL_USAGE_API_URL")
              if not token:
                  missing.append("NUTSNEWS_VERCEL_API_TOKEN")
              print(json.dumps({"vercel_api_status": "not_configured", "missing": missing}, indent=2, sort_keys=True))
              raise SystemExit(0)
          if not url.startswith("https://"):
              print(json.dumps({"vercel_api_status": "invalid_url", "reason": "URL must use HTTPS"}, indent=2, sort_keys=True))
              raise SystemExit(0)

          now = datetime.now(timezone.utc).replace(microsecond=0)
          month_start = now.replace(day=1, hour=0, minute=0, second=0)
          params = {
              "from": month_start.isoformat().replace("+00:00", "Z"),
              "to": now.isoformat().replace("+00:00", "Z"),
          }
          separator = "&" if "?" in url else "?"
          request_url = f"{url}{separator}{urllib.parse.urlencode(params)}"
          request = urllib.request.Request(
              request_url,
              headers={
                  "Accept": "application/x-ndjson, application/json;q=0.9",
                  "Authorization": f"Bearer {token}",
              },
              method="GET",
          )
          try:
              with urllib.request.urlopen(request, timeout=10) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  status_code = response.status
                  content_type = response.headers.get("content-type", "")
          except urllib.error.HTTPError as exc:
              raw = exc.read(4096).decode("utf-8", errors="replace")
              try:
                  parsed = json.loads(raw)
              except json.JSONDecodeError:
                  parsed = {}
              print(
                  json.dumps(
                      {
                          "vercel_api_status": "http_error",
                          "status_code": exc.code,
                          "content_type": exc.headers.get("content-type", "") if exc.headers else "",
                          "message": message(parsed) or sanitize(exc.reason),
                      },
                      indent=2,
                      sort_keys=True,
                  )
              )
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(json.dumps({"vercel_api_status": "request_error", "reason": sanitize(exc.reason)}, indent=2, sort_keys=True))
              raise SystemExit(0)

          records, parse_detail = parse_records(body)
          aggregates = {key: 0.0 for key in mappings}
          matched = {key: False for key in mappings}
          samples = []
          for record in records:
              if len(samples) < 8:
                  tags = record.get("Tags")
                  samples.append(
                      {
                          "service": sanitize(record.get("ServiceName") or record.get("ServiceCategory")),
                          "category": sanitize(record.get("ServiceCategory")),
                          "charge_category": sanitize(record.get("ChargeCategory")),
                          "consumed_unit": sanitize(record.get("ConsumedUnit")),
                          "pricing_unit": sanitize(record.get("PricingUnit")),
                          "tag_keys": sorted(str(key) for key in tags.keys())[:8] if isinstance(tags, dict) else [],
                          "has_quantity": quantity(record) is not None,
                      }
                  )
              value = quantity(record)
              if value is None:
                  continue
              haystack = norm(
                  " ".join(
                      field_text(record.get(field, ""))
                      for field in (
                          "ServiceName",
                          "ServiceCategory",
                          "ChargeCategory",
                          "ChargeDescription",
                          "Description",
                          "ResourceName",
                          "PricingUnit",
                          "ConsumedUnit",
                          "Tags",
                      )
                  )
              )
              unit = norm(" ".join(field_text(record.get(field, "")) for field in ("ConsumedUnit", "PricingUnit")))
              for key, (required_terms, unit_terms) in mappings.items():
                  if all(norm(term) in haystack for term in required_terms) and any(norm(term) in unit for term in unit_terms):
                      aggregates[key] += value
                      matched[key] = True
          print(
              json.dumps(
                  {
                      "vercel_api_status": "ok",
                      "status_code": status_code,
                      "content_type": content_type.split(";")[0],
                      "period_from": params["from"],
                      "period_to": params["to"],
                      "record_count": len(records),
                      "records_with_quantity": sum(1 for record in records if quantity(record) is not None),
                      "parse_detail": parse_detail,
                      "matched_aggregates": {key: round(value, 4) for key, value in aggregates.items() if matched[key]},
                      "unmatched_metric_keys": [key for key in mappings if not matched[key]],
                      "sample_records": samples,
                  },
                  indent=2,
                  sort_keys=True,
              )
          )
          PY

      - name: Read sanitized portal status
        shell: bash
        env:
          VPS_HOST: 65.75.202.112
          VPS_USER: nutsnews_ops
          PORTAL_STATUS_FILE: /opt/nutsnews/portal-assets/data/status.json
        run: |
          set -euo pipefail

          ssh_args=(
            -i "$HOME/.ssh/nutsnews_vps"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o LogLevel=ERROR
          )
          target="${VPS_USER}@${VPS_HOST}"

          echo "Reading sanitized Ops Portal Vercel free-tier status from ${PORTAL_STATUS_FILE}."
          set +e
          # shellcheck disable=SC2029
          ssh "${ssh_args[@]}" "$target" "/usr/bin/python3 -c 'import json,sys; from pathlib import Path; p=Path(\"${PORTAL_STATUS_FILE}\"); p.exists() or sys.exit(\"portal status file is missing\"); data=json.loads(p.read_text()); ft=data.get(\"free_tier_usage\",{}); providers=ft.get(\"providers\",[]); providers=providers if isinstance(providers,list) else []; vercel=next((item for item in providers if item.get(\"key\")==\"vercel\"), None); metric_keys=(\"key\",\"usage_display\",\"limit_display\",\"remaining_display\",\"percent_used_display\",\"reset_at\",\"measurement_status\",\"measurement_detail\"); summary_keys=(\"status\",\"source_status\",\"source_detail\",\"current_usage\",\"quota\",\"remaining\",\"percent_used_display\",\"last_checked_at\"); payload={\"generated_at\": ft.get(\"generated_at\"), \"provider_keys\": [item.get(\"key\", \"unknown\") for item in providers], \"free_tier_errors\": ft.get(\"errors\", [])}; exit_code=0; missing=vercel is None; exit_code=3 if missing else (2 if vercel.get(\"source_status\") == \"cached\" else 0); payload.update({\"vercel\": \"missing\"} if missing else {\"vercel\": {k: vercel.get(k, \"unknown\") for k in summary_keys}, \"metrics\": [{k: metric.get(k, \"unknown\") for k in metric_keys} for metric in vercel.get(\"metrics\",[])]}); print(json.dumps(payload, indent=2, sort_keys=True)); sys.exit(exit_code)'"
          portal_status="$?"
          set -e

          case "$portal_status" in
            0)
              ;;
            2)
              echo "Vercel free-tier metrics are still using cached snapshot values in the sanitized portal status snapshot." >&2
              exit "$portal_status"
              ;;
            3)
              echo "Vercel free-tier provider is missing from the sanitized portal status snapshot." >&2
              exit "$portal_status"
              ;;
            *)
              echo "Could not read sanitized Ops Portal Vercel free-tier status." >&2
              exit "$portal_status"
              ;;
          esac

          echo
          echo "Ops Portal Vercel free-tier status is not using cached placeholder usage."

      - name: Validate Vercel metric display semantics
        shell: bash
        env:
          VPS_HOST: 65.75.202.112
          VPS_USER: nutsnews_ops
          PORTAL_STATUS_FILE: /opt/nutsnews/portal-assets/data/status.json
        run: |
          set -euo pipefail

          ssh_args=(
            -i "$HOME/.ssh/nutsnews_vps"
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o StrictHostKeyChecking=yes
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o LogLevel=ERROR
          )
          target="${VPS_USER}@${VPS_HOST}"

          ssh "${ssh_args[@]}" "$target" "/usr/bin/python3 -s" <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path("/opt/nutsnews/portal-assets/data/status.json").read_text(encoding="utf-8"))
          providers = data.get("free_tier_usage", {}).get("providers", [])
          providers = providers if isinstance(providers, list) else []
          vercel = next((item for item in providers if item.get("key") == "vercel"), None)
          if not vercel:
              print(json.dumps({"vercel_semantics": "missing"}, indent=2, sort_keys=True))
              raise SystemExit(3)

          failures = []
          rows = []
          for metric in vercel.get("metrics", []):
              key = metric.get("key", "unknown")
              status = str(metric.get("measurement_status") or "unknown").lower()
              detail = str(metric.get("measurement_detail") or "")
              usage = metric.get("usage")
              usage_display = str(metric.get("usage_display") or "unknown").lower()
              percent_display = str(metric.get("percent_used_display") or "unknown").lower()
              row = {
                  "key": key,
                  "usage": usage,
                  "usage_display": metric.get("usage_display"),
                  "percent_used_display": metric.get("percent_used_display"),
                  "measurement_status": status,
                  "has_detail": bool(detail),
              }
              rows.append(row)
              if usage is None and usage_display.startswith("0"):
                  failures.append(f"{key} has null usage but zero-like usage_display")
              if usage is None and percent_display.startswith("0"):
                  failures.append(f"{key} has null usage but zero-like percent_used_display")
              if status in {"missing credential", "unavailable", "unsupported"}:
                  if not detail:
                      failures.append(f"{key} has {status} without measurement_detail")
                  if usage_display != status:
                      failures.append(f"{key} display is {usage_display}, expected {status}")
              if usage_display == "unknown" and status != "unknown":
                  failures.append(f"{key} renders generic unknown despite {status} status")

          payload = {
              "vercel_semantics": "failed" if failures else "ok",
              "source_status": vercel.get("source_status"),
              "source_detail": vercel.get("source_detail"),
              "rows": rows,
              "failures": failures,
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          if failures:
              raise SystemExit(2)
          PY
