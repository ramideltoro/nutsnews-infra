name: Secrets Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pull-requests: read  # Needed for PR-scoped secret-scan execution context.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        id: gitleaks_action
        continue-on-error: true
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Set up Go for fallback Gitleaks CLI
        if: steps.gitleaks_action.outcome == 'failure'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: "1.24.x"

      - name: Install fallback Gitleaks CLI
        if: steps.gitleaks_action.outcome == 'failure'
        shell: bash
        env:
          GITLEAKS_VERSION: v8.24.3
        run: |
          set -euo pipefail
          if ! command -v go >/dev/null 2>&1; then
            echo "Go is required to build the fallback Gitleaks CLI." >&2
            exit 1
          fi
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run fallback Gitleaks CLI
        if: steps.gitleaks_action.outcome == 'failure'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            if [[ -z "${BASE_SHA}" || -z "${HEAD_SHA}" ]]; then
              echo "Pull request secret scan requires base and head SHAs." >&2
              exit 1
            fi
            gitleaks git --no-banner --redact --log-opts="${BASE_SHA}..${HEAD_SHA}"
          else
            gitleaks git --no-banner --redact
          fi
