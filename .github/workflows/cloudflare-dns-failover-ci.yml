name: Cloudflare DNS Failover CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "cloudflare/dns-failover/**"
      - "ansible/tests/validate_cloudflare_dns_failover.py"
      - "runbooks/CLOUDFLARE_DNS_FAILOVER.md"
      - ".github/workflows/cloudflare-dns-failover-ci.yml"
      - ".github/workflows/cloudflare-dns-failover-apply.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Cloudflare DNS failover controller
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Validate Worker syntax and behavior
        shell: bash
        run: |
          set -euo pipefail
          node --check cloudflare/dns-failover/src/core.mjs
          node --check cloudflare/dns-failover/src/index.mjs
          node --test cloudflare/dns-failover/tests/*.test.mjs
          python3 ansible/tests/validate_cloudflare_dns_failover.py
