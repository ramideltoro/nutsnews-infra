name: Grafana State Bootstrap

on:
  workflow_dispatch:
    inputs:
      bucket_name:
        description: Private Cloudflare R2 bucket for Grafana Cloud OpenTofu state.
        required: true
        default: nutsnews-grafana-cloud-tofu-state
        type: string
      location_hint:
        description: Cloudflare R2 location hint.
        required: true
        default: WNAM
        type: choice
        options:
          - WNAM
          - ENAM
          - WEUR
          - EEUR
          - APAC
      confirm_bootstrap:
        description: Type create-r2-state-bucket to create the state bucket.
        required: true
        type: string

permissions:
  contents: read  # Required to check out the fixed Cloudflare R2 state bootstrap module.

concurrency:
  group: grafana-state-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Protected R2 bucket bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-vps

    steps:
      - name: Validate dispatch guard
        shell: bash
        env:
          CONFIRM_BOOTSTRAP: ${{ inputs.confirm_bootstrap }}
          BUCKET_NAME: ${{ inputs.bucket_name }}
        run: |
          set -euo pipefail

          if [[ "$CONFIRM_BOOTSTRAP" != "create-r2-state-bucket" ]]; then
            echo "Bootstrap requires confirm_bootstrap to be exactly create-r2-state-bucket." >&2
            exit 1
          fi

          python3 - <<'PY'
          import os
          import re

          bucket_name = os.environ["BUCKET_NAME"]
          if not re.fullmatch(r"[a-z0-9][a-z0-9-]{1,61}[a-z0-9]", bucket_name):
              raise SystemExit("bucket_name must be 3-63 characters using lowercase letters, numbers, and hyphens.")
          PY

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4  # v2
        with:
          tofu_wrapper: false

      - name: Validate required Cloudflare secrets
        shell: bash
        env:
          NUTSNEWS_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.NUTSNEWS_CLOUDFLARE_ACCOUNT_ID }}
          NUTSNEWS_CLOUDFLARE_R2_ADMIN_API_TOKEN: ${{ secrets.NUTSNEWS_CLOUDFLARE_R2_ADMIN_API_TOKEN }}
        run: |
          set -euo pipefail

          missing=0
          for name in \
            NUTSNEWS_CLOUDFLARE_ACCOUNT_ID \
            NUTSNEWS_CLOUDFLARE_R2_ADMIN_API_TOKEN
          do
            if [[ -z "${!name}" ]]; then
              echo "Missing required production-vps environment secret for Grafana state bootstrap: $name" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Create R2 state bucket
        shell: bash
        env:
          TF_VAR_cloudflare_account_id: ${{ secrets.NUTSNEWS_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.NUTSNEWS_CLOUDFLARE_R2_ADMIN_API_TOKEN }}
          TF_VAR_bucket_name: ${{ inputs.bucket_name }}
          TF_VAR_location_hint: ${{ inputs.location_hint }}
        run: |
          set -euo pipefail

          tofu -chdir=terraform/grafana-state-bootstrap/cloudflare-r2 init -backend=false -input=false
          tofu -chdir=terraform/grafana-state-bootstrap/cloudflare-r2 fmt -check
          tofu -chdir=terraform/grafana-state-bootstrap/cloudflare-r2 validate -no-color
          tofu -chdir=terraform/grafana-state-bootstrap/cloudflare-r2 plan -input=false -no-color -out="$RUNNER_TEMP/grafana-state-bootstrap.tfplan"
          tofu -chdir=terraform/grafana-state-bootstrap/cloudflare-r2 apply -input=false -no-color "$RUNNER_TEMP/grafana-state-bootstrap.tfplan"
