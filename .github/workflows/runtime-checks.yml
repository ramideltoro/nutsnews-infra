name: Runtime Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_runtime: ${{ steps.classify.outputs.run_runtime }}
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths
        id: classify
        shell: bash
        run: python3 .github/scripts/ci_classify_changes.py

  compose:
    name: Compose config
    needs: changes
    if: needs.changes.outputs.run_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Compose files
        shell: bash
        run: |
          set -euo pipefail

          required_service_files=(
            compose/caddy/compose.yml
            compose/caddy/Caddyfile
            compose/nutsnews/compose.yml
            ansible/roles/vps_service_foundation/templates/nutsnews-app.routes.j2
            ansible/roles/vps_service_foundation/templates/nutsnews-app.public.routes.j2
            ansible/roles/vps_service_foundation/templates/nutsnews-app.env.j2
            ansible/inventories/production/host_vars/vps.nutsnews.com.yml
            compose/health/index.html
            portal/index.html
            portal/assets/app.js
            portal/assets/styles.css
            portal/data/status.example.json
          )

          for file in "${required_service_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing service foundation file: $file" >&2
              exit 1
            fi
          done

          mapfile -t compose_files < <(
            find compose -type f \( \
              -name 'compose.yml' -o \
              -name 'compose.yaml' -o \
              -name 'docker-compose.yml' -o \
              -name 'docker-compose.yaml' -o \
              -name '*.compose.yml' -o \
              -name '*.compose.yaml' \
            \) | sort
          )

          if [[ "${#compose_files[@]}" -eq 0 ]]; then
            echo "No Compose files found."
            exit 0
          fi

          export NUTSNEWS_OPS_PORTAL_AUTH_ENV_FILE="$RUNNER_TEMP/ops-portal-auth.env"
          export NUTSNEWS_STAGING_ACCESS_ENV_FILE=/dev/null
          NUTSNEWS_APP_IMAGE="ghcr.io/ramideltoro/nutsnews@sha256:$(printf '0%.0s' {1..64})"
          export NUTSNEWS_APP_IMAGE
          export NUTSNEWS_APP_PROJECT_NAME=nutsnews-app
          export NUTSNEWS_APP_CONTAINER_NAME=nutsnews-app
          export NUTSNEWS_APP_CONTAINER_PORT=3000
          export NUTSNEWS_APP_ENV_FILE=/dev/null
          export NUTSNEWS_APP_NETWORK_NAME=nutsnews-edge-v6
          export NUTSNEWS_APP_NETWORK_ALIAS=nutsnews-app
          export NUTSNEWS_APP_CACHE_VOLUME_NAME=nutsnews-app-cache
          export NUTSNEWS_APP_CPU_LIMIT=4
          export NUTSNEWS_APP_CPU_SHARES=1024
          export NUTSNEWS_APP_MEMORY_LIMIT_MIB=768
          export NUTSNEWS_APP_MEMORY_RESERVATION_MIB=512
          export NUTSNEWS_APP_PIDS_LIMIT=256
          export NUTSNEWS_APP_LOG_MAX_SIZE=10m
          export NUTSNEWS_APP_LOG_MAX_FILE=3
          cat > "$NUTSNEWS_OPS_PORTAL_AUTH_ENV_FILE" <<'EOF'
          GOOGLE_CLIENT_ID=dummy
          GOOGLE_CLIENT_SECRET=dummy
          NUTSNEWS_OPS_PORTAL_ALLOWED_EMAIL=rami.deltoro@gmail.com
          NUTSNEWS_OPS_PORTAL_CALLBACK_URL=https://ops.nutsnews.com/api/auth/callback/google
          NUTSNEWS_OPS_PORTAL_SESSION_SECRET=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          EOF

          for file in "${compose_files[@]}"; do
            docker compose -f "$file" config --quiet
          done

          python3 ansible/tests/validate_app_deployment.py

  hadolint:
    name: Hadolint
    needs: changes
    if: needs.changes.outputs.run_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Detect Dockerfiles
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name 'Dockerfile' -o -name '*.Dockerfile' \) | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Hadolint
        if: steps.detect.outputs.has_files == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          recursive: true

      - name: Skip Hadolint
        if: steps.detect.outputs.has_files != 'true'
        shell: bash
        run: echo "No Dockerfiles found."

  trivy-filesystem:
    name: Trivy filesystem
    needs: changes
    if: needs.changes.outputs.run_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  trivy-config:
    name: Trivy config
    needs: changes
    if: needs.changes.outputs.run_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
