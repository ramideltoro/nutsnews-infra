name: Supply Chain

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Classify changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_supply_chain: ${{ steps.classify.outputs.run_supply_chain }}
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths
        id: classify
        shell: bash
        run: python3 .github/scripts/ci_classify_changes.py

  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.run_supply_chain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Detect dependency review support
        id: support
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          compare_path="repos/${REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}"
          if gh api "$compare_path" >/tmp/dependency-review.json 2>/tmp/dependency-review.err; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Dependency Review is not supported or Dependency Graph is not enabled for this repository yet."
            cat /tmp/dependency-review.err
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run dependency review
        if: steps.support.outputs.supported == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate

      - name: Skip dependency review
        if: steps.support.outputs.supported != 'true'
        shell: bash
        run: echo "Dependency Graph is not enabled yet; skipping Dependency Review."

  osv:
    name: OSV recursive scan
    needs: changes
    if: needs.changes.outputs.run_supply_chain == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive ./
