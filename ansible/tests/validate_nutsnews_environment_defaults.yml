---
- name: Validate default NutsNews runtime environment model
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    vps_service_foundation_nutsnews_app_enabled: true
    vps_service_foundation_nutsnews_app_image_digest: "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    vps_service_foundation_nutsnews_app_image_review_status: reviewed
    vps_service_foundation_nutsnews_app_source_commit: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    vps_service_foundation_nutsnews_app_build_id: fixture-production
  tasks:
    - name: Load service-foundation default environment model
      ansible.builtin.include_vars: ../roles/vps_service_foundation/defaults/main.yml

    - name: Set reviewed production fixture inputs
      ansible.builtin.set_fact:
        vps_service_foundation_nutsnews_app_enabled: true
        vps_service_foundation_nutsnews_app_image_digest: "sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        vps_service_foundation_nutsnews_app_image_review_status: reviewed
        vps_service_foundation_nutsnews_app_source_commit: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        vps_service_foundation_nutsnews_app_build_id: fixture-production

    - name: Assert default production runtime inputs
      ansible.builtin.assert:
        that:
          - vps_service_foundation_nutsnews_environments.production.name == 'production'
          - vps_service_foundation_nutsnews_environments.production.enabled | bool
          - vps_service_foundation_nutsnews_environments.production.project_name == 'nutsnews-app'
          - vps_service_foundation_nutsnews_environments.production.network_name == 'nutsnews-edge-v6'
          - vps_service_foundation_nutsnews_environments.production.cpu_limit | int == 4
          - vps_service_foundation_nutsnews_environments.production.memory_limit_mib | int == 768
          - vps_service_foundation_nutsnews_environments.production.memory_reservation_mib | int == 512
          - vps_service_foundation_nutsnews_environments.production.pids_limit | int == 256
          - vps_service_foundation_nutsnews_environments.production.log_max_size == '10m'
          - vps_service_foundation_nutsnews_environments.production.log_max_file | int == 3
          - >-
            vps_service_foundation_nutsnews_environments.production.image
            == (
              vps_service_foundation_nutsnews_environments.production.image_repo
              ~ '@' ~ vps_service_foundation_nutsnews_environments.production.image_digest
            )
          - vps_service_foundation_nutsnews_environments.production.image_review_status == 'reviewed'

    - name: Assert default disabled staging runtime inputs
      ansible.builtin.assert:
        that:
          - vps_service_foundation_nutsnews_environments.staging.name == 'staging'
          - not (vps_service_foundation_nutsnews_environments.staging.enabled | bool)
          - not (vps_service_foundation_nutsnews_environments.staging.staged_route_enabled | bool)
          - not (vps_service_foundation_nutsnews_environments.staging.public_route_enabled | bool)
          - vps_service_foundation_nutsnews_environments.staging.cpu_limit | int == 1
          - vps_service_foundation_nutsnews_environments.staging.cpu_shares | int == 256
          - vps_service_foundation_nutsnews_environments.staging.memory_limit_mib | int == 512
          - vps_service_foundation_nutsnews_environments.staging.memory_reservation_mib | int == 256
          - vps_service_foundation_nutsnews_environments.staging.pids_limit | int == 128
          - vps_service_foundation_nutsnews_environments.staging.log_max_size == '10m'
          - vps_service_foundation_nutsnews_environments.staging.log_max_file | int == 3
          - vps_service_foundation_nutsnews_staging_production_reserve.cpu_cores | int == 3
          - vps_service_foundation_nutsnews_staging_production_reserve.memory_mib | int == 4096
          - vps_service_foundation_nutsnews_staging_production_reserve.root_disk_gib | int == 20
          - vps_service_foundation_nutsnews_staging_production_reserve.root_inode_count | int == 1000000
          - vps_service_foundation_nutsnews_staging_test_budget.max_concurrent_workers | int == 2
          - vps_service_foundation_nutsnews_staging_test_budget.max_requests_per_second | int == 5
          - vps_service_foundation_nutsnews_staging_test_budget.max_total_requests | int == 300
          - vps_service_foundation_nutsnews_staging_test_budget.max_duration_seconds | int == 300
          - vps_service_foundation_nutsnews_staging_test_budget.qualification_ttl_hours | int == 24
          - vps_service_foundation_nutsnews_staging_test_budget.scale_down_after_qualification_expiry | bool
          - >-
            vps_service_foundation_nutsnews_environments.staging.network_name
            != vps_service_foundation_nutsnews_environments.production.network_name

    - name: Assert every isolated runtime identity is distinct by default
      ansible.builtin.assert:
        that:
          - >-
            vps_service_foundation_nutsnews_environments.production.project_name
            != vps_service_foundation_nutsnews_environments.staging.project_name
          - >-
            vps_service_foundation_nutsnews_environments.production.app_dir
            != vps_service_foundation_nutsnews_environments.staging.app_dir
          - >-
            vps_service_foundation_nutsnews_environments.production.compose_file
            != vps_service_foundation_nutsnews_environments.staging.compose_file
          - >-
            vps_service_foundation_nutsnews_environments.production.env_file
            != vps_service_foundation_nutsnews_environments.staging.env_file
          - >-
            vps_service_foundation_nutsnews_environments.production.state_dir
            != vps_service_foundation_nutsnews_environments.staging.state_dir
          - >-
            vps_service_foundation_nutsnews_environments.production.release_manifest_file
            != vps_service_foundation_nutsnews_environments.staging.release_manifest_file
          - >-
            vps_service_foundation_nutsnews_environments.production.apply_marker_file
            != vps_service_foundation_nutsnews_environments.staging.apply_marker_file
          - >-
            vps_service_foundation_nutsnews_environments.production.last_known_good_state_file
            != vps_service_foundation_nutsnews_environments.staging.last_known_good_state_file
          - >-
            vps_service_foundation_nutsnews_environments.production.container_name
            != vps_service_foundation_nutsnews_environments.staging.container_name
          - >-
            vps_service_foundation_nutsnews_environments.production.network_name
            != vps_service_foundation_nutsnews_environments.staging.network_name
          - >-
            vps_service_foundation_nutsnews_environments.production.network_alias
            != vps_service_foundation_nutsnews_environments.staging.network_alias
          - >-
            vps_service_foundation_nutsnews_environments.production.cache_volume_name
            != vps_service_foundation_nutsnews_environments.staging.cache_volume_name
