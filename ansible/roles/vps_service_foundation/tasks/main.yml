- name: Install Docker Engine, Compose, and backup packages
  ansible.builtin.apt:
    name: "{{ vps_service_foundation_docker_packages + vps_service_foundation_backup_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Explain service foundation check mode limits
  ansible.builtin.debug:
    msg: >-
      Docker package installation is simulated in check mode. Runtime tasks that
      require the docker service, docker group, service user, restic/rclone
      configuration, or newly created /opt/nutsnews directories are skipped
      until apply mode creates them.
  when: ansible_check_mode

- name: Manage Docker service and service foundation runtime
  when: not ansible_check_mode
  block:
    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Configure Docker daemon defaults
      ansible.builtin.template:
        src: daemon.json.j2
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
      notify: Restart docker

    - name: Add approved operators to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups:
          - docker
        append: true
      loop: "{{ vps_service_foundation_docker_users }}"

    - name: Ensure Caddy runtime group exists
      ansible.builtin.group:
        name: "{{ vps_service_foundation_caddy_group }}"
        gid: "{{ vps_service_foundation_caddy_gid }}"
        system: true
        state: present

    - name: Ensure Caddy runtime user exists
      ansible.builtin.user:
        name: "{{ vps_service_foundation_caddy_user }}"
        uid: "{{ vps_service_foundation_caddy_uid }}"
        group: "{{ vps_service_foundation_caddy_group }}"
        system: true
        create_home: false
        home: /nonexistent
        shell: /usr/sbin/nologin
        state: present

    - name: Create NutsNews service directory layout
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop: "{{ vps_service_foundation_directories }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Install Caddy Compose file
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_compose_file }}"
        dest: "{{ vps_service_foundation_caddy_compose_file }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Caddy placeholder config
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_caddyfile }}"
        dest: "{{ vps_service_foundation_caddy_config_dir }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"

    - name: Install Caddy app route template
      ansible.builtin.template:
        src: nutsnews-app.routes.j2
        dest: "{{ vps_service_foundation_caddy_route_file }}"
        owner: root
        group: root
        mode: "0644"

    - name: Validate operations portal Google OAuth configuration
      ansible.builtin.assert:
        that:
          - vps_service_foundation_ops_portal_allowed_email == 'rami.deltoro@gmail.com'
          - vps_service_foundation_ops_portal_callback_path == '/api/auth/callback/google'
          - vps_service_foundation_ops_portal_callback_url is match('^https://[^/]+/api/auth/callback/google$')
          - vps_service_foundation_ops_portal_callback_url in (vps_service_foundation_ops_portal_callback_urls | dict2items | map(attribute='value') | list)
          - vps_service_foundation_ops_portal_google_client_id | trim | length > 0
          - vps_service_foundation_ops_portal_google_client_secret | trim | length > 0
          - vps_service_foundation_ops_portal_session_secret | length >= 32
        fail_msg: >-
          Ops Portal Google OAuth is incomplete or misaligned. Set Google client
          credentials, a 32+ character session secret, allowed email
          rami.deltoro@gmail.com, and an authorized redirect URI ending exactly
          /api/auth/callback/google.
        success_msg: Ops Portal Google OAuth configuration is valid.
      no_log: true

    - name: Install operations portal auth gateway
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_portal_auth_gateway }}"
        dest: "{{ vps_service_foundation_ops_portal_auth_file }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install operations portal auth environment
      ansible.builtin.template:
        src: ops-portal-auth.env.j2
        dest: "{{ vps_service_foundation_ops_portal_auth_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Validate app deployment inputs
      ansible.builtin.assert:
        that:
          - "vps_service_foundation_nutsnews_app_container_name is match('^[a-z0-9][a-z0-9._-]*$')"
          - "vps_service_foundation_nutsnews_app_container_port | int > 0"
          - "vps_service_foundation_nutsnews_app_health_path is match('^/.+$')"
          - "vps_service_foundation_nutsnews_app_route_path is match('^/.+$')"
          - >-
            not (vps_service_foundation_nutsnews_app_route_enabled | bool) or
            (vps_service_foundation_nutsnews_app_enabled | bool)
          - "vps_service_foundation_nutsnews_app_env_file is match('^/.+$')"
        fail_msg: >-
          App deployment settings are incomplete. Ensure app env file naming, route,
          port, and enablement rules are valid.
        success_msg: NutsNews app deployment inputs are valid.

    - name: Validate app env dict type
      ansible.builtin.assert:
        that:
          - vps_service_foundation_nutsnews_app_envs is mapping
          - vps_service_foundation_nutsnews_app_secret_env_keys is iterable
          - vps_service_foundation_nutsnews_app_required_secrets is iterable
        fail_msg: "NutsNews app env or app secret key lists are not valid types."
      when: vps_service_foundation_nutsnews_app_enabled | bool
      no_log: true

    - name: Normalize app secret key lists
      ansible.builtin.set_fact:
        vps_service_foundation_nutsnews_app_secret_env_keys: "{{
          vps_service_foundation_nutsnews_app_secret_env_keys | default([]) | map('string') | unique | list
        }}"
        vps_service_foundation_nutsnews_app_required_secret_keys: "{{
          vps_service_foundation_nutsnews_app_required_secrets | default([]) | map('string') | unique | list
        }}"
      when: vps_service_foundation_nutsnews_app_enabled | bool

    - name: Validate required app secret declarations
      ansible.builtin.assert:
        that:
          - "{{ (vps_service_foundation_nutsnews_app_required_secret_keys | difference(vps_service_foundation_nutsnews_app_secret_env_keys)) | length == 0 }}"
          - >-
            {{
              (vps_service_foundation_nutsnews_app_required_secret_keys
              | difference(vps_service_foundation_nutsnews_app_envs.keys() | list))
              | length == 0
            }}
        fail_msg: >-
          App secrets are required for app deployment, but required secret keys are
          missing from vps_service_foundation_nutsnews_app_secret_env_keys or app env values.
          Add the key names to vps_service_foundation_nutsnews_app_secret_env_keys and
          ensure vps_service_foundation_nutsnews_app_envs has them with non-empty values.
      when: vps_service_foundation_nutsnews_app_enabled | bool
      no_log: true

    - name: Validate required app secret values
      ansible.builtin.assert:
        that:
          - "vps_service_foundation_nutsnews_app_envs[item] is defined"
          - "(vps_service_foundation_nutsnews_app_envs[item] | trim | length) > 0"
        fail_msg: "Required app secret '{{ item }}' is empty. Set it in vps_service_foundation_nutsnews_app_envs."
      loop: "{{ vps_service_foundation_nutsnews_app_required_secret_keys | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: vps_service_foundation_nutsnews_app_enabled | bool and vps_service_foundation_nutsnews_app_required_secret_keys | length > 0
      no_log: true

    - name: Install NutsNews app Compose file
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_nutsnews_app_source_compose_file }}"
        dest: "{{ vps_service_foundation_nutsnews_app_compose_file }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install NutsNews app environment
      ansible.builtin.template:
        src: nutsnews-app.env.j2
        dest: "{{ vps_service_foundation_nutsnews_app_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install local health placeholder page
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_health_index }}"
        dest: "{{ vps_service_foundation_health_dir }}/index.html"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal static files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop: "{{ vps_service_foundation_portal_files }}"
      loop_control:
        label: "{{ item.dest }}"

    - name: Install operations portal collector
      ansible.builtin.copy:
        src: ops_portal_collector.py
        dest: "{{ vps_service_foundation_collector_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install NutsNews infrastructure health endpoint
      ansible.builtin.copy:
        src: infra_health.py
        dest: "{{ vps_service_foundation_infra_health_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install operations portal reporter
      ansible.builtin.copy:
        src: ops_portal_reporter.py
        dest: "{{ vps_service_foundation_reporter_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install Cloudflare DDNS updater
      ansible.builtin.copy:
        src: cloudflare_ddns.py
        dest: "{{ vps_service_foundation_cloudflare_ddns_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install operations portal reporter environment
      ansible.builtin.template:
        src: ops-reporter.env.j2
        dest: "{{ vps_service_foundation_reporter_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install Cloudflare DDNS environment
      ansible.builtin.template:
        src: cloudflare-ddns.env.j2
        dest: "{{ vps_service_foundation_cloudflare_ddns_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install encrypted VPS backup runner
      ansible.builtin.copy:
        src: vps_restic_backup.py
        dest: "{{ vps_service_foundation_backup_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install encrypted VPS backup environment
      ansible.builtin.template:
        src: vps-backup.env.j2
        dest: "{{ vps_service_foundation_backup_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install encrypted VPS backup path list
      ansible.builtin.template:
        src: vps-backup-paths.txt.j2
        dest: "{{ vps_service_foundation_backup_paths_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Install encrypted VPS backup exclude list
      ansible.builtin.template:
        src: vps-backup-excludes.txt.j2
        dest: "{{ vps_service_foundation_backup_excludes_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Install encrypted VPS backup restic password file
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_backup_restic_password_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ vps_service_foundation_backup_restic_password }}\n"
      no_log: true

    - name: Install encrypted VPS backup rclone config
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_backup_rclone_config_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ (vps_service_foundation_backup_rclone_config | trim) ~ '\n' }}"
      no_log: true

    - name: Validate encrypted VPS backup configuration when enabled
      ansible.builtin.assert:
        that:
          - not (vps_service_foundation_backup_enabled | bool) or vps_service_foundation_backup_repository is match('^rclone:[^:]+:.+')
          - not (vps_service_foundation_backup_enabled | bool) or vps_service_foundation_backup_rclone_remote in vps_service_foundation_backup_repository
          - not (vps_service_foundation_backup_enabled | bool) or (vps_service_foundation_backup_restic_password | length) > 0
          - not (vps_service_foundation_backup_enabled | bool) or (vps_service_foundation_backup_rclone_config | trim | length) > 0
        fail_msg: >-
          VPS backups are enabled, but restic/rclone backup configuration is
          incomplete. Add the documented production-vps Environment secrets and
          rerun protected apply.
        success_msg: Encrypted VPS backup configuration is disabled or complete.
      no_log: true

    - name: Install operations portal collector service
      ansible.builtin.template:
        src: nutsnews-ops-portal-collector.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_collector_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Cloudflare DDNS service
      ansible.builtin.template:
        src: nutsnews-cloudflare-ddns.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_cloudflare_ddns_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Cloudflare DDNS timer
      ansible.builtin.template:
        src: nutsnews-cloudflare-ddns.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_cloudflare_ddns_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install NutsNews infrastructure health service
      ansible.builtin.template:
        src: nutsnews-infra-health.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_infra_health_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal collector timer
      ansible.builtin.template:
        src: nutsnews-ops-portal-collector.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_collector_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal alert check service
      ansible.builtin.template:
        src: nutsnews-ops-alert-check.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_alert_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal alert check timer
      ansible.builtin.template:
        src: nutsnews-ops-alert-check.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_alert_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal health report service
      ansible.builtin.template:
        src: nutsnews-ops-health-report.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_report_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal health report timer
      ansible.builtin.template:
        src: nutsnews-ops-health-report.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_report_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup service
      ansible.builtin.template:
        src: nutsnews-restic-backup.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup timer
      ansible.builtin.template:
        src: nutsnews-restic-backup.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup verification service
      ansible.builtin.template:
        src: nutsnews-restic-verify.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_verify_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Apply pending Docker daemon changes
      ansible.builtin.meta: flush_handlers

    - name: Enable operations portal collector timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_collector_timer }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable NutsNews infrastructure health service
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_infra_health_service }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Allow Caddy Docker network to reach infrastructure health service
      community.general.ufw:
        rule: allow
        direction: in
        from_ip: "{{ vps_service_foundation_infra_health_ufw_allow_from }}"
        port: "{{ vps_service_foundation_infra_health_port | string }}"
        proto: tcp
        comment: "{{ vps_service_foundation_infra_health_ufw_comment }}"

    - name: Enable operations portal email timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - "{{ vps_service_foundation_alert_timer }}"
        - "{{ vps_service_foundation_report_timer }}"

    - name: Manage encrypted VPS backup timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_backup_timer }}"
        enabled: "{{ vps_service_foundation_backup_enabled | bool }}"
        state: "{{ (vps_service_foundation_backup_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Manage Cloudflare DDNS timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_cloudflare_ddns_timer }}"
        enabled: "{{ vps_service_foundation_cloudflare_ddns_enabled | bool }}"
        state: "{{ (vps_service_foundation_cloudflare_ddns_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Verify Cloudflare DDNS updater configuration
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_cloudflare_ddns_bin }}"
      environment:
        CLOUDFLARE_API_TOKEN: "{{ vps_service_foundation_cloudflare_ddns_api_token }}"
        CLOUDFLARE_ZONE_NAME: "{{ vps_service_foundation_cloudflare_ddns_zone_name }}"
        CLOUDFLARE_RECORD_NAME: "{{ vps_service_foundation_cloudflare_ddns_record_name }}"
        CLOUDFLARE_RECORD_TTL: "{{ vps_service_foundation_cloudflare_ddns_record_ttl | string }}"
        CLOUDFLARE_RECORD_PROXIED: "{{ (vps_service_foundation_cloudflare_ddns_proxied | bool) | ternary('1', '0') }}"
        CLOUDFLARE_DDNS_DRY_RUN: "1"
        CLOUDFLARE_DDNS_IP_ENDPOINTS: "{{ vps_service_foundation_cloudflare_ddns_ip_endpoints | join(',') }}"
      changed_when: false
      no_log: true
      when: vps_service_foundation_cloudflare_ddns_enabled | bool

    - name: Refresh operations portal status snapshot
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_collector_bin }}"
      changed_when: false

    - name: Refresh operations portal reporting status snapshot
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_reporter_bin }}"
          - --mode
          - alert
          - --dry-run
      changed_when: false

    - name: Refresh operations portal status after reporting update
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_collector_bin }}"
      changed_when: false

    - name: Validate Caddy Compose configuration
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_caddy_app_dir }}"
          - -f
          - "{{ vps_service_foundation_caddy_compose_file }}"
          - config
          - --quiet
      changed_when: false

    - name: Start Caddy service foundation
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_caddy_app_dir }}"
          - -f
          - "{{ vps_service_foundation_caddy_compose_file }}"
          - up
          - -d
          - --remove-orphans
      register: vps_service_foundation_compose_up
      changed_when: >-
        'Created' in vps_service_foundation_compose_up.stdout
        or 'Created' in vps_service_foundation_compose_up.stderr
        or 'Recreated' in vps_service_foundation_compose_up.stdout
        or 'Recreated' in vps_service_foundation_compose_up.stderr
        or 'Started' in vps_service_foundation_compose_up.stdout
        or 'Started' in vps_service_foundation_compose_up.stderr
        or 'Pulling' in vps_service_foundation_compose_up.stdout
        or 'Pulling' in vps_service_foundation_compose_up.stderr

    - name: Validate NutsNews app Compose configuration
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_nutsnews_app_dir }}"
          - --env-file
          - "{{ vps_service_foundation_nutsnews_app_env_file }}"
          - -f
          - "{{ vps_service_foundation_nutsnews_app_compose_file }}"
          - config
          - --quiet
      changed_when: false

    - name: Start NutsNews app service layer when enabled
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_nutsnews_app_dir }}"
          - --env-file
          - "{{ vps_service_foundation_nutsnews_app_env_file }}"
          - -f
          - "{{ vps_service_foundation_nutsnews_app_compose_file }}"
          - up
          - -d
          - --remove-orphans
      register: vps_service_foundation_nutsnews_app_compose_up
      when: vps_service_foundation_nutsnews_app_enabled | bool
      changed_when: >-
        'Created' in vps_service_foundation_nutsnews_app_compose_up.stdout
        or 'Created' in vps_service_foundation_nutsnews_app_compose_up.stderr
        or 'Recreated' in vps_service_foundation_nutsnews_app_compose_up.stdout
        or 'Recreated' in vps_service_foundation_nutsnews_app_compose_up.stderr
        or 'Started' in vps_service_foundation_nutsnews_app_compose_up.stdout
        or 'Started' in vps_service_foundation_nutsnews_app_compose_up.stderr
        or 'Pulling' in vps_service_foundation_nutsnews_app_compose_up.stdout
        or 'Pulling' in vps_service_foundation_nutsnews_app_compose_up.stderr

    - name: Verify local Caddy health endpoint
      block:
        - name: Write deployed infrastructure commit marker
          ansible.builtin.copy:
            dest: "{{ vps_service_foundation_deployed_infra_commit_file }}"
            owner: root
            group: root
            mode: "0644"
            content: "{{ vps_service_foundation_deployed_infra_commit }}\n"
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Write protected apply status marker
          ansible.builtin.copy:
            dest: "{{ vps_service_foundation_apply_status_file }}"
            owner: root
            group: root
            mode: "0644"
            content: |
              {{
                (
                  vps_service_foundation_apply_context
                  | combine(
                      {
                        'status': 'applied',
                        'recorded_at': ansible_date_time.iso8601,
                        'commit': vps_service_foundation_deployed_infra_commit
                      },
                      recursive=True
                    )
                )
                | to_nice_json
              }}
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Refresh operations portal status after apply marker update
          ansible.builtin.command:
            argv:
              - "{{ vps_service_foundation_collector_bin }}"
          changed_when: false
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Write deployed app metadata marker
          ansible.builtin.copy:
            dest: "{{ vps_service_foundation_nutsnews_app_apply_marker_file }}"
            owner: root
            group: root
            mode: "0644"
            content: |
              {{
                {
                  'status': (vps_service_foundation_nutsnews_app_enabled | ternary('enabled', 'disabled')),
                  'route_enabled': (vps_service_foundation_nutsnews_app_route_enabled | bool),
                  'route_path': vps_service_foundation_nutsnews_app_route_path,
                  'image_repo': vps_service_foundation_nutsnews_app_image_repo,
                  'image_tag': vps_service_foundation_nutsnews_app_image_tag,
                  'recorded_at': ansible_date_time.iso8601,
                  'container_name': vps_service_foundation_nutsnews_app_container_name,
                }
                | to_nice_json
              }}
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Verify app container health when enabled
          ansible.builtin.command:
            argv:
              - docker
              - inspect
              - --format
              - "{{ '{{.State.Running}}|{{.State.Health.Status}}' }}"
              - "{{ vps_service_foundation_nutsnews_app_container_name }}"
          register: vps_service_foundation_nutsnews_app_healthcheck
          changed_when: false
          when: vps_service_foundation_nutsnews_app_enabled | bool
          failed_when: false

        - name: Define app route health URL for staged rollout checks
          ansible.builtin.set_fact:
            vps_service_foundation_nutsnews_app_route_health_url: >-
              {{
                "http://127.0.0.1:8080/"
                ~ (vps_service_foundation_nutsnews_app_route_path | regex_replace("^/+|/+$", ""))
                ~ "/"
                ~ (vps_service_foundation_nutsnews_app_health_path | regex_replace("^/+|/+$", ""))
              }}
          when: vps_service_foundation_nutsnews_app_enabled | bool

        - name: Assert app container health when route enabled
          ansible.builtin.assert:
            that:
              - >-
                not (vps_service_foundation_nutsnews_app_route_enabled | bool) or
                (
                  vps_service_foundation_nutsnews_app_healthcheck.stdout is search('True\|healthy')
                  or vps_service_foundation_nutsnews_app_healthcheck.stdout is search('True\|none')
                )
            fail_msg: >-
              App route is enabled, but the app container is not healthy enough to
              support staged routing.
          when: vps_service_foundation_nutsnews_app_enabled | bool

        - name: Wait for app route health endpoint when app route is enabled
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_nutsnews_app_route_health_url }}"
            return_content: true
            status_code: 200
          register: vps_service_foundation_nutsnews_app_route_health
          changed_when: false
          retries: 10
          delay: 3
          until:
            - vps_service_foundation_nutsnews_app_route_health.status == 200
            - '"ok" in vps_service_foundation_nutsnews_app_route_health.content | lower'
          when: vps_service_foundation_nutsnews_app_enabled | bool and vps_service_foundation_nutsnews_app_route_enabled | bool

        - name: Wait for local Caddy health endpoint
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_healthcheck_url }}"
            return_content: true
            status_code: 200
          register: vps_service_foundation_healthcheck
          changed_when: false
          retries: 12
          delay: 5
          until:
            - vps_service_foundation_healthcheck.status == 200
            - vps_service_foundation_healthcheck.content | trim == "ok"

        - name: Wait for local infrastructure health endpoint
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_infra_health_url }}"
            return_content: true
            status_code: 200
          register: vps_service_foundation_infra_healthcheck
          changed_when: false
          retries: 6
          delay: 5
          until:
            - vps_service_foundation_infra_healthcheck.status == 200
            - vps_service_foundation_infra_healthcheck.content is search('"ok":true')

        - name: Wait for local operations portal status data
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_portal_status_url }}"
            return_content: true
            status_code: 302
            follow_redirects: "no"
          register: vps_service_foundation_portal_status
          changed_when: false
          retries: 6
          delay: 5
          until:
            - vps_service_foundation_portal_status.status == 302
            - vps_service_foundation_portal_status.location == '/api/auth/signin/google'

      rescue:
        - name: Show Caddy Compose status after health failure
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - --project-directory
              - "{{ vps_service_foundation_caddy_app_dir }}"
              - -f
              - "{{ vps_service_foundation_caddy_compose_file }}"
              - ps
          register: vps_service_foundation_compose_ps
          changed_when: false
          failed_when: false

        - name: Print Caddy Compose status after health failure
          ansible.builtin.debug:
            var: vps_service_foundation_compose_ps.stdout_lines

        - name: Show Caddy logs after health failure
          ansible.builtin.command:
            argv:
              - docker
              - logs
              - --tail
              - "200"
              - nutsnews-caddy
          register: vps_service_foundation_caddy_logs
          changed_when: false
          failed_when: false

        - name: Print Caddy logs after health failure
          ansible.builtin.debug:
            msg: >-
              {{
                (vps_service_foundation_caddy_logs.stdout_lines | default([]))
                + (vps_service_foundation_caddy_logs.stderr_lines | default([]))
              }}

        - name: Fail Caddy health verification
          ansible.builtin.fail:
            msg: >-
              Caddy did not answer {{ vps_service_foundation_healthcheck_url }}
              or the portal status feed was not protected by Google OAuth at {{ vps_service_foundation_portal_status_url }}.
              Compose status and container logs were printed above.
