- name: Install service foundation packages
  ansible.builtin.apt:
    name: >-
      {{
        vps_service_foundation_docker_packages
        + vps_service_foundation_backup_packages
        + ((vps_service_foundation_zram_enabled | bool) | ternary(vps_service_foundation_zram_packages, []))
      }}
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Explain service foundation check mode limits
  ansible.builtin.debug:
    msg: >-
      Docker package installation is simulated in check mode. Runtime tasks that
      require the docker service, docker group, service user, restic/rclone
      configuration, or newly created /opt/nutsnews directories are skipped
      until apply mode creates them.
  when: ansible_check_mode

- name: Validate opt-in staging access boundary inputs
  ansible.builtin.assert:
    that:
      - vps_service_foundation_nutsnews_staging_access_domain == 'staging.nutsnews.com'
      - vps_service_foundation_nutsnews_staging_access_team_domain is match('^[a-z0-9-]+\\.cloudflareaccess\\.com$')
      - vps_service_foundation_nutsnews_staging_access_audience is match('^[A-Za-z0-9_-]{20,128}$')
      - 'vps_service_foundation_nutsnews_staging_deploy_public_key is match("^(ssh-ed25519|ecdsa-sha2-nistp256) [A-Za-z0-9+/=]+(?: .*)?$")'
      - vps_service_foundation_deployed_infra_commit is match('^[0-9a-f]{40}$')
      - vps_service_foundation_nutsnews_environments.staging.project_name == 'nutsnews-staging'
      - vps_service_foundation_nutsnews_environments.staging.network_name == 'nutsnews-edge-staging'
      - vps_service_foundation_nutsnews_environments.staging.network_alias == 'nutsnews-app-staging'
    fail_msg: >-
      Staging access is opt-in and requires the exact staging hostname, a
      Cloudflare Access team domain and audience, and the reviewed isolated
      staging runtime identities.
  when: vps_service_foundation_nutsnews_staging_access_enabled | bool
  no_log: true

- name: Manage zram fallback configuration
  when: vps_service_foundation_zram_enabled | bool
  block:
    - name: Validate zram fallback settings
      ansible.builtin.assert:
        that:
          - vps_service_foundation_zram_device is match('^zram[0-9]+$')
          - vps_service_foundation_zram_size_mib | int >= 1024
          - vps_service_foundation_zram_size_mib | int <= 2048
          - vps_service_foundation_zram_swappiness | int >= 1
          - vps_service_foundation_zram_swappiness | int <= 30
          - vps_service_foundation_zram_swap_priority | int >= -1
          - vps_service_foundation_zram_swap_priority | int <= 32767
          - vps_service_foundation_zram_compression_algorithm | trim | length > 0
        fail_msg: >-
          zram fallback settings must stay small and conservative: 1-2 GiB,
          low swappiness, valid zram device name, and a known compression algorithm.
        success_msg: zram fallback settings are conservative and valid.

    - name: Install zram generator configuration
      ansible.builtin.template:
        src: zram-generator.conf.j2
        dest: "{{ vps_service_foundation_zram_config_file }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_zram_config_install

    - name: Configure low host swappiness for zram fallback
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "{{ vps_service_foundation_zram_swappiness }}"
        state: present
        reload: true
        sysctl_file: "{{ vps_service_foundation_zram_sysctl_file }}"
      register: vps_service_foundation_zram_swappiness_config

    - name: Read active swap devices before zram start
      ansible.builtin.command:
        argv:
          - swapon
          - --show=NAME
          - --noheadings
      register: vps_service_foundation_zram_active_swap_before
      changed_when: false
      when: not ansible_check_mode

    - name: Reload systemd units after zram generator changes
      ansible.builtin.systemd_service:
        daemon_reload: true
      changed_when: false
      when: not ansible_check_mode

    - name: Start zram fallback swap device
      ansible.builtin.command:
        argv:
          - systemctl
          - start
          - "/dev/{{ vps_service_foundation_zram_device }}"
      changed_when: true
      when:
        - not ansible_check_mode
        - >-
          (
            '/dev/' ~ vps_service_foundation_zram_device
          ) not in (vps_service_foundation_zram_active_swap_before.stdout_lines | default([]))

    - name: Validate zram fallback swap is active
      ansible.builtin.command:
        argv:
          - swapon
          - --show=NAME,SIZE,USED,TYPE,PRIO
          - --bytes
          - --noheadings
      register: vps_service_foundation_zram_swapon_show
      changed_when: false
      when: not ansible_check_mode

    - name: Validate zram fallback swappiness is active
      ansible.builtin.command:
        argv:
          - cat
          - /proc/sys/vm/swappiness
      register: vps_service_foundation_zram_live_swappiness
      changed_when: false
      when: not ansible_check_mode

    - name: Assert zram fallback runtime state
      ansible.builtin.assert:
        that:
          - >-
            (vps_service_foundation_zram_swapon_show.stdout | default(''))
            is search('(^|\n)(/dev/)?' ~ vps_service_foundation_zram_device ~ '([ \t]|$)')
          - >-
            (vps_service_foundation_zram_swapon_show.stdout | default(''))
            is search(
              '(^|\n)(/dev/)?' ~ vps_service_foundation_zram_device
              ~ '[ \t]+[0-9]+[ \t]+[0-9]+[ \t]+(partition|zram)[ \t]+'
              ~ (vps_service_foundation_zram_swap_priority | string) ~ '([ \t]|\n|$)'
            )
          - vps_service_foundation_zram_live_swappiness.stdout | int == vps_service_foundation_zram_swappiness | int
        fail_msg: >-
          zram fallback did not become active with the configured swappiness.
          Check systemd-zram-generator status before applying further changes.
        success_msg: zram fallback swap is active with the configured swappiness.
      when: not ansible_check_mode

- name: Manage Docker service and service foundation runtime
  when: not ansible_check_mode
  block:
    - name: Ensure Docker service is enabled
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Configure Docker daemon defaults
      ansible.builtin.template:
        src: daemon.json.j2
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
      notify: Restart docker

    - name: Add approved operators to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups:
          - docker
        append: true
      loop: "{{ vps_service_foundation_docker_users }}"

    - name: Ensure Caddy runtime group exists
      ansible.builtin.group:
        name: "{{ vps_service_foundation_caddy_group }}"
        gid: "{{ vps_service_foundation_caddy_gid }}"
        system: true
        state: present

    - name: Ensure Caddy runtime user exists
      ansible.builtin.user:
        name: "{{ vps_service_foundation_caddy_user }}"
        uid: "{{ vps_service_foundation_caddy_uid }}"
        group: "{{ vps_service_foundation_caddy_group }}"
        system: true
        create_home: false
        home: /nonexistent
        shell: /usr/sbin/nologin
        state: present

    - name: Create NutsNews service directory layout
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop: "{{ vps_service_foundation_directories }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Find existing encrypted VPS backup log files
      ansible.builtin.find:
        paths: "{{ vps_service_foundation_backup_log_dir }}"
        patterns:
          - "*.log"
          - "*.jsonl"
        file_type: file
      register: vps_service_foundation_backup_log_files
      changed_when: false

    - name: Allow observability agent to read encrypted VPS backup logs
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: root
        group: "{{ vps_service_foundation_backup_log_group }}"
        mode: "0640"
      loop: "{{ vps_service_foundation_backup_log_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    - name: Install Caddy Compose file
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_compose_file }}"
        dest: "{{ vps_service_foundation_caddy_compose_file }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddy_compose_install

    - name: Install Caddy image build file
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_caddy_dockerfile }}"
        dest: "{{ vps_service_foundation_caddy_dockerfile }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddy_dockerfile_install

    - name: Install Caddy configuration
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: "{{ vps_service_foundation_caddy_config_dir }}/Caddyfile"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddyfile_install

    - name: Validate Caddy rate limit inputs
      ansible.builtin.assert:
        that:
          - vps_service_foundation_caddy_rate_limit_zones is iterable
          - vps_service_foundation_caddy_rate_limit_zones | length > 0
          - vps_service_foundation_caddy_rate_limit_ipv6_prefix | int >= 0
          - vps_service_foundation_caddy_rate_limit_ipv6_prefix | int <= 128
          - vps_service_foundation_caddy_rate_limit_jitter_percent | int >= 0
          - vps_service_foundation_caddy_rate_limit_jitter_percent | int <= 100
        fail_msg: Caddy rate limit settings are invalid.
        success_msg: Caddy rate limit global settings are valid.
      when: vps_service_foundation_caddy_rate_limits_enabled | bool

    - name: Validate Caddy rate limit zones
      ansible.builtin.assert:
        that:
          - item.name is match('^[a-z][a-z0-9_]*$')
          - item.paths is iterable
          - item.paths | length > 0
          - item.events | int > 0
          - item.window is match('^[0-9]+(ms|s|m|h)$')
        fail_msg: "Caddy rate limit zone '{{ item.name | default('unknown') }}' is invalid."
        success_msg: "Caddy rate limit zone '{{ item.name }}' is valid."
      loop: "{{ vps_service_foundation_caddy_rate_limit_zones }}"
      loop_control:
        label: "{{ item.name | default('unknown') }}"
      when: vps_service_foundation_caddy_rate_limits_enabled | bool

    - name: Install Caddy rate limit config
      ansible.builtin.template:
        src: caddy-rate-limits.j2
        dest: "{{ vps_service_foundation_caddy_rate_limit_file }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddy_rate_limit_install

    - name: Install Caddy app route template
      ansible.builtin.template:
        src: nutsnews-app.routes.j2
        dest: "{{ vps_service_foundation_caddy_route_file }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddy_route_install
      when: "'production' in vps_service_foundation_nutsnews_deployment_environments"

    - name: Install Caddy public app route template
      ansible.builtin.template:
        src: nutsnews-app.public.routes.j2
        dest: "{{ vps_service_foundation_caddy_public_route_file }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_caddy_public_route_install
      when: "'production' in vps_service_foundation_nutsnews_deployment_environments"

    - name: Validate operations portal Google OAuth configuration
      ansible.builtin.assert:
        that:
          - vps_service_foundation_ops_portal_allowed_email == 'rami.deltoro@gmail.com'
          - vps_service_foundation_ops_portal_callback_path == '/api/auth/callback/google'
          - vps_service_foundation_ops_portal_callback_url is match('^https://[^/]+/api/auth/callback/google$')
          - vps_service_foundation_ops_portal_callback_url in (vps_service_foundation_ops_portal_callback_urls | dict2items | map(attribute='value') | list)
          - vps_service_foundation_ops_portal_google_client_id | trim | length > 0
          - vps_service_foundation_ops_portal_google_client_secret | trim | length > 0
          - vps_service_foundation_ops_portal_session_secret | length >= 32
        fail_msg: >-
          Ops Portal Google OAuth is incomplete or misaligned. Set Google client
          credentials, a 32+ character session secret, allowed email
          rami.deltoro@gmail.com, and an authorized redirect URI ending exactly
          /api/auth/callback/google.
        success_msg: Ops Portal Google OAuth configuration is valid.
      no_log: true

    - name: Install operations portal auth gateway
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_portal_auth_gateway }}"
        dest: "{{ vps_service_foundation_ops_portal_auth_file }}"
        owner: root
        group: root
        mode: "0755"
      register: vps_service_foundation_ops_auth_gateway_install

    - name: Install operations portal auth environment
      ansible.builtin.template:
        src: ops-portal-auth.env.j2
        dest: "{{ vps_service_foundation_ops_portal_auth_env_file }}"
        owner: root
        group: root
        mode: "0600"
      register: vps_service_foundation_ops_auth_env_install
      no_log: true

    - name: Write Caddy OAuth routing reload marker
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_ops_dir }}/caddy-oauth-routing-reload-marker"
        owner: root
        group: root
        mode: "0644"
        content: |
          caddy-oauth-routing-v1
      register: vps_service_foundation_caddy_oauth_reload_marker_install

    - name: Validate the explicit NutsNews runtime environment model
      ansible.builtin.assert:
        that:
          - vps_service_foundation_nutsnews_environment_names == ['production', 'staging']
          - vps_service_foundation_nutsnews_environments is mapping
          - (vps_service_foundation_nutsnews_environments.keys() | list | sort) == ['production', 'staging']
          - vps_service_foundation_nutsnews_deployment_environments is iterable
          - (vps_service_foundation_nutsnews_deployment_environments | difference(vps_service_foundation_nutsnews_environment_names)) | length == 0
          - >-
            (vps_service_foundation_nutsnews_deployment_environments | unique | list | length)
            == (vps_service_foundation_nutsnews_deployment_environments | length)
          - vps_service_foundation_nutsnews_environments.production.name == 'production'
          - vps_service_foundation_nutsnews_environments.production.project_name == 'nutsnews-app'
          - vps_service_foundation_nutsnews_environments.production.network_name == 'nutsnews-edge-v6'
          - vps_service_foundation_nutsnews_environments.staging.name == 'staging'
          - not (vps_service_foundation_nutsnews_environments.staging.enabled | bool)
          - not (vps_service_foundation_nutsnews_environments.staging.staged_route_enabled | bool)
          - not (vps_service_foundation_nutsnews_environments.staging.public_route_enabled | bool)
          - >-
            vps_service_foundation_nutsnews_environments.production.project_name
            != vps_service_foundation_nutsnews_environments.staging.project_name
          - >-
            vps_service_foundation_nutsnews_environments.production.app_dir
            != vps_service_foundation_nutsnews_environments.staging.app_dir
          - >-
            vps_service_foundation_nutsnews_environments.production.compose_file
            != vps_service_foundation_nutsnews_environments.staging.compose_file
          - >-
            vps_service_foundation_nutsnews_environments.production.env_file
            != vps_service_foundation_nutsnews_environments.staging.env_file
          - >-
            vps_service_foundation_nutsnews_environments.production.state_dir
            != vps_service_foundation_nutsnews_environments.staging.state_dir
          - >-
            vps_service_foundation_nutsnews_environments.production.release_manifest_file
            != vps_service_foundation_nutsnews_environments.staging.release_manifest_file
          - >-
            vps_service_foundation_nutsnews_environments.production.apply_marker_file
            != vps_service_foundation_nutsnews_environments.staging.apply_marker_file
          - >-
            vps_service_foundation_nutsnews_environments.production.last_known_good_state_file
            != vps_service_foundation_nutsnews_environments.staging.last_known_good_state_file
          - >-
            vps_service_foundation_nutsnews_environments.production.container_name
            != vps_service_foundation_nutsnews_environments.staging.container_name
          - >-
            vps_service_foundation_nutsnews_environments.production.network_name
            != vps_service_foundation_nutsnews_environments.staging.network_name
          - >-
            vps_service_foundation_nutsnews_environments.production.network_alias
            != vps_service_foundation_nutsnews_environments.staging.network_alias
          - >-
            vps_service_foundation_nutsnews_environments.production.cache_volume_name
            != vps_service_foundation_nutsnews_environments.staging.cache_volume_name
        fail_msg: >-
          NutsNews supports exactly the isolated production and staging runtime
          environments. Staging must remain disabled and cannot be attached to
          the production Caddy network or route.
        success_msg: NutsNews runtime environment identities are isolated.
      no_log: true

    - name: Preflight selected NutsNews runtime environments
      ansible.builtin.include_tasks: nutsnews_environment_validate.yml
      loop: "{{ vps_service_foundation_nutsnews_deployment_environments }}"
      loop_control:
        loop_var: nutsnews_environment_name
        label: "{{ nutsnews_environment_name }}"
      vars:
        nutsnews_environment: "{{ vps_service_foundation_nutsnews_environments[nutsnews_environment_name] }}"

    - name: Install local health placeholder page
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_health_index }}"
        dest: "{{ vps_service_foundation_health_dir }}/index.html"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal static files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop: "{{ vps_service_foundation_portal_files }}"
      loop_control:
        label: "{{ item.dest }}"

    - name: Install operations portal collector
      ansible.builtin.copy:
        src: ops_portal_collector.py
        dest: "{{ vps_service_foundation_collector_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install operations portal free-tier collector module
      ansible.builtin.copy:
        src: "{{ vps_service_foundation_source_free_tier_collector_module }}"
        dest: "{{ vps_service_foundation_free_tier_collector_module_file }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install NutsNews infrastructure health endpoint
      ansible.builtin.copy:
        src: infra_health.py
        dest: "{{ vps_service_foundation_infra_health_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install operations portal reporter
      ansible.builtin.copy:
        src: ops_portal_reporter.py
        dest: "{{ vps_service_foundation_reporter_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install Cloudflare DDNS updater
      ansible.builtin.copy:
        src: cloudflare_ddns.py
        dest: "{{ vps_service_foundation_cloudflare_ddns_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install conservative Docker cleanup runner
      ansible.builtin.copy:
        src: docker_cleanup.py
        dest: "{{ vps_service_foundation_docker_cleanup_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Validate conservative Docker cleanup settings
      ansible.builtin.assert:
        that:
          - vps_service_foundation_docker_cleanup_image_until is match('^[0-9]+(h|m|s)$')
          - vps_service_foundation_docker_cleanup_build_cache_until is match('^[0-9]+(h|m|s)$')
          - vps_service_foundation_docker_cleanup_on_calendar | trim | length > 0
        fail_msg: >-
          Docker cleanup requires explicit systemd calendar and age filters
          such as 168h. Refuse broad or empty prune settings.
        success_msg: Docker cleanup cadence and prune filters are conservative and valid.

    - name: Install operations portal reporter environment
      ansible.builtin.template:
        src: ops-reporter.env.j2
        dest: "{{ vps_service_foundation_reporter_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install operations portal free-tier usage environment
      ansible.builtin.template:
        src: free-tier-usage.env.j2
        dest: "{{ vps_service_foundation_free_tier_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install Cloudflare DDNS environment
      ansible.builtin.template:
        src: cloudflare-ddns.env.j2
        dest: "{{ vps_service_foundation_cloudflare_ddns_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install encrypted VPS backup runner
      ansible.builtin.copy:
        src: vps_restic_backup.py
        dest: "{{ vps_service_foundation_backup_bin }}"
        owner: root
        group: root
        mode: "0755"

    - name: Install encrypted VPS backup environment
      ansible.builtin.template:
        src: vps-backup.env.j2
        dest: "{{ vps_service_foundation_backup_env_file }}"
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Install encrypted VPS backup path list
      ansible.builtin.template:
        src: vps-backup-paths.txt.j2
        dest: "{{ vps_service_foundation_backup_paths_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Install encrypted VPS backup exclude list
      ansible.builtin.template:
        src: vps-backup-excludes.txt.j2
        dest: "{{ vps_service_foundation_backup_excludes_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Install encrypted VPS backup restic password file
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_backup_restic_password_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ vps_service_foundation_backup_restic_password }}\n"
      no_log: true

    - name: Install encrypted VPS backup rclone config
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_backup_rclone_config_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ (vps_service_foundation_backup_rclone_config | trim) ~ '\n' }}"
      no_log: true

    - name: Validate encrypted VPS backup configuration when enabled
      ansible.builtin.assert:
        that:
          - not (vps_service_foundation_backup_enabled | bool) or vps_service_foundation_backup_repository is match('^rclone:[^:]+:.+')
          - not (vps_service_foundation_backup_enabled | bool) or vps_service_foundation_backup_rclone_remote in vps_service_foundation_backup_repository
          - not (vps_service_foundation_backup_enabled | bool) or (vps_service_foundation_backup_restic_password | length) > 0
          - not (vps_service_foundation_backup_enabled | bool) or (vps_service_foundation_backup_rclone_config | trim | length) > 0
        fail_msg: >-
          VPS backups are enabled, but restic/rclone backup configuration is
          incomplete. Add the documented production-vps Environment secrets and
          rerun protected apply.
        success_msg: Encrypted VPS backup configuration is disabled or complete.
      no_log: true

    - name: Install operations portal collector service
      ansible.builtin.template:
        src: nutsnews-ops-portal-collector.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_collector_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Cloudflare DDNS service
      ansible.builtin.template:
        src: nutsnews-cloudflare-ddns.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_cloudflare_ddns_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Cloudflare DDNS timer
      ansible.builtin.template:
        src: nutsnews-cloudflare-ddns.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_cloudflare_ddns_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Validate infrastructure health network boundary
      ansible.builtin.assert:
        that:
          - vps_service_foundation_infra_health_host == '172.17.0.1'
          - vps_service_foundation_infra_health_port | int == 18080
          - vps_service_foundation_infra_health_ufw_allow_from == '172.20.0.0/16'
          - >-
            vps_service_foundation_infra_health_ufw_allow_from
            not in vps_service_foundation_deprecated_infra_health_ufw_allow_from
          - >-
            vps_service_foundation_deprecated_infra_health_ufw_allow_from
            == ['172.18.0.0/16']
          - vps_service_foundation_deprecated_docker_networks == ['nutsnews-edge']
        fail_msg: >-
          The infrastructure health endpoint must bind only to the Docker
          host-gateway address and accept traffic only from the Caddy Docker
          network. Update the evidence, Caddy mapping, and UFW rule together
          through a reviewed GitOps change before changing this boundary.
        success_msg: Infrastructure health listener and Caddy UFW boundary are narrow.

    - name: Install NutsNews infrastructure health service
      ansible.builtin.template:
        src: nutsnews-infra-health.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_infra_health_service }}"
        owner: root
        group: root
        mode: "0644"
      register: vps_service_foundation_infra_health_service_install

    - name: Install operations portal collector timer
      ansible.builtin.template:
        src: nutsnews-ops-portal-collector.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_collector_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal alert check service
      ansible.builtin.template:
        src: nutsnews-ops-alert-check.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_alert_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal alert check timer
      ansible.builtin.template:
        src: nutsnews-ops-alert-check.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_alert_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal health report service
      ansible.builtin.template:
        src: nutsnews-ops-health-report.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_report_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install operations portal health report timer
      ansible.builtin.template:
        src: nutsnews-ops-health-report.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_report_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup service
      ansible.builtin.template:
        src: nutsnews-restic-backup.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup timer
      ansible.builtin.template:
        src: nutsnews-restic-backup.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup verification service
      ansible.builtin.template:
        src: nutsnews-restic-verify.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_verify_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install encrypted VPS backup verification timer
      ansible.builtin.template:
        src: nutsnews-restic-verify.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_backup_verify_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install conservative Docker cleanup service
      ansible.builtin.template:
        src: nutsnews-docker-cleanup.service.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_docker_cleanup_service }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install conservative Docker cleanup timer
      ansible.builtin.template:
        src: nutsnews-docker-cleanup.timer.j2
        dest: "/etc/systemd/system/{{ vps_service_foundation_docker_cleanup_timer }}"
        owner: root
        group: root
        mode: "0644"

    - name: Seed Docker cleanup status before the first scheduled run
      ansible.builtin.copy:
        dest: "{{ vps_service_foundation_docker_cleanup_status_file }}"
        owner: root
        group: root
        mode: "0644"
        force: false
        content: |
          {{
            {
              'schema_version': 1,
              'status': 'installed_pending_first_run',
              'ok': None,
              'managed_by': 'ansible',
              'service': vps_service_foundation_docker_cleanup_service,
              'timer': vps_service_foundation_docker_cleanup_timer,
              'on_calendar': vps_service_foundation_docker_cleanup_on_calendar,
              'randomized_delay_seconds': vps_service_foundation_docker_cleanup_randomized_delay_seconds,
              'filters': {
                'image_until': vps_service_foundation_docker_cleanup_image_until,
                'build_cache_until': vps_service_foundation_docker_cleanup_build_cache_until
              },
              'notes': 'Initial GitOps-managed status. The scheduled unit will replace this after its first run.'
            } | to_nice_json
          }}

    - name: Manage Grafana Alloy observability agent
      when: vps_service_foundation_grafana_alloy_enabled | bool
      block:
        - name: Validate Grafana Alloy telemetry inputs
          ansible.builtin.assert:
            that:
              - vps_service_foundation_grafana_alloy_metrics_url is match('^https://')
              - vps_service_foundation_grafana_alloy_metrics_username | trim | length > 0
              - vps_service_foundation_grafana_alloy_logs_url is match('^https://')
              - vps_service_foundation_grafana_alloy_logs_username | trim | length > 0
              - vps_service_foundation_grafana_alloy_access_policy_token | trim | length > 0
              - vps_service_foundation_grafana_alloy_scrape_interval is match('^[0-9]+(ms|s|m|h)$')
              - vps_service_foundation_grafana_alloy_docker_log_compose_projects is iterable
              - vps_service_foundation_grafana_alloy_docker_log_compose_projects | length > 0
              - >-
                {{
                  (not (vps_service_foundation_grafana_alloy_collect_docker_logs | bool))
                  or (vps_service_foundation_grafana_alloy_docker_socket is match('^unix://'))
                }}
            fail_msg: >-
              Grafana Alloy is enabled, but Grafana Cloud telemetry endpoints,
              usernames, Access Policy token, scrape interval, or Docker log
              discovery settings are incomplete.
              Add the documented production-vps Environment secrets and rerun
              protected apply.
            success_msg: Grafana Alloy telemetry inputs are complete.
          no_log: true

        - name: Ensure Grafana apt key directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            owner: root
            group: root
            mode: "0755"
            state: directory
          when: vps_service_foundation_grafana_alloy_install_repo | bool

        - name: Install Grafana repository support package
          ansible.builtin.apt:
            name: "{{ vps_service_foundation_grafana_alloy_repo_support_packages }}"
            state: present
            update_cache: true
            cache_valid_time: 3600
          when: vps_service_foundation_grafana_alloy_install_repo | bool

        - name: Install Grafana apt signing key
          ansible.builtin.get_url:
            url: "{{ vps_service_foundation_grafana_alloy_apt_key_url }}"
            dest: "{{ vps_service_foundation_grafana_alloy_apt_key_file }}"
            owner: root
            group: root
            mode: "0644"
          when: vps_service_foundation_grafana_alloy_install_repo | bool

        - name: Configure Grafana apt repository
          ansible.builtin.deb822_repository:
            name: grafana
            types:
              - deb
            uris:
              - "{{ vps_service_foundation_grafana_alloy_apt_repo_uri }}"
            suites:
              - "{{ vps_service_foundation_grafana_alloy_apt_repo_suite }}"
            components: "{{ vps_service_foundation_grafana_alloy_apt_repo_components }}"
            signed_by: "{{ vps_service_foundation_grafana_alloy_apt_key_file }}"
            state: present
            enabled: true
          when: vps_service_foundation_grafana_alloy_install_repo | bool

        - name: Refresh apt cache after configuring Grafana repository
          ansible.builtin.apt:
            update_cache: true
          changed_when: false
          when: vps_service_foundation_grafana_alloy_install_repo | bool

        - name: Install Grafana Alloy package
          ansible.builtin.apt:
            name: "{{ vps_service_foundation_grafana_alloy_package }}"
            state: present

        - name: Ensure Alloy Docker telemetry group exists
          ansible.builtin.group:
            name: "{{ item }}"
            state: present
          loop: "{{ vps_service_foundation_grafana_alloy_docker_groups }}"
          when:
            - >-
              (vps_service_foundation_grafana_alloy_collect_docker | bool)
              or (vps_service_foundation_grafana_alloy_collect_docker_logs | bool)

        - name: Set Alloy supplementary groups for journal logs and optional Docker telemetry
          ansible.builtin.user:
            name: "{{ vps_service_foundation_grafana_alloy_user }}"
            groups: >-
              {{
                (
                  vps_service_foundation_grafana_alloy_groups
                  + (
                    (
                      (vps_service_foundation_grafana_alloy_collect_docker | bool)
                      or (vps_service_foundation_grafana_alloy_collect_docker_logs | bool)
                    )
                    | ternary(vps_service_foundation_grafana_alloy_docker_groups, [])
                  )
                ) | join(',')
              }}
            append: false

        - name: Create Alloy textfile collector directory
          ansible.builtin.file:
            path: "{{ vps_service_foundation_grafana_alloy_textfile_dir }}"
            owner: "{{ vps_service_foundation_grafana_alloy_user }}"
            group: "{{ vps_service_foundation_grafana_alloy_user }}"
            mode: "0755"
            state: directory

        - name: Install NutsNews observability textfile exporter
          ansible.builtin.copy:
            src: observability_textfile_exporter.py
            dest: "{{ vps_service_foundation_observability_textfile_bin }}"
            owner: root
            group: root
            mode: "0755"

        - name: Install Grafana Alloy environment
          ansible.builtin.template:
            src: grafana-alloy.env.j2
            dest: "{{ vps_service_foundation_grafana_alloy_env_file }}"
            owner: root
            group: root
            mode: "0600"
          notify: Restart alloy
          no_log: true

        - name: Install Grafana Alloy configuration
          ansible.builtin.template:
            src: grafana-alloy.config.alloy.j2
            dest: "{{ vps_service_foundation_grafana_alloy_config_file }}"
            owner: root
            group: root
            mode: "0644"
          notify: Restart alloy

        - name: Create Grafana Alloy systemd drop-in directory
          ansible.builtin.file:
            path: "{{ vps_service_foundation_grafana_alloy_systemd_dropin_dir }}"
            owner: root
            group: root
            mode: "0755"
            state: directory

        - name: Install Grafana Alloy systemd environment drop-in
          ansible.builtin.template:
            src: grafana-alloy.service-dropin.conf.j2
            dest: "{{ vps_service_foundation_grafana_alloy_systemd_dropin_file }}"
            owner: root
            group: root
            mode: "0644"
          notify: Restart alloy

        - name: Install NutsNews observability textfile service
          ansible.builtin.template:
            src: nutsnews-observability-textfile.service.j2
            dest: "/etc/systemd/system/{{ vps_service_foundation_observability_textfile_service }}"
            owner: root
            group: root
            mode: "0644"

        - name: Install NutsNews observability textfile timer
          ansible.builtin.template:
            src: nutsnews-observability-textfile.timer.j2
            dest: "/etc/systemd/system/{{ vps_service_foundation_observability_textfile_timer }}"
            owner: root
            group: root
            mode: "0644"

        - name: Validate Grafana Alloy configuration
          ansible.builtin.command:
            argv:
              - alloy
              - validate
              - "{{ vps_service_foundation_grafana_alloy_config_file }}"
          changed_when: false

        - name: Refresh NutsNews observability textfile metrics
          ansible.builtin.command:
            argv:
              - "{{ vps_service_foundation_observability_textfile_bin }}"
          changed_when: false

        - name: Enable NutsNews observability textfile timer
          ansible.builtin.systemd_service:
            name: "{{ vps_service_foundation_observability_textfile_timer }}"
            enabled: true
            state: started
            daemon_reload: true

        - name: Enable Grafana Alloy service
          ansible.builtin.systemd_service:
            name: alloy
            enabled: true
            masked: false
            state: started
            daemon_reload: true

    - name: Reconcile disabled Grafana Alloy observability agent
      when: not (vps_service_foundation_grafana_alloy_enabled | bool)
      block:
        - name: Gather service facts for disabled Grafana Alloy reconciliation
          ansible.builtin.service_facts:

        - name: Check whether disabled Grafana Alloy user exists
          ansible.builtin.command:
            argv:
              - id
              - -u
              - "{{ vps_service_foundation_grafana_alloy_user }}"
          register: vps_service_foundation_grafana_alloy_user_lookup
          changed_when: false
          failed_when: false

        - name: Remove disabled Grafana Alloy supplementary access
          ansible.builtin.user:
            name: "{{ vps_service_foundation_grafana_alloy_user }}"
            groups: ""
            append: false
          when: vps_service_foundation_grafana_alloy_user_lookup.rc == 0

        - name: Stop and disable NutsNews observability textfile timer when Alloy is disabled
          ansible.builtin.systemd_service:
            name: "{{ vps_service_foundation_observability_textfile_timer }}"
            enabled: false
            state: stopped
          when: vps_service_foundation_observability_textfile_timer in ansible_facts.services

        - name: Stop NutsNews observability textfile service when Alloy is disabled
          ansible.builtin.systemd_service:
            name: "{{ vps_service_foundation_observability_textfile_service }}"
            state: stopped
          when: vps_service_foundation_observability_textfile_service in ansible_facts.services

        - name: Stop, disable, and mask Grafana Alloy service when disabled
          ansible.builtin.systemd_service:
            name: alloy
            enabled: false
            masked: true
            state: stopped
            daemon_reload: true
          when: "'alloy.service' in ansible_facts.services"

        - name: Remove disabled Grafana Alloy managed artifacts
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ vps_service_foundation_grafana_alloy_env_file }}"
            - "{{ vps_service_foundation_grafana_alloy_config_file }}"
            - "{{ vps_service_foundation_grafana_alloy_systemd_dropin_file }}"
            - "/etc/systemd/system/{{ vps_service_foundation_observability_textfile_service }}"
            - "/etc/systemd/system/{{ vps_service_foundation_observability_textfile_timer }}"

        - name: Reload systemd after disabled Grafana Alloy artifact cleanup
          ansible.builtin.systemd_service:
            daemon_reload: true

    - name: Capture Grafana Alloy post-apply validation start
      ansible.builtin.command:
        argv:
          - date
          - --iso-8601=seconds
      register: vps_service_foundation_alloy_validation_started_at
      changed_when: false
      when: vps_service_foundation_grafana_alloy_enabled | bool

    - name: Apply pending service changes
      ansible.builtin.meta: flush_handlers

    - name: Validate Grafana Alloy readiness endpoint
      ansible.builtin.uri:
        url: "{{ vps_service_foundation_grafana_alloy_ready_url }}"
        method: GET
        status_code: 200
        return_content: false
      register: vps_service_foundation_alloy_ready_check
      retries: 6
      delay: 5
      until: vps_service_foundation_alloy_ready_check.status == 200
      when: vps_service_foundation_grafana_alloy_enabled | bool

    - name: Read recent Grafana Alloy journal for containerd socket permission errors
      ansible.builtin.command:
        argv:
          - journalctl
          - -u
          - alloy.service
          - --since
          - "{{ vps_service_foundation_alloy_validation_started_at.stdout | default(vps_service_foundation_grafana_alloy_error_validation_since, true) }}"
          - --no-pager
      register: vps_service_foundation_alloy_recent_journal
      changed_when: false
      failed_when: false
      when: vps_service_foundation_grafana_alloy_enabled | bool

    - name: Validate Grafana Alloy containerd socket permission errors are absent
      ansible.builtin.assert:
        that:
          - vps_service_foundation_alloy_recent_journal.rc == 0
          - >-
            {{
              (
                vps_service_foundation_alloy_recent_journal.stdout
                | regex_findall(vps_service_foundation_grafana_alloy_containerd_permission_error_pattern)
                | length
              )
              <= (vps_service_foundation_grafana_alloy_containerd_permission_error_threshold | int)
            }}
        fail_msg: >-
          Grafana Alloy emitted recent containerd socket permission errors after apply.
          Keep cAdvisor/container metric collection disabled until the privilege boundary is reviewed.
        success_msg: Grafana Alloy has no recent containerd socket permission errors.
      when: vps_service_foundation_grafana_alloy_enabled | bool

    - name: Validate Grafana Alloy file log permission errors are absent
      ansible.builtin.assert:
        that:
          - vps_service_foundation_alloy_recent_journal.rc == 0
          - >-
            {{
              (
                vps_service_foundation_alloy_recent_journal.stdout
                | regex_findall(vps_service_foundation_grafana_alloy_file_permission_error_pattern)
                | length
              )
              <= (vps_service_foundation_grafana_alloy_file_permission_error_threshold | int)
            }}
        fail_msg: >-
          Grafana Alloy emitted recent file log permission errors after apply.
          Keep operational logs group-readable by the managed observability log group.
        success_msg: Grafana Alloy has no recent file log permission errors.
      when: vps_service_foundation_grafana_alloy_enabled | bool

    - name: Enable operations portal collector timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_collector_timer }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable NutsNews infrastructure health service
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_infra_health_service }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Inspect infrastructure health listener after unit changes
      ansible.builtin.command:
        argv:
          - ss
          - -ltnH
          - "sport = :{{ vps_service_foundation_infra_health_port }}"
      register: vps_service_foundation_infra_health_listener
      changed_when: false
      when: not ansible_check_mode

    - name: Restart NutsNews infrastructure health service after unit changes
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_infra_health_service }}"
        state: restarted
        daemon_reload: true
      when:
        - >-
          vps_service_foundation_infra_health_service_install.changed or
          vps_service_foundation_infra_health_listener.stdout is not search('172\\.17\\.0\\.1:18080')
        - not ansible_check_mode

    - name: Read infrastructure health listener after reconciliation
      ansible.builtin.command:
        argv:
          - ss
          - -ltnH
          - "sport = :{{ vps_service_foundation_infra_health_port }}"
      register: vps_service_foundation_infra_health_listener_after_reconciliation
      changed_when: false
      when: not ansible_check_mode

    - name: Assert infrastructure health listener is narrow
      ansible.builtin.assert:
        that:
          - vps_service_foundation_infra_health_listener_after_reconciliation.stdout is search('172\\.17\\.0\\.1:18080')
          - vps_service_foundation_infra_health_listener_after_reconciliation.stdout is not search('0\\.0\\.0\\.0:18080')
        fail_msg: >-
          The infrastructure health service must listen only on
          172.17.0.1:18080 after protected apply.
        success_msg: Infrastructure health listener is limited to the Docker host gateway.
      when: not ansible_check_mode

    - name: Remove deprecated Caddy Docker health UFW sources
      community.general.ufw:
        rule: allow
        direction: in
        delete: true
        from_ip: "{{ item }}"
        port: "{{ vps_service_foundation_infra_health_port | string }}"
        proto: tcp
      loop: "{{ vps_service_foundation_deprecated_infra_health_ufw_allow_from }}"
      when: item != vps_service_foundation_infra_health_ufw_allow_from

    - name: Allow Caddy Docker network to reach infrastructure health service
      community.general.ufw:
        rule: allow
        direction: in
        from_ip: "{{ vps_service_foundation_infra_health_ufw_allow_from }}"
        port: "{{ vps_service_foundation_infra_health_port | string }}"
        proto: tcp
        comment: "{{ vps_service_foundation_infra_health_ufw_comment }}"

    - name: Enable operations portal email timers
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop:
        - "{{ vps_service_foundation_alert_timer }}"
        - "{{ vps_service_foundation_report_timer }}"

    - name: Manage encrypted VPS backup timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_backup_timer }}"
        enabled: "{{ vps_service_foundation_backup_enabled | bool }}"
        state: "{{ (vps_service_foundation_backup_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Manage encrypted VPS backup verification timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_backup_verify_timer }}"
        enabled: "{{ vps_service_foundation_backup_enabled | bool }}"
        state: "{{ (vps_service_foundation_backup_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Manage conservative Docker cleanup timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_docker_cleanup_timer }}"
        enabled: "{{ vps_service_foundation_docker_cleanup_enabled | bool }}"
        state: "{{ (vps_service_foundation_docker_cleanup_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Manage Cloudflare DDNS timer
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_cloudflare_ddns_timer }}"
        enabled: "{{ vps_service_foundation_cloudflare_ddns_enabled | bool }}"
        state: "{{ (vps_service_foundation_cloudflare_ddns_enabled | bool) | ternary('started', 'stopped') }}"
        daemon_reload: true

    - name: Run Cloudflare DDNS updater immediately
      ansible.builtin.systemd_service:
        name: "{{ vps_service_foundation_cloudflare_ddns_service }}"
        state: started
        daemon_reload: true
      when:
        - vps_service_foundation_cloudflare_ddns_enabled | bool
        - not ansible_check_mode

    - name: Verify Cloudflare DDNS updater configuration
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_cloudflare_ddns_bin }}"
      environment:
        CLOUDFLARE_API_TOKEN: "{{ vps_service_foundation_cloudflare_ddns_api_token }}"
        CLOUDFLARE_ZONE_NAME: "{{ vps_service_foundation_cloudflare_ddns_zone_name }}"
        CLOUDFLARE_RECORD_NAME: "{{ vps_service_foundation_cloudflare_ddns_record_name }}"
        CLOUDFLARE_RECORD_NAMES: "{{ vps_service_foundation_cloudflare_ddns_record_names | join(',') }}"
        CLOUDFLARE_RECORD_TTL: "{{ vps_service_foundation_cloudflare_ddns_record_ttl | string }}"
        CLOUDFLARE_RECORD_PROXIED: "{{ (vps_service_foundation_cloudflare_ddns_proxied | bool) | ternary('1', '0') }}"
        CLOUDFLARE_DDNS_DRY_RUN: "1"
        CLOUDFLARE_DDNS_IP_ENDPOINTS: "{{ vps_service_foundation_cloudflare_ddns_ip_endpoints | join(',') }}"
      changed_when: false
      no_log: true
      when: vps_service_foundation_cloudflare_ddns_enabled | bool

    - name: Refresh operations portal status snapshot
      ansible.builtin.include_tasks: ops_portal_refresh.yml
      when: not ansible_check_mode

    - name: Refresh operations portal reporting status snapshot
      ansible.builtin.command:
        argv:
          - "{{ vps_service_foundation_reporter_bin }}"
          - --mode
          - alert
          - --dry-run
      environment:
        NUTSNEWS_EMAIL_ENABLED: "{{ (vps_service_foundation_email_enabled | bool) | ternary('1', '0') }}"
        NUTSNEWS_SMTP_HOST: "{{ vps_service_foundation_email_smtp_host }}"
        NUTSNEWS_SMTP_PORT: "{{ vps_service_foundation_email_smtp_port | string }}"
        NUTSNEWS_SMTP_USERNAME: "{{ vps_service_foundation_email_smtp_username }}"
        NUTSNEWS_SMTP_PASSWORD: "{{ vps_service_foundation_email_smtp_password }}"
        NUTSNEWS_SMTP_STARTTLS: "{{ (vps_service_foundation_email_smtp_starttls | bool) | ternary('1', '0') }}"
        NUTSNEWS_EMAIL_FROM: "{{ vps_service_foundation_email_from }}"
        NUTSNEWS_EMAIL_TO: "{{ vps_service_foundation_email_to }}"
        NUTSNEWS_ALERT_COOLDOWN_SECONDS: "{{ vps_service_foundation_email_alert_cooldown_seconds | string }}"
        NUTSNEWS_REPORT_SUBJECT_PREFIX: "{{ vps_service_foundation_email_report_subject_prefix }}"
        NUTSNEWS_PORTAL_STATUS_FILE: "{{ vps_service_foundation_portal_status_file }}"
        NUTSNEWS_REPORTING_STATUS_FILE: "{{ vps_service_foundation_reporting_status_file }}"
        NUTSNEWS_ALERT_STATE_FILE: "{{ vps_service_foundation_alert_state_file }}"
      changed_when: false
      no_log: true

    - name: Refresh operations portal status after reporting update
      ansible.builtin.include_tasks: ops_portal_refresh.yml
      when: not ansible_check_mode

    - name: Validate Caddy Compose configuration
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_caddy_app_dir }}"
          - -f
          - "{{ vps_service_foundation_caddy_compose_file }}"
          - config
          - --quiet
      changed_when: false

    - name: Probe direct staging Caddy TLS before reconciliation
      ansible.builtin.command:
        argv:
          - timeout
          - "15"
          - openssl
          - s_client
          - -brief
          - -connect
          - 127.0.0.1:443
          - -servername
          - staging.nutsnews.com
          - -verify_return_error
          - -verify_hostname
          - staging.nutsnews.com
        stdin: ""
      register: vps_service_foundation_staging_caddy_tls_before
      changed_when: false
      failed_when: false
      when:
        - vps_service_foundation_nutsnews_staging_access_enabled | bool
        - not ansible_check_mode

    - name: Recreate Caddy service foundation after config changes
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_caddy_app_dir }}"
          - -f
          - "{{ vps_service_foundation_caddy_compose_file }}"
          - up
          - -d
          - --remove-orphans
          - --force-recreate
          - --build
      register: vps_service_foundation_compose_recreate
      changed_when: true
      when: >-
        vps_service_foundation_caddy_compose_install.changed
        or vps_service_foundation_caddy_dockerfile_install.changed
        or vps_service_foundation_caddyfile_install.changed
        or vps_service_foundation_caddy_rate_limit_install.changed
        or (vps_service_foundation_caddy_route_install.changed | default(false))
        or (vps_service_foundation_caddy_public_route_install.changed | default(false))
        or vps_service_foundation_ops_auth_gateway_install.changed
        or vps_service_foundation_ops_auth_env_install.changed
        or vps_service_foundation_caddy_oauth_reload_marker_install.changed
        or (vps_service_foundation_staging_caddy_tls_before.rc | default(0)) != 0

    - name: Start Caddy service foundation
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-directory
          - "{{ vps_service_foundation_caddy_app_dir }}"
          - -f
          - "{{ vps_service_foundation_caddy_compose_file }}"
          - up
          - -d
          - --remove-orphans
      register: vps_service_foundation_compose_up
      changed_when: >-
        'Created' in vps_service_foundation_compose_up.stdout
        or 'Created' in vps_service_foundation_compose_up.stderr
        or 'Recreated' in vps_service_foundation_compose_up.stdout
        or 'Recreated' in vps_service_foundation_compose_up.stderr
        or 'Started' in vps_service_foundation_compose_up.stdout
        or 'Started' in vps_service_foundation_compose_up.stderr
        or 'Pulling' in vps_service_foundation_compose_up.stdout
        or 'Pulling' in vps_service_foundation_compose_up.stderr

    - name: Inspect deprecated Docker networks before removal
      ansible.builtin.command:
        argv:
          - docker
          - network
          - inspect
          - --format
          - "{{ '{{' }} len .Containers {{ '}}' }}"
          - "{{ item }}"
      loop: "{{ vps_service_foundation_deprecated_docker_networks }}"
      loop_control:
        label: "{{ item }}"
      register: vps_service_foundation_deprecated_docker_network_inspect
      changed_when: false
      failed_when: >-
        vps_service_foundation_deprecated_docker_network_inspect.rc
        not in [0, 1]

    - name: Assert deprecated Docker networks are empty before removal
      ansible.builtin.assert:
        that:
          - item.rc != 0 or (item.stdout | int) == 0
        fail_msg: >-
          Deprecated Docker network {{ item.item }} still has attached
          containers. Stop before removing it because the production network
          boundary has not fully moved to the reviewed dual-stack bridge.
        success_msg: >-
          Deprecated Docker network {{ item.item }} is empty or absent.
      loop: "{{ vps_service_foundation_deprecated_docker_network_inspect.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Remove empty deprecated Docker networks
      ansible.builtin.command:
        argv:
          - docker
          - network
          - rm
          - "{{ item.item }}"
      loop: "{{ vps_service_foundation_deprecated_docker_network_inspect.results }}"
      loop_control:
        label: "{{ item.item }}"
      changed_when: true
      when:
        - item.rc == 0
        - (item.stdout | int) == 0

    - name: Wait for direct staging Caddy TLS after reconciliation
      ansible.builtin.command:
        argv:
          - timeout
          - "15"
          - openssl
          - s_client
          - -brief
          - -connect
          - 127.0.0.1:443
          - -servername
          - staging.nutsnews.com
          - -verify_return_error
          - -verify_hostname
          - staging.nutsnews.com
        stdin: ""
      register: vps_service_foundation_staging_caddy_tls_after
      changed_when: false
      failed_when: false
      retries: 12
      delay: 5
      until: vps_service_foundation_staging_caddy_tls_after.rc == 0
      when:
        - vps_service_foundation_nutsnews_staging_access_enabled | bool
        - not ansible_check_mode

    - name: Assert direct staging Caddy TLS was reconciled
      ansible.builtin.assert:
        that:
          - vps_service_foundation_staging_caddy_tls_after.rc == 0
        fail_msg: >-
          Caddy did not present a valid staging.nutsnews.com certificate after
          the bounded reconciliation. Staging remains unavailable at the
          Cloudflare origin and the apply must stop.
        success_msg: Direct staging Caddy TLS certificate is valid.
      when:
        - vps_service_foundation_nutsnews_staging_access_enabled | bool
        - not ansible_check_mode

    - name: Materialize the opt-in staging access boundary
      ansible.builtin.include_tasks: staging_access.yml
      when: vps_service_foundation_nutsnews_staging_access_enabled | bool

    - name: Render and apply selected NutsNews runtime environments
      ansible.builtin.include_tasks: nutsnews_environment.yml
      loop: "{{ vps_service_foundation_nutsnews_deployment_environments }}"
      loop_control:
        loop_var: nutsnews_environment_name
        label: "{{ nutsnews_environment_name }}"
      vars:
        nutsnews_environment: "{{ vps_service_foundation_nutsnews_environments[nutsnews_environment_name] }}"

    - name: Inspect existing non-selected NutsNews runtime directories
      ansible.builtin.stat:
        path: "{{ vps_service_foundation_nutsnews_environments[item].app_dir }}"
      loop: >-
        {{
          vps_service_foundation_nutsnews_environment_names
          | difference(vps_service_foundation_nutsnews_deployment_environments)
        }}
      register: vps_service_foundation_non_selected_nutsnews_runtime_dirs
      when: not ansible_check_mode

    - name: Reconcile shared Compose source for existing non-selected runtimes
      ansible.builtin.copy:
        src: >-
          {{
            vps_service_foundation_nutsnews_environments[item.item].source_compose_file
          }}
        dest: "{{ vps_service_foundation_nutsnews_environments[item.item].compose_file }}"
        owner: root
        group: root
        mode: "0644"
      loop: >-
        {{
          vps_service_foundation_non_selected_nutsnews_runtime_dirs.results
          | default([])
        }}
      loop_control:
        label: "{{ item.item }}"
      when:
        - not ansible_check_mode
        - item.stat.isdir | default(false)

    - name: Verify local Caddy health endpoint
      block:
        - name: Write deployed infrastructure commit marker
          ansible.builtin.copy:
            dest: "{{ vps_service_foundation_deployed_infra_commit_file }}"
            owner: root
            group: root
            mode: "0644"
            content: "{{ vps_service_foundation_deployed_infra_commit }}\n"
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Write protected apply status marker
          ansible.builtin.copy:
            dest: "{{ vps_service_foundation_apply_status_file }}"
            owner: root
            group: root
            mode: "0644"
            content: |
              {{
                (
                  vps_service_foundation_apply_context
                  | combine(
                      {
                        'status': 'applied',
                        'recorded_at': ansible_date_time.iso8601,
                        'commit': vps_service_foundation_deployed_infra_commit
                      },
                      recursive=True
                    )
                )
                | to_nice_json
              }}
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Refresh operations portal status after apply marker update
          ansible.builtin.command:
            argv:
              - "{{ vps_service_foundation_collector_bin }}"
          changed_when: false
          when: vps_service_foundation_apply_metadata_enabled | bool

        - name: Verify selected NutsNews runtime environment state
          ansible.builtin.include_tasks: nutsnews_environment_apply_state.yml
          loop: "{{ vps_service_foundation_nutsnews_deployment_environments }}"
          loop_control:
            loop_var: nutsnews_environment_name
            label: "{{ nutsnews_environment_name }}"
          vars:
            nutsnews_environment: "{{ vps_service_foundation_nutsnews_environments[nutsnews_environment_name] }}"

        - name: Wait for local Caddy health endpoint
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_healthcheck_url }}"
            return_content: true
            status_code: 200
          register: vps_service_foundation_healthcheck
          changed_when: false
          retries: 12
          delay: 5
          until:
            - vps_service_foundation_healthcheck.status == 200
            - vps_service_foundation_healthcheck.content | trim == "ok"

        - name: Wait for local infrastructure health endpoint
          ansible.builtin.uri:
            url: "{{ vps_service_foundation_infra_health_url }}"
            return_content: true
            status_code: 200
          register: vps_service_foundation_infra_healthcheck
          changed_when: false
          retries: 6
          delay: 5
          until:
            - vps_service_foundation_infra_healthcheck.status == 200
            - vps_service_foundation_infra_healthcheck.content is search('"ok":true')

        - name: Wait for local operations portal status data  # noqa command-instead-of-module
          ansible.builtin.command:
            argv:
              - curl
              - --silent
              - --show-error
              - --dump-header
              - "-"
              - --output
              - /dev/null
              - --max-redirs
              - "0"
              - --connect-timeout
              - "5"
              - --max-time
              - "15"
              - "{{ vps_service_foundation_portal_status_url }}"
          register: vps_service_foundation_portal_status
          changed_when: false
          retries: 15
          delay: 5
          until:
            - "vps_service_foundation_portal_status.stdout is search('(?im)^HTTP/[0-9.]+ 302')"
            - "vps_service_foundation_portal_status.stdout is search('(?im)^location: /api/auth/signin/google\\r?$')"

      rescue:
        - name: Show Caddy Compose status after health failure
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - --project-directory
              - "{{ vps_service_foundation_caddy_app_dir }}"
              - -f
              - "{{ vps_service_foundation_caddy_compose_file }}"
              - ps
          register: vps_service_foundation_compose_ps
          changed_when: false
          failed_when: false

        - name: Print Caddy Compose status after health failure
          ansible.builtin.debug:
            var: vps_service_foundation_compose_ps.stdout_lines

        - name: Show Caddy logs after health failure
          ansible.builtin.command:
            argv:
              - docker
              - logs
              - --tail
              - "200"
              - nutsnews-caddy
          register: vps_service_foundation_caddy_logs
          changed_when: false
          failed_when: false

        - name: Print Caddy logs after health failure
          ansible.builtin.debug:
            msg: >-
              {{
                (vps_service_foundation_caddy_logs.stdout_lines | default([]))
                + (vps_service_foundation_caddy_logs.stderr_lines | default([]))
              }}

        - name: Fail Caddy health verification
          ansible.builtin.fail:
            msg: >-
              Caddy did not answer {{ vps_service_foundation_healthcheck_url }}
              or the portal status feed was not protected by Google OAuth at {{ vps_service_foundation_portal_status_url }}.
              Compose status and container logs were printed above.
