- name: Validate NutsNews runtime environment {{ nutsnews_environment.name }}
  ansible.builtin.assert:
    that:
      - nutsnews_environment.name in vps_service_foundation_nutsnews_environment_names
      - nutsnews_environment.project_name is match('^[a-z0-9][a-z0-9_-]*$')
      - nutsnews_environment.container_name is match('^[a-z0-9][a-z0-9._-]*$')
      - nutsnews_environment.network_alias is match('^[a-z0-9][a-z0-9._-]*$')
      - nutsnews_environment.container_port | int > 0
      - nutsnews_environment.health_path == '/readyz'
      - nutsnews_environment.image_repo == 'ghcr.io/ramideltoro/nutsnews'
      - nutsnews_environment.image_review_status in ['reviewed', 'unreviewed']
      - >-
        (nutsnews_environment.image_digest | length == 0) or
        (nutsnews_environment.image_digest is match('^sha256:[0-9a-f]{64}$'))
      - >-
        (nutsnews_environment.image | length == 0) or
        (
          (nutsnews_environment.image_digest is match('^sha256:[0-9a-f]{64}$')) and
          (nutsnews_environment.image == (nutsnews_environment.image_repo ~ '@' ~ nutsnews_environment.image_digest))
        )
      - >-
        (nutsnews_environment.image_digest | length == 0) or
        (nutsnews_environment.image_review_status == 'reviewed')
      - >-
        (nutsnews_environment.last_known_good_digest | length == 0) or
        (nutsnews_environment.last_known_good_digest is match('^sha256:[0-9a-f]{64}$'))
      - >-
        (nutsnews_environment.source_commit | length == 0) or
        (nutsnews_environment.source_commit is match('^[0-9a-f]{40}$'))
      - "nutsnews_environment.app_dir is match('^/.+$')"
      - "nutsnews_environment.env_file is match('^/.+$')"
      - "nutsnews_environment.state_dir is match('^/.+$')"
      - "nutsnews_environment.release_manifest_file is match('^/.+$')"
      - "nutsnews_environment.apply_marker_file is match('^/.+$')"
      - "nutsnews_environment.last_known_good_state_file is match('^/.+$')"
      - nutsnews_environment.cpu_limit | float > 0
      - nutsnews_environment.cpu_shares | int > 0
      - nutsnews_environment.memory_limit_mib | int > 0
      - nutsnews_environment.memory_reservation_mib | int > 0
      - >-
        (nutsnews_environment.memory_reservation_mib | int) <=
        (nutsnews_environment.memory_limit_mib | int)
      - nutsnews_environment.pids_limit | int > 0
      - nutsnews_environment.log_max_size is match('^[1-9][0-9]*[mM]$')
      - nutsnews_environment.log_max_file | int > 0
      - >-
        not (nutsnews_environment.enabled | bool) or
        (
          (nutsnews_environment.image_digest is match('^sha256:[0-9a-f]{64}$')) and
          (nutsnews_environment.image_review_status == 'reviewed') and
          (nutsnews_environment.image == (nutsnews_environment.image_repo ~ '@' ~ nutsnews_environment.image_digest)) and
          (nutsnews_environment.source_commit is match('^[0-9a-f]{40}$')) and
          (nutsnews_environment.build_id | length > 0)
        )
      - >-
        not (nutsnews_environment.name == 'staging') or
        (
          not (nutsnews_environment.staged_route_enabled | bool) and
          not (nutsnews_environment.public_route_enabled | bool) and
          (
            not (nutsnews_environment.enabled | bool) or
            (
              (vps_service_foundation_nutsnews_staging_deploy_authorized | bool) and
              (nutsnews_environment.deployment_target == 'vps-staging') and
              (nutsnews_environment.deployment_id is match('^stg-[0-9a-f]{24}$')) and
              (nutsnews_environment.config_generation is match('^staging-stg-[0-9a-f]{24}-[0-9a-f]{12}$')) and
              (nutsnews_environment.source_commit is match('^[0-9a-f]{40}$')) and
              (nutsnews_environment.build_id is match('^[1-9][0-9]{0,19}-[1-9][0-9]{0,5}$')) and
              (nutsnews_environment.schema_version is match('^[0-9]{14}$'))
            )
          ) and
          (nutsnews_environment.cpu_limit | float) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.cpu_limit | float) and
          (nutsnews_environment.cpu_shares | int) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.cpu_shares | int) and
          (nutsnews_environment.memory_limit_mib | int) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.memory_limit_mib | int) and
          (nutsnews_environment.memory_reservation_mib | int) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.memory_reservation_mib | int) and
          (nutsnews_environment.pids_limit | int) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.pids_limit | int) and
          (nutsnews_environment.log_max_size == vps_service_foundation_nutsnews_staging_resource_budget.log_max_size) and
          (nutsnews_environment.log_max_file | int) <=
          (vps_service_foundation_nutsnews_staging_resource_budget.log_max_file | int)
        )
      - >-
        not (nutsnews_environment.name == 'production' and nutsnews_environment.enabled | bool) or
        (
          (nutsnews_environment.deployment_target == 'production-vps') and
          (nutsnews_environment.build_id is match('^[1-9][0-9]{0,19}-[1-9][0-9]{0,5}$')) and
          (nutsnews_environment.config_generation is match('^production-[1-9][0-9]{0,19}-[1-9][0-9]{0,5}-[0-9]{14}$')) and
          (nutsnews_environment.migration_head is match('^[0-9]{14}$')) and
          (nutsnews_environment.schema_version is match('^[0-9]{14}$'))
        )
    fail_msg: >-
      NutsNews {{ nutsnews_environment.name }} must use a reviewed immutable
      ghcr.io/ramideltoro/nutsnews@sha256 digest. Runtime resource values must
      be positive and bounded. Mutable tags and a staging runtime without the
      fixed staging deployment authorization are rejected before Compose can run.
    success_msg: NutsNews {{ nutsnews_environment.name }} runtime inputs are valid.
  no_log: true
