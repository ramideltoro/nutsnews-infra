  - https://ifconfig.me/ip
vps_service_foundation_cloudflare_ddns_bin: /usr/local/bin/nutsnews-cloudflare-ddns
vps_service_foundation_cloudflare_ddns_env_file: "{{ vps_service_foundation_private_config_dir }}/cloudflare-ddns.env"
vps_service_foundation_cloudflare_ddns_service: nutsnews-cloudflare-ddns.service
