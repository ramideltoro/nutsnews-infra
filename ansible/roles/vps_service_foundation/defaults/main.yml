vps_service_foundation_root: /opt/nutsnews
vps_service_foundation_admin_user: "{{ vps_baseline_admin_user | default('nutsnews_ops') }}"

vps_service_foundation_docker_packages:
  - docker.io
  - docker-compose-v2

vps_service_foundation_backup_packages:
  - restic
  - rclone

vps_service_foundation_grafana_alloy_enabled: false
vps_service_foundation_grafana_alloy_install_repo: true
vps_service_foundation_grafana_alloy_apt_key_url: https://apt.grafana.com/gpg-full.key
vps_service_foundation_grafana_alloy_apt_key_file: /etc/apt/keyrings/grafana.asc
vps_service_foundation_grafana_alloy_apt_repo_uri: https://apt.grafana.com
vps_service_foundation_grafana_alloy_apt_repo_suite: stable
vps_service_foundation_grafana_alloy_apt_repo_components:
  - main
vps_service_foundation_grafana_alloy_repo_support_packages:
  - gpg
  - python3-debian
vps_service_foundation_grafana_alloy_package: alloy
vps_service_foundation_grafana_alloy_user: alloy
vps_service_foundation_grafana_alloy_groups:
  - adm
  - systemd-journal
vps_service_foundation_grafana_alloy_docker_groups:
  - docker
vps_service_foundation_grafana_alloy_env_file: "{{ vps_service_foundation_private_config_dir }}/grafana-alloy.env"
vps_service_foundation_grafana_alloy_config_file: /etc/alloy/config.alloy
vps_service_foundation_grafana_alloy_systemd_dropin_dir: /etc/systemd/system/alloy.service.d
vps_service_foundation_grafana_alloy_systemd_dropin_file: "{{ vps_service_foundation_grafana_alloy_systemd_dropin_dir }}/10-nutsnews-env.conf"
vps_service_foundation_grafana_alloy_log_level: info
vps_service_foundation_grafana_alloy_environment: production
vps_service_foundation_grafana_alloy_hostname: "{{ vps_baseline_hostname | default('vps.nutsnews.com') }}"
vps_service_foundation_grafana_alloy_scrape_interval: 60s
vps_service_foundation_grafana_alloy_metrics_url: ""
vps_service_foundation_grafana_alloy_metrics_username: ""
vps_service_foundation_grafana_alloy_logs_url: ""
vps_service_foundation_grafana_alloy_logs_username: ""
vps_service_foundation_grafana_alloy_access_policy_token: ""
vps_service_foundation_grafana_alloy_collect_docker: false
vps_service_foundation_grafana_alloy_collect_docker_logs: true
vps_service_foundation_grafana_alloy_docker_socket: unix:///var/run/docker.sock
vps_service_foundation_grafana_alloy_docker_log_compose_projects:
  - nutsnews-service-foundation
  - nutsnews-app
vps_service_foundation_grafana_alloy_docker_log_rate: 3
vps_service_foundation_grafana_alloy_docker_log_burst: 30
vps_service_foundation_grafana_alloy_journal_log_rate: 2
vps_service_foundation_grafana_alloy_journal_log_burst: 20
vps_service_foundation_grafana_alloy_file_log_rate: 2
vps_service_foundation_grafana_alloy_file_log_burst: 20
vps_service_foundation_grafana_alloy_textfile_dir: /var/lib/nutsnews/alloy/textfile
vps_service_foundation_grafana_alloy_ready_url: http://127.0.0.1:12345/-/ready
vps_service_foundation_grafana_alloy_error_validation_since: "-30 min"
vps_service_foundation_grafana_alloy_containerd_permission_error_pattern: "containerd\\.sock: connect: permission denied"
vps_service_foundation_grafana_alloy_containerd_permission_error_threshold: 0
vps_service_foundation_observability_textfile_bin: /usr/local/bin/nutsnews-observability-textfile
vps_service_foundation_observability_textfile_service: nutsnews-observability-textfile.service
vps_service_foundation_observability_textfile_timer: nutsnews-observability-textfile.timer
vps_service_foundation_observability_textfile_interval: 1min

vps_service_foundation_docker_users: []

vps_service_foundation_caddy_uid: 64010
vps_service_foundation_caddy_gid: 64010
vps_service_foundation_caddy_user: nutsnews_caddy
vps_service_foundation_caddy_group: nutsnews_caddy

vps_service_foundation_apps_dir: "{{ vps_service_foundation_root }}/apps"
vps_service_foundation_config_dir: "{{ vps_service_foundation_root }}/config"
vps_service_foundation_data_dir: "{{ vps_service_foundation_root }}/data"
vps_service_foundation_logs_dir: "{{ vps_service_foundation_root }}/logs"
vps_service_foundation_backups_dir: "{{ vps_service_foundation_root }}/backups"
vps_service_foundation_backup_log_dir: "{{ vps_service_foundation_logs_dir }}/backups"
vps_service_foundation_backup_state_dir: "{{ vps_service_foundation_ops_dir }}/backups"
vps_service_foundation_backup_cache_dir: /var/cache/nutsnews-restic
vps_service_foundation_portal_assets_dir: "{{ vps_service_foundation_root }}/portal-assets"
vps_service_foundation_portal_static_dir: "{{ vps_service_foundation_portal_assets_dir }}/assets"
vps_service_foundation_portal_data_dir: "{{ vps_service_foundation_portal_assets_dir }}/data"
vps_service_foundation_portal_status_file: "{{ vps_service_foundation_portal_data_dir }}/status.json"
vps_service_foundation_health_dir: "{{ vps_service_foundation_root }}/health"
vps_service_foundation_ops_dir: "{{ vps_service_foundation_root }}/ops"
vps_service_foundation_private_config_dir: /etc/nutsnews
vps_service_foundation_free_tier_env_file: "{{ vps_service_foundation_private_config_dir }}/free-tier-usage.env"
vps_service_foundation_free_tier_collector_module_file: /usr/local/bin/ops_free_tier_usage.py
vps_service_foundation_free_tier_cache_file: "{{ vps_service_foundation_portal_data_dir }}/free-tier-usage-cache.json"
vps_service_foundation_free_tier_usage_snapshot_file: "{{ vps_service_foundation_private_config_dir }}/free-tier-usage.json"
vps_service_foundation_free_tier_cache_ttl_seconds: 21600
vps_service_foundation_free_tier_http_timeout_seconds: 8
vps_service_foundation_free_tier_usage_json: {}
vps_service_foundation_free_tier_vercel_api_token: ""
vps_service_foundation_free_tier_vercel_usage_api_url: ""
vps_service_foundation_free_tier_sentry_auth_token: ""
vps_service_foundation_free_tier_sentry_org: ""
vps_service_foundation_free_tier_sentry_base_url: https://sentry.io
vps_service_foundation_free_tier_cloudflare_api_token: ""
vps_service_foundation_free_tier_cloudflare_usage_api_url: ""
vps_service_foundation_free_tier_cloudflare_account_id: ""
vps_service_foundation_free_tier_better_stack_api_token: ""
vps_service_foundation_free_tier_better_stack_usage_api_url: ""
vps_service_foundation_free_tier_supabase_access_token: ""
vps_service_foundation_free_tier_supabase_usage_api_url: ""
vps_service_foundation_free_tier_grafana_api_token: ""
vps_service_foundation_free_tier_grafana_usage_api_url: ""
vps_service_foundation_free_tier_grafana_cloud_url: ""
vps_service_foundation_free_tier_grafana_service_account_token: ""
vps_service_foundation_free_tier_grafana_usage_datasource_uid: ""
vps_service_foundation_free_tier_github_api_token: ""
vps_service_foundation_free_tier_github_usage_api_url: ""
vps_service_foundation_free_tier_quotas:
  - key: vercel
    platform: Vercel
    plan: Hobby Free
    quota_source: https://vercel.com/docs/limits
    quota_last_verified: "2026-07-08"
    notes: Free Hobby usage summary. Override these values if the account plan or official limits change.
    live:
      type: vercel_billing_charges
      url_env: NUTSNEWS_VERCEL_USAGE_API_URL
      token_env: NUTSNEWS_VERCEL_API_TOKEN
      allow_usage_fallback: false
      query_params:
        from: __current_month_start_iso__
        to: __now_iso__
      focus_mappings:
        active_cpu_hours:
          contains_all:
            - active
            - cpu
          unit_contains_any:
            - hour
        provisioned_memory_gb_hours:
          contains_all:
            - provisioned
            - memory
          unit_contains_any:
            - gb
            - hour
        function_invocations:
          contains_all:
            - function
            - invocation
          unit_contains_any:
            - invocation
        fast_data_transfer_gb:
          contains_all:
            - fast
            - data
            - transfer
          unit_contains_any:
            - gb
        fast_origin_transfer_gb:
          contains_all:
            - fast
            - origin
            - transfer
          unit_contains_any:
            - gb
    metrics:
      - key: fast_data_transfer_gb
        label: Fast Data Transfer
        unit: GB/month
        period: monthly
        reset_at: __next_month_start_iso__
        limit: 100
      - key: fast_origin_transfer_gb
        label: Fast Origin Transfer
        unit: GB/month
        period: monthly
        reset_at: __next_month_start_iso__
        limit: 10
      - key: function_invocations
        label: Function Invocations
        unit: invocations/month
        period: monthly
        reset_at: __next_month_start_iso__
        limit: 1000000
      - key: active_cpu_hours
        label: Active CPU
        unit: CPU-hours/month
        period: monthly
        reset_at: __next_month_start_iso__
        limit: 4
      - key: provisioned_memory_gb_hours
        label: Provisioned Memory
        unit: GB-hours/month
        period: monthly
        reset_at: __next_month_start_iso__
        limit: 360
      - key: deployments_created_per_day
        label: Deployments Created
        unit: deployments/day
        period: daily
        reset_at: __next_day_start_iso__
        limit: 100
        usage_source: unsupported
      - key: concurrent_deployments
        label: Concurrent Deployments
        unit: deployments
        period: current
        limit: 1
        usage_source: unsupported
      - key: build_time_minutes_per_deployment
        label: Build Time per Deployment
        unit: minutes/deployment
        period: per deployment
        limit: 45
        usage_source: unsupported
      - key: static_file_upload_mb
        label: Static File Uploads
        unit: MB/deployment
        period: per deployment
        limit: 100
        usage_source: unsupported
  - key: sentry
    platform: Sentry
    plan: Developer Free
    quota_source: https://sentry.io/pricing/
    quota_last_verified: "2026-07-08"
    notes: Free Developer plan allowances. Sentry stats use accepted events over the last 30 days when org/read token and org slug are configured.
    live:
      type: sentry_stats_v2
      token_env: NUTSNEWS_SENTRY_AUTH_TOKEN
      org_env: NUTSNEWS_SENTRY_ORG
      base_url_env: NUTSNEWS_SENTRY_BASE_URL
      stats_period: 30d
    metrics:
      - key: errors
        label: Errors
        unit: errors/month
        period: monthly
        limit: 5000
        live_category: error
      - key: logs_gb
        label: Logs
        unit: GB/month
        period: monthly
        limit: 5
      - key: application_metrics_gb
        label: Application Metrics
        unit: GB/month
        period: monthly
        limit: 5
      - key: spans
        label: Tracing Spans
        unit: spans/month
        period: monthly
        limit: 5000000
      - key: replays
        label: Session Replays
        unit: replays/month
        period: monthly
        limit: 50
        live_category: replay
      - key: attachments_gb
        label: Attachments
        unit: GB/month
        period: monthly
        limit: 1
      - key: uptime_monitors
        label: Uptime Monitors
        unit: monitors
        period: current
        limit: 1
      - key: cron_monitors
        label: Cron Monitors
        unit: monitors
        period: current
        limit: 1
      - key: metric_monitors
        label: Metric Monitors
        unit: monitors
        period: current
        limit: 20
  - key: cloudflare
    platform: Cloudflare
    plan: Free
    quota_source: https://developers.cloudflare.com/workers/platform/limits/
    quota_last_verified: "2026-07-08"
    notes: Workers, Pages, and R2 free limits used by NutsNews edge and Grafana state workflows.
    live:
      type: cloudflare_graphql
      url_env: NUTSNEWS_CLOUDFLARE_USAGE_API_URL
      token_env: NUTSNEWS_CLOUDFLARE_API_TOKEN
      account_id_env: NUTSNEWS_CLOUDFLARE_ACCOUNT_ID
    metrics:
      - key: workers_requests
        label: Workers Requests
        unit: requests/day
        period: daily
        limit: 100000
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
      - key: workers_cpu_time_ms
        label: Workers CPU Time
        unit: ms/request
        period: per request
        limit: 10
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: workers_subrequests
        label: Workers Subrequests
        unit: subrequests/request
        period: per request
        limit: 50
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: workers_env_vars_per_worker
        label: Workers Environment Variables
        unit: variables/Worker
        period: current
        limit: 64
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: workers_size_mb
        label: Worker Size
        unit: MB/Worker
        period: current
        limit: 3
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: workers_count
        label: Workers Count
        unit: Workers
        period: current
        limit: 100
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: workers_cron_triggers
        label: Workers Cron Triggers
        unit: triggers/account
        period: current
        limit: 5
        quota_source: https://developers.cloudflare.com/workers/platform/limits/
        usage_source: unsupported
      - key: kv_reads
        label: Workers KV Reads
        unit: reads/day
        period: daily
        limit: 100000
        quota_source: https://developers.cloudflare.com/kv/platform/limits/
      - key: kv_writes_different_keys
        label: Workers KV Writes
        unit: writes/day
        period: daily
        limit: 1000
        quota_source: https://developers.cloudflare.com/kv/platform/limits/
      - key: kv_storage_account_gb
        label: Workers KV Account Storage
        unit: GB/account
        period: current
        limit: 1
        quota_source: https://developers.cloudflare.com/kv/platform/limits/
      - key: kv_storage_namespace_gb
        label: Workers KV Namespace Storage
        unit: GB/namespace
        period: current
        limit: 1
        quota_source: https://developers.cloudflare.com/kv/platform/limits/
      - key: pages_builds
        label: Pages Builds
        unit: builds/month
        period: monthly
        limit: 500
        quota_source: https://developers.cloudflare.com/pages/platform/limits/
      - key: pages_concurrent_builds
        label: Pages Concurrent Builds
        unit: builds
        period: current
        limit: 1
        quota_source: https://developers.cloudflare.com/pages/platform/limits/
        usage_source: unsupported
      - key: pages_custom_domains
        label: Pages Custom Domains
        unit: domains/project
        period: current
        limit: 100
        quota_source: https://developers.cloudflare.com/pages/platform/limits/
        usage_source: unsupported
      - key: pages_files
        label: Pages Site Files
        unit: files/site
        period: current
        limit: 20000
        quota_source: https://developers.cloudflare.com/pages/platform/limits/
        usage_source: unsupported
      - key: pages_asset_size_mib
        label: Pages Asset File Size
        unit: MiB/file
        period: current
        limit: 25
        quota_source: https://developers.cloudflare.com/pages/platform/limits/
        usage_source: unsupported
      - key: r2_storage_gb_month
        label: R2 Standard Storage
        unit: GB-month/month
        period: monthly
        limit: 10
        quota_source: https://developers.cloudflare.com/r2/pricing/
      - key: r2_class_a_requests
        label: R2 Class A Operations
        unit: requests/month
        period: monthly
        limit: 1000000
        quota_source: https://developers.cloudflare.com/r2/pricing/
      - key: r2_class_b_requests
        label: R2 Class B Operations
        unit: requests/month
        period: monthly
        limit: 10000000
        quota_source: https://developers.cloudflare.com/r2/pricing/
  - key: better_stack
    platform: Better Stack
    plan: Free
    quota_source: https://betterstack.com/pricing
    quota_last_verified: "2026-07-08"
    notes: Free personal project allowances for monitoring, telemetry, and RUM/error tracking.
    live:
      type: json_api
      url_env: NUTSNEWS_BETTER_STACK_USAGE_API_URL
      token_env: NUTSNEWS_BETTER_STACK_API_TOKEN
      metric_paths:
        monitors_heartbeats: data.__len__
        exceptions: usage.exceptions
        logs_gb: usage.logs_gb
        traces_gb: usage.traces_gb
        metrics_gb: usage.metrics_gb
        web_events_gb: usage.web_events_gb
        session_replays: usage.session_replays
        status_pages: usage.status_pages
        status_page_subscribers: usage.status_page_subscribers
    metrics:
      - key: monitors_heartbeats
        label: Monitors and Heartbeats
        unit: checks
        period: current
        limit: 10
      - key: exceptions
        label: Exceptions
        unit: exceptions/month
        period: monthly
        limit: 100000
      - key: logs_gb
        label: Logs
        unit: GB/month
        period: monthly
        limit: 3
      - key: traces_gb
        label: Traces
        unit: GB/month
        period: monthly
        limit: 3
      - key: metrics_gb
        label: Metrics
        unit: GB/month
        period: monthly
        limit: 30
      - key: web_events_gb
        label: Web Events
        unit: GB/month
        period: monthly
        limit: 3
      - key: session_replays
        label: Session Replays
        unit: replays/month
        period: monthly
        limit: 5000
      - key: status_pages
        label: Status Pages
        unit: pages
        period: current
        limit: 1
      - key: status_page_subscribers
        label: Status Page Subscribers
        unit: subscribers
        period: current
        limit: 1000
  - key: supabase
    platform: Supabase
    plan: Free
    quota_source: https://supabase.com/docs/guides/platform/billing-on-supabase
    quota_last_verified: "2026-07-08"
    notes: Free organization and project quotas. Database size is per project; other quotas are organization-level unless Supabase changes billing semantics.
    live:
      type: json_api
      url_env: NUTSNEWS_SUPABASE_USAGE_API_URL
      token_env: NUTSNEWS_SUPABASE_ACCESS_TOKEN
      metric_paths:
        egress_gb: usage.egress_gb
        database_mb: usage.database_mb
        monthly_active_users: usage.monthly_active_users
        monthly_active_third_party_users: usage.monthly_active_third_party_users
        storage_gb: usage.storage_gb
        edge_function_invocations: usage.edge_function_invocations
        realtime_messages: usage.realtime_messages
        realtime_peak_connections: usage.realtime_peak_connections
    metrics:
      - key: egress_gb
        label: Egress
        unit: GB/month
        period: monthly
        limit: 5
      - key: database_mb
        label: Database Size
        unit: MB/project
        period: current
        limit: 500
      - key: monthly_active_users
        label: Monthly Active Users
        unit: MAU/month
        period: monthly
        limit: 50000
      - key: monthly_active_third_party_users
        label: Monthly Active Third-Party Users
        unit: MAU/month
        period: monthly
        limit: 50000
      - key: storage_gb
        label: Storage Size
        unit: GB/month
        period: monthly
        limit: 1
      - key: edge_function_invocations
        label: Edge Function Invocations
        unit: invocations/month
        period: monthly
        limit: 500000
      - key: realtime_messages
        label: Realtime Message Count
        unit: messages/month
        period: monthly
        limit: 2000000
      - key: realtime_peak_connections
        label: Realtime Peak Connections
        unit: connections
        period: current
        limit: 200
  - key: grafana_cloud
    platform: Grafana Cloud
    plan: Free
    quota_source: https://grafana.com/pricing/
    quota_last_verified: "2026-07-08"
    notes: Grafana Cloud Free allowances. Existing Terraform dashboards also use grafanacloud-usage metrics where configured.
    live:
      type: grafana_cloud_usage
      url_env: NUTSNEWS_GRAFANA_CLOUD_URL
      token_env: NUTSNEWS_GRAFANA_CLOUD_SERVICE_ACCOUNT_TOKEN
      usage_datasource_uid_env: NUTSNEWS_GRAFANA_CLOUD_USAGE_DATASOURCE_UID
      queries:
        metrics_active_series: max(grafanacloud_instance_metrics_usage)
        logs_ingested_gb: max(grafanacloud_logs_instance_usage)
    metrics:
      - key: metrics_active_series
        label: Metrics Active Series
        unit: active series/month
        period: monthly
        limit: 10000
      - key: logs_ingested_gb
        label: Logs Ingested
        unit: GB/month
        period: monthly
        limit: 50
      - key: traces_ingested_gb
        label: Traces Ingested
        unit: GB/month
        period: monthly
        limit: 50
      - key: profiles_ingested_gb
        label: Profiles Ingested
        unit: GB/month
        period: monthly
        limit: 50
      - key: synthetic_api_executions
        label: Synthetics API Tests
        unit: executions/month
        period: monthly
        limit: 100000
      - key: synthetic_browser_executions
        label: Synthetics Browser Tests
        unit: executions/month
        period: monthly
        limit: 10000
      - key: frontend_sessions
        label: Frontend Observability Sessions
        unit: sessions/month
        period: monthly
        limit: 50000
  - key: github_actions
    platform: GitHub Actions
    plan: GitHub Free
    quota_source: >-
      https://docs.github.com/en/billing/concepts/product-billing/github-actions
      and
      https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api
    quota_last_verified: "2026-07-08"
    notes: >-
      GitHub Free and Free for organizations include hosted-runner minutes,
      artifact storage, and per-repository cache storage; public repositories,
      GitHub Pages, and Dependabot standard-runner usage are free. REST API
      limits are included because the collector and protected workflows may use
      GitHub API tokens.
    live:
      type: github_actions
      url_env: NUTSNEWS_GITHUB_ACTIONS_USAGE_API_URL
      token_env: NUTSNEWS_GITHUB_USAGE_API_TOKEN
      url: https://api.github.com/repos/ramideltoro/nutsnews-infra
      metric_paths:
        hosted_runner_minutes: usage.hosted_runner_minutes
        artifact_storage_mb: usage.artifact_storage_mb
        cache_storage_gb: usage.cache_storage_gb
        rest_api_requests: usage.rest_api_requests
    metrics:
      - key: hosted_runner_minutes
        label: Hosted Runner Minutes
        unit: minutes/month
        period: monthly
        limit: 2000
      - key: artifact_storage_mb
        label: Artifact and Packages Storage
        unit: MB/month
        period: monthly
        limit: 500
      - key: cache_storage_gb
        label: Actions Cache Storage
        unit: GB/repository
        period: current
        limit: 10
      - key: rest_api_requests
        label: REST API Primary Rate Limit
        unit: requests/hour
        period: hourly
        limit: 5000
vps_service_foundation_infra_health_log_dir: "{{ vps_service_foundation_logs_dir }}/health"
vps_service_foundation_infra_health_log_file: "{{ vps_service_foundation_infra_health_log_dir }}/health-failures.jsonl"

vps_service_foundation_caddy_app_dir: "{{ vps_service_foundation_apps_dir }}/caddy"
vps_service_foundation_caddy_config_dir: "{{ vps_service_foundation_config_dir }}/caddy"
vps_service_foundation_caddy_runtime_config_dir: "{{ vps_service_foundation_caddy_config_dir }}/runtime"
vps_service_foundation_caddy_data_dir: "{{ vps_service_foundation_data_dir }}/caddy"
vps_service_foundation_caddy_logs_dir: "{{ vps_service_foundation_logs_dir }}/caddy"
