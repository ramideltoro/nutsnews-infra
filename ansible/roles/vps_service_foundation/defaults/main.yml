    events: 30
    window: 1m
  - name: nutsnews_auth_sensitive
    paths:
      - /api/auth/*
      - /login*
      - /admin*
      - /ops*
    events: 20
    window: 1m
  - name: nutsnews_api
    paths:
      - /api/*
    events: 60
    window: 1m
  - name: nutsnews_public
    paths:
      - /*
    events: 600
    window: 1m
