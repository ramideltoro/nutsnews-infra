vps_service_foundation_cloudflare_ddns_record_name: vps.nutsnews.com
vps_service_foundation_cloudflare_ddns_record_ttl: 60
vps_service_foundation_cloudflare_ddns_proxied: false
vps_service_foundation_cloudflare_ddns_dry_run: false
vps_service_foundation_cloudflare_ddns_interval: 1min
vps_service_foundation_cloudflare_ddns_ip_endpoints:
