vps_service_foundation_root: /opt/nutsnews
vps_service_foundation_admin_user: "{{ vps_baseline_admin_user | default('nutsnews_ops') }}"

vps_service_foundation_docker_packages:
  - docker.io
  - docker-compose-v2

vps_service_foundation_docker_users: []

vps_service_foundation_caddy_uid: 64010
vps_service_foundation_caddy_gid: 64010
vps_service_foundation_caddy_user: nutsnews_caddy
vps_service_foundation_caddy_group: nutsnews_caddy

vps_service_foundation_apps_dir: "{{ vps_service_foundation_root }}/apps"
vps_service_foundation_config_dir: "{{ vps_service_foundation_root }}/config"
vps_service_foundation_data_dir: "{{ vps_service_foundation_root }}/data"
vps_service_foundation_logs_dir: "{{ vps_service_foundation_root }}/logs"
vps_service_foundation_backups_dir: "{{ vps_service_foundation_root }}/backups"
vps_service_foundation_portal_assets_dir: "{{ vps_service_foundation_root }}/portal-assets"
vps_service_foundation_portal_static_dir: "{{ vps_service_foundation_portal_assets_dir }}/assets"
vps_service_foundation_portal_data_dir: "{{ vps_service_foundation_portal_assets_dir }}/data"
vps_service_foundation_portal_status_file: "{{ vps_service_foundation_portal_data_dir }}/status.json"
vps_service_foundation_health_dir: "{{ vps_service_foundation_root }}/health"
vps_service_foundation_ops_dir: "{{ vps_service_foundation_root }}/ops"

vps_service_foundation_caddy_app_dir: "{{ vps_service_foundation_apps_dir }}/caddy"
vps_service_foundation_caddy_config_dir: "{{ vps_service_foundation_config_dir }}/caddy"
vps_service_foundation_caddy_runtime_config_dir: "{{ vps_service_foundation_caddy_config_dir }}/runtime"
vps_service_foundation_caddy_data_dir: "{{ vps_service_foundation_data_dir }}/caddy"
vps_service_foundation_caddy_logs_dir: "{{ vps_service_foundation_logs_dir }}/caddy"
vps_service_foundation_caddy_compose_file: "{{ vps_service_foundation_caddy_app_dir }}/compose.yml"

vps_service_foundation_repo_root: "{{ playbook_dir }}/../.."
vps_service_foundation_source_compose_file: "{{ vps_service_foundation_repo_root }}/compose/caddy/compose.yml"
vps_service_foundation_source_caddyfile: "{{ vps_service_foundation_repo_root }}/compose/caddy/Caddyfile"
vps_service_foundation_source_health_index: "{{ vps_service_foundation_repo_root }}/compose/health/index.html"
vps_service_foundation_source_portal_index: "{{ vps_service_foundation_repo_root }}/portal/index.html"
vps_service_foundation_source_portal_app: "{{ vps_service_foundation_repo_root }}/portal/assets/app.js"
vps_service_foundation_source_portal_styles: "{{ vps_service_foundation_repo_root }}/portal/assets/styles.css"
vps_service_foundation_source_portal_status_example: "{{ vps_service_foundation_repo_root }}/portal/data/status.example.json"

vps_service_foundation_healthcheck_url: http://127.0.0.1:8080/healthz
vps_service_foundation_portal_status_url: http://127.0.0.1:8080/data/status.json

vps_service_foundation_collector_bin: /usr/local/bin/nutsnews-ops-portal-collector
vps_service_foundation_collector_log_dir: "{{ vps_service_foundation_logs_dir }}/ops-portal"
vps_service_foundation_collector_service: nutsnews-ops-portal-collector.service
vps_service_foundation_collector_timer: nutsnews-ops-portal-collector.timer

vps_service_foundation_public_ipv4: "{{ vps_baseline_ipv4 | default('65.75.202.112') }}"
vps_service_foundation_public_ipv6: "{{ vps_baseline_ipv6 | default('2606:cc0:11:23ae::1') }}"
vps_service_foundation_docs_base_url: https://github.com/ramideltoro/nutsnews-docs
vps_service_foundation_infra_repo_url: https://github.com/ramideltoro/nutsnews-infra

vps_service_foundation_apply_metadata_enabled: false
vps_service_foundation_deployed_infra_commit: unknown
vps_service_foundation_apply_context:
  status: unknown
  repository: ramideltoro/nutsnews-infra
  branch: unknown
  commit: "{{ vps_service_foundation_deployed_infra_commit }}"
  workflow: Protected Ansible Apply
  run_url: ""
  actor: unknown

vps_service_foundation_deployed_infra_commit_file: "{{ vps_service_foundation_ops_dir }}/deployed-infra-commit"
vps_service_foundation_apply_status_file: "{{ vps_service_foundation_ops_dir }}/last-apply.json"

vps_service_foundation_portal_files:
  - src: "{{ vps_service_foundation_source_portal_index }}"
    dest: "{{ vps_service_foundation_portal_assets_dir }}/index.html"
    mode: "0644"
  - src: "{{ vps_service_foundation_source_portal_app }}"
    dest: "{{ vps_service_foundation_portal_static_dir }}/app.js"
    mode: "0644"
  - src: "{{ vps_service_foundation_source_portal_styles }}"
    dest: "{{ vps_service_foundation_portal_static_dir }}/styles.css"
    mode: "0644"
  - src: "{{ vps_service_foundation_source_portal_status_example }}"
    dest: "{{ vps_service_foundation_portal_status_file }}"
    mode: "0644"

vps_service_foundation_directories:
  - path: "{{ vps_service_foundation_root }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_apps_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_caddy_app_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_config_dir }}"
    owner: root
    group: root
    mode: "0750"
  - path: "{{ vps_service_foundation_caddy_config_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_caddy_runtime_config_dir }}"
    owner: "{{ vps_service_foundation_caddy_user }}"
    group: "{{ vps_service_foundation_caddy_group }}"
    mode: "0750"
  - path: "{{ vps_service_foundation_data_dir }}"
    owner: root
    group: root
    mode: "0750"
  - path: "{{ vps_service_foundation_caddy_data_dir }}"
    owner: "{{ vps_service_foundation_caddy_user }}"
    group: "{{ vps_service_foundation_caddy_group }}"
    mode: "0750"
  - path: "{{ vps_service_foundation_logs_dir }}"
    owner: root
    group: adm
    mode: "0750"
  - path: "{{ vps_service_foundation_caddy_logs_dir }}"
    owner: "{{ vps_service_foundation_caddy_user }}"
    group: adm
    mode: "0750"
  - path: "{{ vps_service_foundation_backups_dir }}"
    owner: root
    group: root
    mode: "0750"
  - path: "{{ vps_service_foundation_portal_assets_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_portal_static_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_portal_data_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_health_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: "{{ vps_service_foundation_ops_dir }}"
    owner: root
    group: root
    mode: "0750"
  - path: "{{ vps_service_foundation_collector_log_dir }}"
    owner: root
    group: adm
    mode: "0750"
