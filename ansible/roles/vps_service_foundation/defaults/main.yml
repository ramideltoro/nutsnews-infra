vps_service_foundation_backup_rclone_config_file: "{{ vps_service_foundation_private_config_dir }}/rclone-nutsnews-onedrive.conf"
vps_service_foundation_backup_restic_password_file: "{{ vps_service_foundation_private_config_dir }}/restic-password"
vps_service_foundation_backup_paths_file: "{{ vps_service_foundation_private_config_dir }}/vps-backup-paths.txt"
