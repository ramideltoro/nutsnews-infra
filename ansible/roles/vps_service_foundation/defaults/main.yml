vps_service_foundation_backup_verify_service: nutsnews-restic-verify.service
vps_service_foundation_backup_on_calendar: "*-*-* 03:25:00"
vps_service_foundation_backup_randomized_delay_seconds: 30min
vps_service_foundation_backup_enabled: false
vps_service_foundation_backup_repository: rclone:nutsnews-onedrive:nutsnews-backups/vps
vps_service_foundation_backup_rclone_remote: nutsnews-onedrive
vps_service_foundation_backup_rclone_config: ""
vps_service_foundation_backup_restic_password: ""
vps_service_foundation_backup_stale_after_hours: 30
vps_service_foundation_backup_check_read_data_subset: 5%
vps_service_foundation_backup_keep_daily: 14
vps_service_foundation_backup_keep_weekly: 8
vps_service_foundation_backup_keep_monthly: 12
vps_service_foundation_backup_keep_yearly: 2
vps_service_foundation_backup_paths:
  - /opt/nutsnews
  - /etc/nutsnews
  - /etc/systemd/system/nutsnews-*.service
  - /etc/systemd/system/nutsnews-*.timer
  - /etc/docker/daemon.json
  - /etc/ssh/sshd_config
  - /etc/ssh/sshd_config.d/20-nutsnews-baseline.conf
  - /etc/ssh/sshd_config.d/99-nutsnews-portal-forwarding.conf
  - "/etc/sudoers.d/90-{{ vps_service_foundation_admin_user }}"
  - /etc/apt/apt.conf.d/20auto-upgrades
  - /etc/apt/apt.conf.d/50unattended-upgrades
  - /etc/fail2ban/jail.d/sshd.local
  - /etc/systemd/journald.conf.d/20-nutsnews-baseline.conf
  - /etc/logrotate.d/nutsnews
vps_service_foundation_backup_excludes:
  - /opt/nutsnews/backups/**
  - /opt/nutsnews/logs/**
  - /opt/nutsnews/portal-assets/data/status.json
  - /opt/nutsnews/portal-assets/data/status.tmp
  - /opt/nutsnews/portal-assets/data/disk-usage-cache.json
  - /opt/nutsnews/portal-assets/data/reporting-status.json
  - /opt/nutsnews/portal-assets/data/backup-status.json
  - /opt/nutsnews/ops/email-alert-state.json
vps_service_foundation_disk_scan_cache_file: "{{ vps_service_foundation_portal_data_dir }}/disk-usage-cache.json"
vps_service_foundation_disk_scan_cache_seconds: 3600
vps_service_foundation_disk_scan_roots:
  - "{{ vps_service_foundation_root }}"
  - /var/log
  - /var/lib/docker
  - /home
vps_service_foundation_alert_service: nutsnews-ops-alert-check.service
vps_service_foundation_alert_timer: nutsnews-ops-alert-check.timer
vps_service_foundation_report_service: nutsnews-ops-health-report.service
vps_service_foundation_report_timer: nutsnews-ops-health-report.timer

vps_service_foundation_cloudflare_ddns_enabled: false
vps_service_foundation_cloudflare_ddns_api_token: ""
